<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logistics Ultra — Dashboard UAL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* -- TOKENS ----------------------------------- */
:root {
  --ul-red:#00897B; --ul-dark:#2D3748; --ul-mid:#1a2535;
  --ul-blue:#1a3a4a; --ul-gold:#4DB6AC; --ul-light:#F5F7FA;
  --grn:#059669; --grn2:#d1fae5; --red:#dc2626; --red2:#fee2e2;
  --ylw:#d97706; --ylw2:#fef3c7; --pur:#7c3aed; --pur2:#ede9fe;
  --acc:#00897B; --acc2:#00796B; --acc3:#e0f2f1;
  --bg:var(--ul-light); --s0:#fff; --s1:#f7f9fc; --s2:#eef1f7;
  --t0:#0f172a; --t1:#1e293b; --t2:#475569; --t3:#94a3b8;
  --br:#e2e8f0; --br2:#cbd5e1;
  --r:10px; --r2:7px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 2px 10px rgba(0,0,0,.04);
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:13px;background:var(--bg);color:var(--t1)}

/* -- LOADING */
#loading{position:fixed;inset:0;background:#0f1623;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px}
.load-icon{width:90px;height:90px;background:#2563eb;border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(37,99,235,.35)}
.load-icon svg{width:48px;height:48px;fill:#fff}
.load-title{color:#fff;font-size:24px;font-weight:700;letter-spacing:-.3px;margin-top:4px}
#load-msg{color:rgba(255,255,255,.4);font-size:13px;font-family:var(--font);margin-top:-8px}
.load-bar{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-top:4px}
.load-bar-fill{height:100%;background:#2563eb;border-radius:99px;animation:lbar 2.5s ease-in-out infinite}
@keyframes lbar{0%{width:0%}70%{width:85%}100%{width:100%}}
#load-err{display:none;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:#fca5a5;padding:10px 18px;border-radius:8px;font-size:12px;max-width:380px;text-align:center;line-height:1.5}

/* -- APP SHELL -------------------------------- */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:220px;background:#2D3748;display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo-wrap{display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:34px;height:34px;background:#00897B;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-icon svg{width:18px;height:18px;fill:#fff}
.sb-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.2px}
.sb-name span{color:#00897B}
.sb-sub{font-size:9px;color:rgba(255,255,255,.25);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.18);text-transform:uppercase;letter-spacing:.09em;padding:8px 8px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.35);font-size:12px;font-weight:500;margin-bottom:1px;transition:all .12s;user-select:none}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.75)}
.ni.on{background:#00897B;color:#fff}
.ni svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.sb-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,.06)}
.sb-info{font-size:10px;color:rgba(255,255,255,.2);line-height:1.7}
.sb-info b{color:rgba(255,255,255,.38);display:block}

/* TOPBAR */
.cnt{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{background:var(--s0);border-bottom:1px solid var(--br);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-tit{font-size:14px;font-weight:600;color:var(--t0)}
.top-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.t-sel{background:var(--s1);border:1px solid var(--br2);color:var(--t1);font-size:11px;padding:4px 8px;border-radius:var(--r2);font-family:var(--font);cursor:pointer}
.cmp-lbl{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);cursor:pointer;padding:4px 8px;border-radius:var(--r2);border:1px solid var(--br);background:var(--s1)}
.cmp-lbl input{accent-color:#00897B}
.sync-btn{background:#00897B;border:none;color:#fff;font-size:11px;padding:5px 12px;border-radius:var(--r2);cursor:pointer;font-family:var(--font);font-weight:600;display:flex;align-items:center;gap:5px;transition:opacity .12s}
.sync-btn:hover{opacity:.85}
.dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0}
.dot.spin{animation:blink 1s infinite}.dot.err{background:#fca5a5}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:18px 20px;background:var(--bg)}

/* KPI */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.kc{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh)}
.kc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.kl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.ki{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.ki svg{width:13px;height:13px;fill:currentColor}
.ki.g{background:var(--grn2);color:var(--grn)}.ki.r{background:var(--red2);color:var(--red)}
.ki.b{background:#dbeafe;color:#1d4ed8}.ki.y{background:var(--ylw2);color:var(--ylw)}
.ki.p{background:var(--pur2);color:var(--pur)}.ki.rl{background:#fee2e2;color:#00897B}
.kv{font-size:20px;font-weight:700;color:var(--t0);line-height:1}
.kv.g{color:var(--grn)}.kv.r{color:var(--red)}.kv.b{color:#1d4ed8}
.kv.y{color:var(--ylw)}.kv.p{color:var(--pur)}.kv.rl{color:#00897B}
.kd{font-size:10px;color:var(--t3);margin-top:3px;line-height:1.4}
.up{color:var(--grn)}.dn{color:var(--red)}.vs{color:var(--t3);font-size:10px}

/* CHART CARD */
.cc{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:14px}
.cc-t{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.lgnd{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.lgnd span{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.lsq{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* BARS */
.brow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.blbl{font-size:10px;color:var(--t2);min-width:130px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrk{flex:1;height:13px;background:var(--s2);border-radius:3px;overflow:hidden}
.bfil{height:100%;border-radius:3px;transition:width .4s ease}
.bval{font-size:10px;min-width:72px;text-align:right;font-weight:600;font-family:var(--mono)}

/* PILLS */
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.pill{font-size:10px;padding:3px 9px;border-radius:99px;cursor:pointer;border:1px solid var(--br);background:var(--s1);color:var(--t2);font-family:var(--font);font-weight:500;transition:all .1s}
.pill:hover{border-color:#00897B;color:#00897B}
.pill.on{background:#00897B;color:#fff;border-color:#00897B}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--br);box-shadow:var(--sh);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#2D3748;color:rgba(255,255,255,.6);padding:7px 10px;font-size:9px;font-weight:600;text-align:left;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;border-bottom:2px solid #00897B}
th.r{text-align:right}
td{padding:6px 10px;border-bottom:1px solid var(--br);color:var(--t1);vertical-align:middle;white-space:nowrap}
td.r{text-align:right;font-family:var(--mono);font-size:10px}
td.g{color:var(--grn);font-weight:600}.td.re{color:var(--red);font-weight:600}
td.re{color:var(--red);font-weight:600}.td.mu{color:var(--t2)}
td.mu{color:var(--t2)}.td.y{color:var(--ylw);font-weight:600}
td.y{color:var(--ylw);font-weight:600}
td.b{color:#1d4ed8;font-weight:600}.td.rl{color:#00897B;font-weight:600}
td.rl{color:#00897B;font-weight:600}
tr:hover td{background:#fff8f8}
tr:last-child td{border-bottom:none}
tfoot td{padding:7px 10px;background:#2D3748;color:rgba(255,255,255,.7);font-weight:700;border-top:2px solid #00897B;font-family:var(--mono);font-size:10px}
tfoot td.r{text-align:right}.tfoot td.g{color:#6ee7b7}

.bdg{display:inline-block;font-size:9px;padding:2px 7px;border-radius:99px;font-weight:600;white-space:nowrap}
.bg{background:var(--s2);color:var(--t2);border:1px solid var(--br)}
.bb{background:#dbeafe;color:#1e40af}.by{background:var(--ylw2);color:#92400e}
.bgn{background:var(--grn2);color:var(--grn)}.brl{background:#fee2e2;color:#00897B}

.slbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.slbl:first-child{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}

/* PNL */
.pnl-tbl tr.phdr td{background:#2D3748;color:rgba(255,255,255,.8);font-weight:700;font-size:10px}
.pnl-tbl tr.phdr td.r{text-align:right;font-family:var(--mono)}
.pnl-tbl tr.psub td{padding-left:20px;color:var(--t2)}
.pnl-tbl tr.ptot td{background:var(--s2);font-weight:700;border-top:1px solid var(--br2)}
.pnl-tbl tr.pgrand td{background:#00897B;color:#fff;font-weight:700}
.pnl-tbl tr.pgrand td.r{text-align:right;font-family:var(--mono)}

@media(max-width:700px){.g2,.g3{grid-template-columns:1fr}.sb{display:none}}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <div class="load-icon">
    <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
  </div>
  <div class="load-title">Logistics Ultra</div>
  <div id="load-msg">Iniciando sistema...</div>
  <div class="load-bar"><div class="load-bar-fill"></div></div>
  <div id="load-err"></div>
</div>
  <div id="load-err"></div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

<!-- SIDEBAR -->
<aside class="sb">
  <div class="sb-brand">
    <div class="sb-logo-wrap">
      <div class="sb-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      </div>
      <div>
        <div class="sb-name">LOGISTICS <span style="color:#4DB6AC">ULTRA</span></div>
        <div class="sb-sub">Dashboard UAL</div>
      </div>
    </div>
  </div>
  <nav class="sb-nav">
    <div class="sb-sec">Operación</div>
    <div class="ni on" onclick="goTab('viajes',this)">
      <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>Viajes
    </div>
    <div class="ni" onclick="goTab('ingresos',this)">
      <svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4 7-8"/></svg>Ingresos
    </div>
    <div class="ni" onclick="goTab('gastos',this)">
      <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>Gastos
    </div>
    <div class="ni" onclick="goTab('diesel',this)">
      <svg viewBox="0 0 24 24"><path d="M19.77 7.23l.01-.01-3.72-3.72L15 4.56l2.11 2.11c-.94.36-1.61 1.26-1.61 2.33 0 1.38 1.12 2.5 2.5 2.5.36 0 .69-.08 1-.21v7.21c0 .55-.45 1-1 1s-1-.45-1-1V14c0-1.1-.9-2-2-2h-1V5c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v16h10v-7.5h1.5v5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V9c0-.69-.28-1.32-.73-1.77zM18 10c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM8 18v-4.5H6L10 6v5h2l-4 7z"/></svg>Diesel
    </div>
    <div class="sb-sec">Financiero</div>
    <div class="ni" onclick="goTab('rentabilidad',this)">
      <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>Rentabilidad Unidad

      <svg viewBox="0 0 24 24"><path d="M3 13h2v8H3zm4-4h2v12H7zm4-4h2v16h-2zm4 8h2v8h-2zm4-4h2v12h-2z"/></svg>P&amp;L Estado de Resultados
    </div>
  </nav>
  <div class="sb-foot">
    <div class="sb-info"><b id="sbDate">—</b><span id="sbRows">—</span></div>
  </div>
</aside>

<!-- CONTENT -->
<div class="cnt">
  <header class="top">
    <div class="top-tit" id="topTit">Viajes</div>
    <div class="top-r">
      <select class="t-sel" id="yrSel" onchange="render()">
        <option value="all">Todos los años</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026" selected>2026</option>
      </select>
      <label class="cmp-lbl"><input type="checkbox" id="cmpChk" onchange="render()"> vs año ant.</label>
      <button class="sync-btn" onclick="reloadAll()"><span class="dot" id="dot"></span>Actualizar</button>
    </div>
  </header>
  <main class="main" id="main"></main>
</div>
</div>

<script>
// -- URLs ------------------------------------------------------------------
const URL_V='https://docs.google.com/spreadsheets/d/e/2PACX-1vQUAaE4yC5wN6MxTnoCqzBZIkTDwjqpcmnu7Si4duNdjPCbkd6jaAEvZmJrLkaLIJ17mgAzpW5VwJsy/pub?gid=1075720101&single=true&output=csv';
const URL_G='https://docs.google.com/spreadsheets/d/e/2PACX-1vQUAaE4yC5wN6MxTnoCqzBZIkTDwjqpcmnu7Si4duNdjPCbkd6jaAEvZmJrLkaLIJ17mgAzpW5VwJsy/pub?gid=269206902&single=true&output=csv';
const URL_D='https://docs.google.com/spreadsheets/d/e/2PACX-1vQUAaE4yC5wN6MxTnoCqzBZIkTDwjqpcmnu7Si4duNdjPCbkd6jaAEvZmJrLkaLIJ17mgAzpW5VwJsy/pub?gid=1008342168&single=true&output=csv';
const URL_K='https://docs.google.com/spreadsheets/d/e/2PACX-1vQUAaE4yC5wN6MxTnoCqzBZIkTDwjqpcmnu7Si4duNdjPCbkd6jaAEvZmJrLkaLIJ17mgAzpW5VwJsy/pub?gid=1502021142&single=true&output=csv';

// -- CONSTANTS -------------------------------------------------------------
const MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MIDX={enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11};
const CLRS=['#00897B','#0F3460','#E8B84B','#059669','#7c3aed','#0891b2','#ea580c','#16a34a','#9333ea','#be185d','#d97706','#065f46'];
const GEXCL_CAT=['CAPEX','Créditos'];
const DIESEL_EXCL=['Diesel Crédito','Diesel Interno','Diesel Prisciliano'];
const TABS={viajes:'Viajes',ingresos:'Ingresos',gastos:'Gastos',diesel:'Diesel',rentabilidad:'Rentabilidad por Unidad',pnl:'P&L — Estado de Resultados'};

// -- STATE -----------------------------------------------------------------
let V=[],G=[],D=[],K=[];
let curTab='viajes',curMes=-1,curSemana=-1,curCliente='Todos',curUnidad='Todos',curOp='Todos',curSvc='Todos',curCat='Todos';
let CH={};

// -- UTILS -----------------------------------------------------------------
const $=id=>document.getElementById(id);
const yr=()=>$('yrSel').value;
const co=()=>$('cmpChk').checked;
const fmt=n=>'$'+Math.round(n).toLocaleString('es-MX');
const fmtK=n=>n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1e3?'$'+Math.round(n/1e3).toLocaleString('es-MX')+'k':fmt(n);
const fmtN=n=>Math.round(n).toLocaleString('es-MX');
const pM=s=>{if(!s||s==='N/A')return 0;return parseFloat(String(s).replace(/[$,\s"]/g,''))||0;};
const mOf=r=>MIDX[(r.Mes||'').toLowerCase().trim()]??-1;
const yOf=r=>String(r['AÑO']||r['Año']||r['año']||'');
const semOf=r=>parseInt(r['Num Semana']||0);
const pct=(a,b)=>b?((a-b)/b*100).toFixed(1):'N/A';
const dlt=(a,b)=>{const p=pct(a,b);if(p==='N/A')return '';const u=+p>=0;return `<span class="${u?'up':'dn'}">${u?'▲':'▼'}${Math.abs(p)}%</span>`;};
const uniq=(arr,key)=>[...new Set(arr.map(r=>r[key]).filter(v=>v&&v!==''))].sort();

function filterYr(arr){
  const y=yr();
  if(y==='all')return arr;
  return arr.filter(r=>yOf(r)===y);
}
function filterYrMinus1(arr){
  const y=yr();
  if(y==='all')return arr;
  const ya=String(parseInt(y)-1);
  return arr.filter(r=>yOf(r)===ya);
}

// -- CSV PARSER -------------------------------------------------------------
function parseCSV(txt,headerRow=0){
  const lines=txt.trim().split('\n');
  const hdr=lines[headerRow].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(headerRow+1).map(l=>{
    const vals=[];let cur='',inQ=false;
    for(const c of l){if(c==='"'){inQ=!inQ}else if(c===','&&!inQ){vals.push(cur.trim());cur=''}else cur+=c;}
    vals.push(cur.trim());
    const o={};hdr.forEach((h,i)=>{o[h]=(vals[i]||'').replace(/^"|"$/g,'');});return o;
  });
}

// -- FETCH ------------------------------------------------------------------
async function fetchCSV(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return await r.text();
}

// -- LOAD DATA -------------------------------------------------------------
async function loadAll(){
  try{
    $('load-msg').textContent='Cargando viajes...';
    const tv=await fetchCSV(URL_V);
    V=parseCSV(tv).filter(r=>r['Dia']&&r['Dia']!=='Dia'&&r['Dia']!=='');

    $('load-msg').textContent='Cargando gastos...';
    const tg=await fetchCSV(URL_G);
    const gRaw=parseCSV(tg,6); // header on row 7 (index 6)
    G=gRaw.filter(r=>r['Fecha']&&r['Monto']&&pM(r['Monto'])>0&&!GEXCL_CAT.includes(r['Categoría']));

    $('load-msg').textContent='Cargando diesel...';
    const td=await fetchCSV(URL_D);
    const dRaw=parseCSV(td,7); // header on row 8
    D=dRaw.filter(r=>r['Fecha']&&pM(r['Monto'])>0);

    $('load-msg').textContent='Cargando kilómetros...';
    const tk=await fetchCSV(URL_K);
    K=parseCSV(tk).filter(r=>r['Trip Distance (km)']&&!isNaN(parseFloat(r['Trip Distance (km)'])));

    const now=new Date();
    $('sbDate').textContent=now.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    $('sbRows').textContent=`${V.length} viajes · ${G.length} gastos · ${D.length} diesel`;
    $('loading').style.display='none';
    $('app').style.display='flex';
    $('dot').className='dot';
    render();
  }catch(e){
    $('dot').className='dot err';
    $('load-msg').textContent='Error al cargar';
    const eb=$('load-err');
    eb.style.display='block';
    eb.innerHTML='No se pudo conectar con Google Sheets.<br>Asegúrate de abrir este archivo desde <b>GitHub Pages (https://)</b>, no desde tu disco local (file://).';
  }
}

async function reloadAll(){
  $('dot').className='dot spin';
  $('loading').style.display='flex';
  await loadAll();
}

function goTab(name,el){
  curTab=name;curMes=-1;curSemana=-1;curCliente='Todos';curUnidad='Todos';curOp='Todos';curSvc='Todos';curCat='Todos';
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));

function render(){
  Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={};
  if(curTab==='viajes')drawViajes();
  else if(curTab==='ingresos')drawIngresos();

  else if(curTab==='diesel')drawDiesel();

}

// -- AGGREGATE HELPERS ------------------------------------------------------
function byField(arr,field,valFn){
  const out={};
  arr.forEach(r=>{
    const k=r[field]||'S/D';
    if(!out[k])out[k]={v:0,i:0};
    out[k].v++;
    out[k].i+=valFn?valFn(r):0;
  });
  return out;
}
function mStats(arr,valFn){
  const s=MES.map(()=>({v:0,i:0}));
  arr.forEach(r=>{const m=mOf(r);if(m<0)return;s[m].v++;if(valFn)s[m].i+=valFn(r);});
  return s;
}

// -- TAB: RENTABILIDAD -----------------------------------------------------
function drawRentabilidad(){
  const y=yr();
  const vd=filterYr(V).filter(r=>pM(r['Tarifa'])>0);
  const gd=filterYr(G);
  const dd=filterYr(D);

  // ingresos y viajes por unidad
  const byU={};
  vd.forEach(r=>{
    const u=String(r['Unidad'])||'S/U';
    if(!byU[u])byU[u]={v:0,ing:0,viat:0,diesel:0,casetas:0,arreglos:0,mant:0,nomina:0,multas:0,otros:0};
    byU[u].v++;
    byU[u].ing+=pM(r['Tarifa']);
    byU[u].viat+=pM(r['Viáticos']);
    byU[u].diesel+=pM(r['Diesel']);
    byU[u].casetas+=pM(r['Casetas']);
    byU[u].arreglos+=pM(r['Arreglos']);
    byU[u].mant+=pM(r['Rescate / Mantenimiento']);
  });

  // gastos asignados por unidad desde hoja Gastos
  gd.forEach(r=>{
    const u=String(r['Unidad'])||'';
    const m=pM(r['Monto']);
    const cl=(r['Clasificación']||'').toLowerCase();
    const cat=(r['Categoría']||'').toLowerCase();
    if(!u||!byU[u])return;
    if(cl.includes('nómina')||cl.includes('nomina'))byU[u].nomina+=m;
    else if(cl.includes('multa'))byU[u].multas+=m;
    else if(cl.includes('mantenimiento')||cl.includes('llanta'))byU[u].mant+=m;
    else if(cl.includes('viático')||cl.includes('viatico'))byU[u].viat+=m;
    else if(cl.includes('arregl'))byU[u].arreglos+=m;
    else if(cl.includes('diesel'))byU[u].diesel+=m;
    else if(cl.includes('caseta'))byU[u].casetas+=m;
  });

  // diesel litros por unidad
  dd.forEach(r=>{
    const u=String(r['Unidad'])||'';
    if(u&&byU[u])byU[u].diesel+=pM(r['Monto']);
  });

  const units=Object.keys(byU).filter(u=>byU[u].ing>0).sort((a,b)=>byU[b].ing-byU[a].ing);
  const tI=units.reduce((s,u)=>s+byU[u].ing,0);

  const rows=units.map(u=>{
    const r=byU[u];
    const cost=r.viat+r.diesel+r.casetas+r.arreglos+r.mant+r.nomina+r.multas+r.otros;
    const ut=r.ing-cost;
    const mg=r.ing?(ut/r.ing*100).toFixed(1):'N/A';
    const mc=parseFloat(mg)>=30?'g':parseFloat(mg)>=0?'y':'re';
    return `<tr>
      <td style="font-weight:700">${u}</td>
      <td class="r b">${r.v}</td>
      <td class="r g">${fmt(r.ing)}</td>
      <td class="r mu">${r.v?fmt(Math.round(r.ing/r.v)):'N/A'}</td>
      <td class="r re">${r.nomina?fmt(r.nomina):'N/A'}</td>
      <td class="r re">${r.viat?fmt(r.viat):'N/A'}</td>
      <td class="r re">${r.diesel?fmt(r.diesel):'N/A'}</td>
      <td class="r re">${r.casetas?fmt(r.casetas):'N/A'}</td>
      <td class="r re">${r.mant?fmt(r.mant):'N/A'}</td>
      <td class="r re">${r.arreglos?fmt(r.arreglos):'N/A'}</td>
      <td class="r re">${r.multas?fmt(r.multas):'N/A'}</td>
      <td class="r re">${cost?fmt(cost):'N/A'}</td>
      <td class="r ${ut>=0?'g':'re'}">${fmt(ut)}</td>
      <td class="r ${mc}">${mg}%</td>
      <td class="r y">${tI?(r.ing/tI*100).toFixed(1):0}%</td>
    </tr>`;}).join('');

  const tC=units.reduce((s,u)=>{const r=byU[u];return s+r.viat+r.diesel+r.casetas+r.arreglos+r.mant+r.nomina+r.multas+r.otros;},0);
  const tU=tI-tC;
  const tMg=tI?(tU/tI*100).toFixed(1):0;

  const mgData=units.map(u=>{const r=byU[u];const ct=r.viat+r.diesel+r.casetas+r.arreglos+r.mant+r.nomina+r.multas+r.otros;return r.ing?((r.ing-ct)/r.ing*100).toFixed(1):0;});
  const mgCols=mgData.map(v=>+v>=30?'rgba(5,150,105,.8)':+v>=0?'rgba(217,119,6,.8)':'rgba(220,38,38,.8)');

  $('main').innerHTML=`
    <div class="krow">
      <div class="kc"><div class="kc-hd"><div class="kl">Unidades</div><div class="ki y"><svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg></div></div><div class="kv y">${units.length}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Ingresos totales</div><div class="ki g"><svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4 7-8"/></svg></div></div><div class="kv g">${fmtK(tI)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Costos totales</div><div class="ki r"><svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg></div></div><div class="kv r">${fmtK(tC)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Utilidad total</div><div class="ki ${tU>=0?'g':'r'}"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg></div></div><div class="kv ${tU>=0?'g':'r'}">${fmtK(tU)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Margen prom.</div><div class="ki b"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/></svg></div></div><div class="kv b">${tMg}%</div><div class="kd">&nbsp;</div></div>
    </div>

    <div class="cc"><div class="cc-t">Margen directo por unidad — Verde ≥30% · Amarillo ≥0% · Rojo negativo</div>
      <div style="position:relative;height:${Math.max(180,units.length*28+50)}px"><canvas id="cRent"></canvas></div>
    </div>

    <div class="slbl">Desglose de rentabilidad por unidad</div>
    <div class="tw"><table>
      <thead><tr><th>Unidad</th><th class="r">Viajes</th><th class="r">Ingresos</th><th class="r">$/Viaje</th><th class="r">Nómina</th><th class="r">Viáticos</th><th class="r">Diesel</th><th class="r">Casetas</th><th class="r">Mant/Llant</th><th class="r">Arreglos</th><th class="r">Multas</th><th class="r">Costo Total</th><th class="r">Utilidad</th><th class="r">Margen</th><th class="r">% Ing</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td>TOTAL</td><td class="r">${fmtN(units.reduce((s,u)=>s+byU[u].v,0))}</td><td class="r g">${fmt(tI)}</td><td></td><td class="r re">${fmt(units.reduce((s,u)=>s+byU[u].nomina,0))}</td><td class="r re">${fmt(units.reduce((s,u)=>s+byU[u].viat,0))}</td><td class="r re">${fmt(units.reduce((s,u)=>s+byU[u].diesel,0))}</td><td class="r re">${fmt(units.reduce((s,u)=>s+byU[u].casetas,0))}</td><td class="r re">${fmt(units.reduce((s,u)=>s+byU[u].mant,0))}</td><td class="r re">${fmt(units.reduce((s,u)=>s+byU[u].arreglos,0))}</td><td class="r re">${fmt(units.reduce((s,u)=>s+byU[u].multas,0))}</td><td class="r re">${fmt(tC)}</td><td class="r ${tU>=0?'g':'re'}">${fmt(tU)}</td><td class="r y">${tMg}%</td><td class="r">100%</td></tr></tfoot>
    </table></div>`;

  CH['cRent']=new Chart($('cRent'),{type:'bar',data:{labels:units,datasets:[{label:'Margen %',data:mgData,backgroundColor:mgCols,borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw}%`}}},scales:{x:{ticks:{color:'#94a3b8',font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,.04)'}},y:{ticks:{color:'#475569',font:{size:9}},grid:{display:false}}}}});
}

// -- TAB: P&L ---------------------------------------------------------------
function drawPNL(){
  const y=yr(),c=co();
  const sv=mStats(filterYr(V).filter(r=>pM(r['Tarifa'])>0),r=>pM(r['Tarifa']));
  const sva=mStats(filterYrMinus1(V).filter(r=>pM(r['Tarifa'])>0),r=>pM(r['Tarifa']));
  const sg=MES.map((_,m)=>filterYr(G).filter(r=>mOf(r)===m).reduce((s,r)=>s+pM(r['Monto']),0));
  const sga=MES.map((_,m)=>filterYrMinus1(G).filter(r=>mOf(r)===m).reduce((s,r)=>s+pM(r['Monto']),0));

  const tI=sv.reduce((s,r)=>s+r.i,0),tIa=sva.reduce((s,r)=>s+r.i,0);
  const tG=sg.reduce((s,a)=>s+a,0),tGa=sga.reduce((s,a)=>s+a,0);
  const tU=tI-tG,tUa=tIa-tGa;
  const mg=tI?((tU/tI)*100).toFixed(1):0;
  const mga=tIa?((tUa/tIa)*100).toFixed(1):0;

  // gastos por categoría mensual
  const byCatY={};filterYr(G).forEach(r=>{const cat=r['Categoría']||'Otro';byCatY[cat]=(byCatY[cat]||0)+pM(r['Monto']);});
  const catRows=Object.entries(byCatY).sort((a,b)=>b[1]-a[1]).map(([cat,vt])=>{
    const mCells=MES.map((_,m)=>{let gm=0;filterYr(G).filter(r=>r['Categoría']===cat&&mOf(r)===m).forEach(r=>gm+=pM(r['Monto']));return `<td class="r mu">${gm?fmt(gm):'N/A'}</td>`;}).join('');
    return `<tr><td class="pnl-tbl" style="padding-left:20px;color:var(--t2)">${cat}</td>${mCells}<td class="r re">${fmt(vt)}</td>${c?`<td></td><td></td>`:''}</tr>`;
  }).join('');

  const ingR=MES.map((_,m)=>`<td class="r g">${sv[m].i?fmt(sv[m].i):'N/A'}</td>`).join('');
  const gasR=MES.map((_,m)=>`<td class="r re">${sg[m]?fmt(sg[m]):'N/A'}</td>`).join('');
  const utR=MES.map((_,m)=>{const u=sv[m].i-sg[m];return `<td class="r ${u>=0?'g':'re'}">${(sv[m].i||sg[m])?fmt(u):'N/A'}</td>`;}).join('');
  const mgR=MES.map((_,m)=>{const u=sv[m].i-sg[m];const mg2=sv[m].i?(u/sv[m].i*100).toFixed(0):'N/A';return `<td class="r ${parseFloat(mg2)>=30?'g':parseFloat(mg2)>=0?'y':'re'}">${mg2}%</td>`;}).join('');

  $('main').innerHTML=`
    <div class="krow">
      <div class="kc"><div class="kc-hd"><div class="kl">Ingresos ${y==='all'?'':y}</div><div class="ki g"><svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4 7-8"/></svg></div></div><div class="kv g">${fmtK(tI)}</div><div class="kd">${c?`AA: ${fmtK(tIa)} ${dlt(tI,tIa)}`:''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Gastos op.</div><div class="ki r"><svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg></div></div><div class="kv r">${fmtK(tG)}</div><div class="kd">${c?`AA: ${fmtK(tGa)}`:''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Utilidad bruta</div><div class="ki ${tU>=0?'g':'r'}"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg></div></div><div class="kv ${tU>=0?'g':'r'}">${fmtK(tU)}</div><div class="kd">${c?`AA: ${fmtK(tUa)} ${dlt(tU,tUa)}`:''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Margen</div><div class="ki b"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/></svg></div></div><div class="kv b">${mg}%</div><div class="kd">${c?`AA: ${mga}%`:''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Viajes</div><div class="ki rl"><svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg></div></div><div class="kv rl">${fmtN(sv.reduce((s,r)=>s+r.v,0))}</div><div class="kd">${c?`AA: ${fmtN(sva.reduce((s,r)=>s+r.v,0))} ${dlt(sv.reduce((s,r)=>s+r.v,0),sva.reduce((s,r)=>s+r.v,0))}`:''}&nbsp;</div></div>
    </div>

    <div class="cc"><div class="cc-t">Ingresos vs Gastos — ${y==='all'?'Todos los años':y}${c?' vs AA':''}</div>
      <div class="lgnd">
        <span><span class="lsq" style="background:rgba(5,150,105,.75)"></span>Ingresos</span>
        ${c?`<span><span class="lsq" style="background:rgba(5,150,105,.2)"></span>Ingresos AA</span>`:''}
        <span><span class="lsq" style="background:rgba(220,38,38,.75)"></span>Gastos</span>
        ${c?`<span><span class="lsq" style="background:rgba(220,38,38,.2)"></span>Gastos AA</span>`:''}
      </div>
      <div style="position:relative;height:200px"><canvas id="cPNL"></canvas></div>
    </div>

    <div class="slbl">Estado de Resultados — ${y==='all'?'Todos los años':y}${c?' vs AA':''}</div>
    <div class="tw" style="overflow-x:auto"><table class="pnl-tbl">
      <thead><tr><th>Concepto</th>${MES.map(m=>`<th class="r">${m}</th>`).join('')}<th class="r">TOTAL ${y==='all'?'':y}</th>${c?`<th class="r">TOTAL AA</th><th class="r">Var.</th>`:''}</tr></thead>
      <tbody>
        <tr style="background:#2D3748"><td style="color:rgba(255,255,255,.8);font-weight:700;padding:7px 10px">INGRESOS</td>${MES.map(()=>'<td></td>').join('')}<td class="r" style="color:rgba(255,255,255,.8);font-family:var(--mono);text-align:right;padding:7px 10px">${fmt(tI)}</td>${c?`<td class="r" style="color:rgba(255,255,255,.8);font-family:var(--mono);text-align:right;padding:7px 10px">${fmt(tIa)}</td><td class="r" style="padding:7px 10px;text-align:right">${dlt(tI,tIa)}</td>`:''}</tr>
        <tr><td style="padding-left:20px;color:var(--t2)">Ingresos por viajes</td>${ingR}<td class="r g">${fmt(tI)}</td>${c?`<td class="r g">${fmt(tIa)}</td><td class="r">${dlt(tI,tIa)}</td>`:''}</tr>
        <tr style="background:#2D3748"><td style="color:rgba(255,255,255,.8);font-weight:700;padding:7px 10px">GASTOS OPERATIVOS</td>${MES.map(()=>'<td></td>').join('')}<td class="r" style="color:rgba(255,255,255,.8);font-family:var(--mono);text-align:right;padding:7px 10px">${fmt(tG)}</td>${c?`<td class="r" style="color:rgba(255,255,255,.8);font-family:var(--mono);text-align:right;padding:7px 10px">${fmt(tGa)}</td><td></td>`:''}</tr>
        ${catRows}
        <tr style="background:var(--s2);font-weight:700;border-top:1px solid var(--br2)"><td>Total Gastos</td>${gasR}<td class="r re">${fmt(tG)}</td>${c?`<td class="r re">${fmt(tGa)}</td><td></td>`:''}</tr>
        <tr style="background:#00897B"><td style="color:#fff;font-weight:700;font-size:11px;padding:7px 10px">UTILIDAD OPERATIVA</td>${utR}<td class="r" style="color:#fff;font-family:var(--mono);text-align:right;padding:7px 10px">${fmt(tU)}</td>${c?`<td class="r" style="color:#fff;font-family:var(--mono);text-align:right;padding:7px 10px">${fmt(tUa)}</td><td class="r" style="color:#fff;padding:7px 10px;text-align:right">${dlt(tU,tUa)}</td>`:''}</tr>
        <tr style="background:var(--s2);font-weight:700;border-top:1px solid var(--br2)"><td>Margen %</td>${mgR}<td class="r y">${mg}%</td>${c?`<td class="r y">${mga}%</td><td></td>`:''}</tr>
      </tbody>
    </table></div>`;

  const ds=[{label:'I',data:sv.map(s=>s.i),backgroundColor:'rgba(5,150,105,.75)',borderRadius:3},{label:'G',data:sg,backgroundColor:'rgba(220,38,38,.75)',borderRadius:3}];
  if(c){ds.push({label:'Ia',data:sva.map(s=>s.i),backgroundColor:'rgba(5,150,105,.2)',borderRadius:3});ds.push({label:'Ga',data:sga,backgroundColor:'rgba(220,38,38,.2)',borderRadius:3});}
  mkBar('cPNL',MES,ds);
}

// -- INIT -----------------------------------------------------------------
loadAll();
</script>
</body>
</html>
