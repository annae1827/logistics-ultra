<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logistics Ultra — Finanzas UAL & JAVP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00897B;--teal2:#00796B;--teal3:#e0f2f1;--teal4:#b2dfdb;
  --nav:#1e2d3d;--nav2:#253649;
  --bg:#f0f4f8;--s0:#fff;--s1:#f7fafc;--s2:#edf2f7;
  --grn:#059669;--grn2:#d1fae5;
  --red:#dc2626;--red2:#fee2e2;
  --ylw:#d97706;--ylw2:#fef3c7;
  --blu:#2563eb;--blu2:#dbeafe;
  --pur:#7c3aed;--pur2:#ede9fe;
  --t0:#0f172a;--t1:#1e293b;--t2:#475569;--t3:#94a3b8;
  --br:#e2e8f0;--br2:#cbd5e1;
  --r:10px;--r2:7px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 2px 10px rgba(0,0,0,.04);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;background:var(--bg);color:var(--t1)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--nav);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.ld-icon{width:88px;height:88px;background:var(--teal);border-radius:22px;display:flex;align-items:center;justify-content:center}
.ld-icon svg{width:46px;height:46px;fill:#fff}
.ld-title{color:#fff;font-size:22px;font-weight:700}
#ld-msg{color:rgba(255,255,255,.4);font-size:13px}
.ld-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.ld-fill{height:100%;background:var(--teal);animation:lbar 2s ease-in-out infinite}
@keyframes lbar{0%{width:0%}70%{width:85%}100%{width:100%}}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:220px;background:var(--nav);display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-ico{width:32px;height:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-ico svg{width:16px;height:16px;fill:#fff}
.sb-n{font-size:13px;font-weight:700;color:#fff}
.sb-s{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.09em;padding:8px 8px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.4);font-size:12px;font-weight:500;margin-bottom:2px;transition:all .12s;user-select:none}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.ni.on{background:var(--teal);color:#fff}
.ni svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.sb-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);font-size:10px;color:rgba(255,255,255,.22);line-height:1.7}
.sb-foot b{color:rgba(255,255,255,.4);display:block}

.cnt{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{background:var(--s0);border-bottom:1px solid var(--br);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-tit{font-size:15px;font-weight:600;color:var(--t0)}
.top-r{display:flex;align-items:center;gap:8px}
.t-sel{background:var(--s1);border:1px solid var(--br2);color:var(--t1);font-size:12px;padding:6px 10px;border-radius:var(--r2);font-family:var(--font);cursor:pointer}
.up-btn{background:var(--teal);border:none;color:#fff;font-size:12px;padding:6px 14px;border-radius:var(--r2);cursor:pointer;font-family:var(--font);font-weight:600;display:flex;align-items:center;gap:5px}
.up-btn:hover{opacity:.85}
.up-btn input{display:none}

.main{flex:1;overflow-y:auto;padding:20px 22px;background:var(--bg)}

/* FILTER BOX */
.fbox{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);margin-bottom:18px}
.fbox-hd{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.fbox-hd::before{content:'';width:3px;height:13px;background:var(--teal);border-radius:2px}
.fbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.04em}
.f-sel{width:100%;background:var(--s1);border:1px solid var(--br2);color:var(--t1);font-size:12px;padding:6px 10px;border-radius:var(--r2);font-family:var(--font);cursor:pointer}
.f-sel:focus{outline:none;border-color:var(--teal)}

/* KPI */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.kc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kl{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.ki{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.ki svg{width:14px;height:14px;fill:currentColor}
.ki.g{background:var(--grn2);color:var(--grn)}.ki.r{background:var(--red2);color:var(--red)}
.ki.b{background:var(--blu2);color:var(--blu)}.ki.y{background:var(--ylw2);color:var(--ylw)}
.ki.p{background:var(--pur2);color:var(--pur)}.ki.t{background:var(--teal3);color:var(--teal)}
.kv{font-size:21px;font-weight:700;color:var(--t0);line-height:1}
.kv.g{color:var(--grn)}.kv.r{color:var(--red)}.kv.b{color:var(--blu)}.kv.y{color:var(--ylw)}.kv.p{color:var(--pur)}.kv.t{color:var(--teal)}
.kd{font-size:10px;color:var(--t3);margin-top:4px;line-height:1.4}
.up{color:var(--grn)}.dn{color:var(--red)}

/* CHART */
.cc{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:16px}
.cc-t{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.lgnd{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.lgnd span{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2)}
.lsq{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--br);box-shadow:var(--sh);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--nav);color:rgba(255,255,255,.65);padding:8px 12px;font-size:9px;font-weight:600;text-align:left;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;border-bottom:2px solid var(--teal)}
th.r{text-align:right}
td{padding:7px 12px;border-bottom:1px solid var(--br);color:var(--t1);white-space:nowrap}
td.r{text-align:right;font-family:var(--mono);font-size:11px}
td.g{color:var(--grn);font-weight:600}.td.re{color:var(--red);font-weight:600}
td.re{color:var(--red);font-weight:600}.td.mu{color:var(--t2)}
td.mu{color:var(--t2)}.td.y{color:var(--ylw);font-weight:600}
td.y{color:var(--ylw);font-weight:600}.td.t{color:var(--teal);font-weight:600}
td.t{color:var(--teal);font-weight:600}
tr:hover td{background:#f0fdfb}
tr:last-child td{border-bottom:none}
tfoot td{padding:7px 12px;background:var(--nav);color:rgba(255,255,255,.7);font-weight:700;border-top:2px solid var(--teal);font-family:var(--mono);font-size:11px}
tfoot td.r{text-align:right}

/* P&L TABLE */
.pnl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--br);box-shadow:var(--sh);margin-bottom:16px}
.pnl-tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:800px}
.pnl-tbl th{background:var(--nav);color:rgba(255,255,255,.65);padding:7px 10px;font-size:9px;font-weight:600;text-align:right;white-space:nowrap;border-bottom:2px solid var(--teal);position:sticky;top:0;z-index:2}
.pnl-tbl th:first-child{text-align:left;position:sticky;left:0;background:var(--nav);z-index:3;min-width:180px}
.pnl-tbl th:last-child{position:sticky;right:0;background:var(--nav);color:#4DB6AC;border-left:2px solid var(--teal)}
.pnl-tbl td{padding:6px 10px;border-bottom:1px solid var(--br);white-space:nowrap;text-align:right;font-family:var(--mono)}
.pnl-tbl td:first-child{text-align:left;font-family:var(--font);font-size:12px;position:sticky;left:0;background:var(--s0);z-index:1}
.pnl-tbl td:last-child{position:sticky;right:0;background:var(--s0);border-left:2px solid var(--teal4);font-weight:700}
.pnl-tbl tr:hover td{background:#f0fdfb}.pnl-tbl tr:hover td:first-child,.pnl-tbl tr:hover td:last-child{background:#f0fdfb}
.pnl-tbl tr.r-ing td{background:var(--teal3);font-weight:700;font-size:12px;color:var(--teal2)}
.pnl-tbl tr.r-ing td:first-child,.pnl-tbl tr.r-ing td:last-child{background:var(--teal3)}
.pnl-tbl tr.r-sub td:first-child{padding-left:22px;color:var(--t2);font-size:11px}
.pnl-tbl tr.r-sec td{background:var(--nav2);color:rgba(255,255,255,.8);font-weight:700;font-size:10px}
.pnl-tbl tr.r-sec td:first-child,.pnl-tbl tr.r-sec td:last-child{background:var(--nav2)}
.pnl-tbl tr.r-tot td{background:var(--s2);font-weight:700;font-size:12px}
.pnl-tbl tr.r-tot td:first-child,.pnl-tbl tr.r-tot td:last-child{background:var(--s2)}
.pnl-tbl tr.r-net td{background:var(--teal2);color:#fff;font-weight:700;font-size:13px}
.pnl-tbl tr.r-net td:first-child,.pnl-tbl tr.r-net td:last-child{background:var(--teal2)}
.pnl-tbl tr.r-pct td{background:var(--s1);color:var(--t2);font-size:10px;font-style:italic}
.pnl-tbl tr.r-pct td:first-child{padding-left:22px}
.pnl-tbl tr.r-pct td:last-child{background:var(--s1)}
.pnl-neg{color:var(--red)!important}.pnl-pos{color:var(--grn)!important}

.bdg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600}
.bt{background:var(--teal3);color:var(--teal2)}.bg{background:var(--s2);color:var(--t2);border:1px solid var(--br)}
.by{background:var(--ylw2);color:#92400e}.bb{background:var(--blu2);color:#1e40af}
.br_{background:var(--red2);color:var(--red)}

.slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}
.tag-empresa{display:inline-block;font-size:10px;padding:2px 8px;border-radius:5px;font-weight:700;margin-right:4px}
.tag-ual{background:#dbeafe;color:#1d4ed8}
.tag-javpf{background:var(--grn2);color:var(--grn)}
.tag-javpnf{background:var(--ylw2);color:#92400e}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-icon"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></div>
  <div class="ld-title">Logistics Ultra — Finanzas</div>
  <div id="ld-msg">Cargando datos...</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<div class="app" id="app" style="display:none">
<aside class="sb">
  <div class="sb-brand">
    <div class="sb-ico"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></div>
    <div><div class="sb-n">Finanzas UAL</div><div class="sb-s">Estados de Cuenta</div></div>
  </div>
  <nav class="sb-nav">
    <div class="sb-sec">Resumen</div>
    <div class="ni on" onclick="goTab('resumen',this)"><svg viewBox="0 0 24 24"><path d="M3 13h2v8H3zm4-4h2v12H7zm4-4h2v16h-2zm4 8h2v8h-2zm4-4h2v12h-2z"/></svg>Resumen General</div>
    <div class="sb-sec">Por Empresa</div>
    <div class="ni" onclick="goTab('ual',this)"><svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>UAL</div>
    <div class="ni" onclick="goTab('javpf',this)"><svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 110 10A5 5 0 0112 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/></svg>JAVP Fiscal</div>
    <div class="ni" onclick="goTab('javpnf',this)"><svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 110 10A5 5 0 0112 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/></svg>JAVP No Fiscal</div>
    <div class="sb-sec">Analisis</div>

  </nav>
  <div class="sb-foot"><b id="sbInfo">10,596 movimientos</b>2024–2026 · UAL, JAVP</div>
</aside>

  <header class="top">
    <div class="top-tit" id="topTit">Resumen General</div>
    <div class="top-r">
      <select class="t-sel" id="yrSel" onchange="render()">
        <option value="all">Todos los anos</option>
        <option value="2024">2024</option>

        <option value="2026" selected>2026</option>
      </select>
      <button class="up-btn" onclick="recargarSheets()" style="display:flex;align-items:center;gap:5px">
        <span id="dot" class="dot"></span>Actualizar
      </button>

<script>
Chart.register(ChartDataLabels);
const MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const $=id=>document.getElementById(id);
const yr=()=>$('yrSel').value;
const fmt=n=>'$'+Math.round(Math.abs(n)).toLocaleString('es-MX');
const fmtK=n=>{const a=Math.abs(n);const s=n<0?'-':'';return s+(a>=1e6?'$'+(a/1e6).toFixed(2)+'M':a>=1e3?'$'+Math.round(a/1e3).toLocaleString('es-MX')+'k':fmt(a));}
const fmtN=n=>Math.round(n).toLocaleString('es-MX');
let CH={},curTab='resumen';
let curTipo='all',curSocio='all',curCl='all',curMes=-1;

// ── URLS GOOGLE SHEETS ───────────────────────────────────────────────────
const URL_EDO   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQkpD4FXJN1U4utikJMxC6msh-Zewt5YLl6SLTUnkg0yeCv_vxjyvX6JZbP4cMp-g/pub?gid=1477204894&single=true&output=csv';
const URL_FIJOS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQkpD4FXJN1U4utikJMxC6msh-Zewt5YLl6SLTUnkg0yeCv_vxjyvX6JZbP4cMp-g/pub?gid=1651919043&single=true&output=csv';

// Data loaded from Google Sheets (starts empty)
const RAW_DATA  = [];
const FIJOS_DATA = [];

// ── FILTER & AGG ──────────────────────────────────────────────────────────
function filtered(){
  let d = RAW_DATA;
  const y = yr();
  if(y!=='all') d=d.filter(r=>r[1]===parseInt(y));
  if(curTipo!=='all') d=d.filter(r=>r[0]===curTipo);
  if(curSocio!=='all') d=d.filter(r=>r[6]===curSocio);
  if(curCl!=='all') d=d.filter(r=>r[5]===curCl);
  if(curMes>=0) d=d.filter(r=>r[2]-1===curMes);
  return d;
}
function filteredByTipo(tipo){
  const y=yr();
  let d=RAW_DATA.filter(r=>r[0]===tipo);
  if(y!=='all') d=d.filter(r=>r[1]===parseInt(y));
  if(curMes>=0) d=d.filter(r=>r[2]-1===curMes);
  if(curSocio!=='all') d=d.filter(r=>r[6]===curSocio);
  if(curCl!=='all') d=d.filter(r=>r[5]===curCl);
  return d;
}
const sumDep=arr=>arr.reduce((s,r)=>s+r[3],0);
const sumRet=arr=>arr.reduce((s,r)=>s+r[4],0);
const byMesDep=(arr)=>MES.map((_,m)=>arr.filter(r=>r[2]-1===m).reduce((s,r)=>s+r[3],0));
const byMesRet=(arr)=>MES.map((_,m)=>arr.filter(r=>r[2]-1===m).reduce((s,r)=>s+r[4],0));
const uniq=(arr,i)=>[...new Set(arr.map(r=>r[i]).filter(Boolean))].sort();
const groupBy=(arr,i,valIdx)=>{
  const out={};
  arr.forEach(r=>{const k=r[i]||'Sin clasificar';if(!out[k])out[k]=0;out[k]+=r[valIdx];});
  return Object.entries(out).sort((a,b)=>b[1]-a[1]);
};

// ── CHART HELPERS ──────────────────────────────────────────────────────────
function mkBar(id,labels,datasets,cnt=false){
  const el=$(id);if(!el)return;
  CH[id]=new Chart(el,{type:'bar',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:datasets.length>1,position:'top',labels:{font:{size:11},color:'#475569',usePointStyle:true}},
      datalabels:{display:true,anchor:'end',align:'top',color:'#475569',font:{size:9},
        formatter:v=>v<=0?'':cnt?fmtN(v):fmtK(v)},
      tooltip:{callbacks:{label:c=>` ${fmtK(c.raw)}`}}},
    scales:{x:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},
            y:{ticks:{color:'#94a3b8',font:{size:10},callback:v=>fmtK(v)},grid:{color:'rgba(0,0,0,.04)'}}}
  }});
}
function mkBarH(id,labels,data,color='rgba(0,137,123,.75)'){
  const el=$(id);if(!el)return;
  CH[id]=new Chart(el,{type:'bar',data:{labels,datasets:[{data,backgroundColor:typeof color==='string'?color:color,borderRadius:4}]},options:{
    indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},datalabels:{display:true,anchor:'end',align:'right',color:'#475569',font:{size:10},formatter:v=>fmtK(v)},
      tooltip:{callbacks:{label:c=>` ${fmtK(c.raw)}`}}},
    scales:{x:{ticks:{color:'#94a3b8',font:{size:10},callback:v=>fmtK(v)},grid:{color:'rgba(0,0,0,.04)'}},
            y:{ticks:{color:'#475569',font:{size:10}},grid:{display:false}}}
  }});
}
function mkLine(id,labels,datasets){
  const el=$(id);if(!el)return;

// ── ROUTING ──────────────────────────────────────────────────────────────
const TABS={resumen:'Resumen General',ual:'UAL',javpf:'JAVP Fiscal',javpnf:'JAVP No Fiscal',
  socios:'Gastos por Socio',clasif:'Por Clasificacion',pnl:'P&L por Empresa',fijos:'Gastos Fijos'};
function goTab(name,el){
  curTab=name;curMes=-1;curSocio='all';curCl='all';curTipo='all';
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  el.classList.add('on');
  $('topTit').textContent=TABS[name];
  render();
}
function render(){
  Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={};
  if(curTab==='resumen')dResumen();
  else if(curTab==='ual')dEmpresa('UAL');
  else if(curTab==='javpf')dEmpresa('JAVP_Fiscal');
  else if(curTab==='javpnf')dEmpresa('JAVP_No_Fiscal');
  else if(curTab==='socios')dSocios();
  else if(curTab==='clasif')dClasif();
  else if(curTab==='pnl')dPNL();
  else if(curTab==='fijos')dFijos();
}

// ── FILTER BOX ────────────────────────────────────────────────────────────
function fbox(fields){
  return `<div class="fbox"><div class="fbox-hd">Filtros</div><div class="fbox-grid">${
    fields.map(f=>`<div class="fg"><label>${f.l}</label>${f.h}</div>`).join('')
  }</div></div>`;
}
function selMes(){return `<select class="f-sel" onchange="curMes=parseInt(this.value);render()"><option value="-1">Todos los meses</option>${MES.map((m,i)=>`<option value="${i}" ${curMes===i?'selected':''}>${m}</option>`).join('')}</select>`;}
function selSocio(arr){const opts=uniq(arr,6);return `<select class="f-sel" onchange="curSocio=this.value;render()"><option value="all">Todos los socios</option>${opts.map(o=>`<option value="${o}" ${curSocio===o?'selected':''}>${o}</option>`).join('')}</select>`;}
function selCl(arr){const opts=uniq(arr,5);return `<select class="f-sel" onchange="curCl=this.value;render()"><option value="all">Todas las clasificaciones</option>${opts.map(o=>`<option value="${o}" ${curCl===o?'selected':''}>${o}</option>`).join('')}</select>`;}

// ── SOCIOS ─────────────────────────────────────────────────────────────────
function dSocios(){
  const all=filtered().filter(r=>r[6]);
  const socios=[...new Set(all.map(r=>r[6]))].sort();
  const COLORS_SOC=['rgba(37,99,235,.75)','rgba(217,119,6,.75)','rgba(124,58,237,.75)'];

  const rows=socios.flatMap(s=>{
    const d=all.filter(r=>r[6]===s&&r[4]>0);
    const tot=d.reduce((a,r)=>a+r[4],0);
    const byC=groupBy(d,5,4).slice(0,8);
    return byC.map(([cl,v])=>`<tr>
      <td><span class="bdg by">${s}</span></td>
      <td>${cl}</td>
      <td class="r re">${fmt(v)}</td>
      <td class="r mu">${tot>0?(v/tot*100).toFixed(1):0}%</td>
    </tr>`);
  }).join('');

  const topSocD=socios.map(s=>({s,d:all.filter(r=>r[6]===s&&r[4]>0)}));
  const maxSoc=Math.max(...topSocD.map(x=>x.d.reduce((a,r)=>a+r[4],0)),1);

  $('main').innerHTML=
    fbox([
      {l:'Mes',h:selMes()},
      {l:'Clasificacion',h:selCl(all)},
    ])+
    `<div class="krow">
      ${socios.map((s,i)=>{
        const d=all.filter(r=>r[6]===s&&r[4]>0);
        const tot=d.reduce((a,r)=>a+r[4],0);
        return `<div class="kc"><div class="kc-hd"><div class="kl">Gasto ${s}</div><div class="ki y"><svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 110 10A5 5 0 0112 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/></svg></div></div><div class="kv y">${fmtK(tot)}</div><div class="kd">${fmtN(d.length)} movimientos</div></div>`;
      }).join('')}
    </div>
    <div class="cc"><div class="cc-t">Gastos por socio — mensual</div>
      <div style="position:relative;height:220px"><canvas id="cSm"></canvas></div>
    </div>
    <div class="g2">
      ${socios.map((s,i)=>{
        const d=all.filter(r=>r[6]===s&&r[4]>0);
        const byCl=groupBy(d,5,4).slice(0,8);
        return `<div class="cc"><div class="cc-t">Gasto ${s} — por clasificacion</div>
          <div style="position:relative;height:${Math.max(180,byCl.length*26+50)}px"><canvas id="cS${i}"></canvas></div>
        </div>`;
      }).join('')}

      <thead><tr><th>Socio</th><th>Clasificacion</th><th class="r">Monto</th><th class="r">%</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  // Monthly stacked by socio
  const ds=socios.map((s,i)=>({
    label:s,
    data:MES.map((_,m)=>all.filter(r=>r[6]===s&&r[4]>0&&r[2]-1===m).reduce((a,r)=>a+r[4],0)),
    backgroundColor:COLORS_SOC[i]||'rgba(124,58,237,.7)',borderRadius:4,
  }));
  mkBar('cSm',MES,ds);

  socios.forEach((s,i)=>{
    const d=all.filter(r=>r[6]===s&&r[4]>0);
    const byCl=groupBy(d,5,4).slice(0,8);
    mkBarH(`cS${i}`,byCl.map(([k])=>k),byCl.map(([,v])=>v),COLORS_SOC[i]);
  });

  }});
}

// ── P&L ─────────────────────────────────────────────────────────────────
function dPNL(){
  const tipos=['UAL','JAVP_Fiscal','JAVP_No_Fiscal'];
  const y=yr();
  function pnlForTipo(tipo){
    const d=RAW_DATA.filter(r=>r[0]===tipo&&(y==='all'||r[1]===parseInt(y)));
    const depM=MES.map((_,m)=>d.filter(r=>r[2]-1===m).reduce((s,r)=>s+r[3],0));
    const retM=MES.map((_,m)=>d.filter(r=>r[2]-1===m).reduce((s,r)=>s+r[4],0));
    const netoM=MES.map((_,m)=>depM[m]-retM[m]);
    // By clasificacion
    const cls=[...new Set(d.filter(r=>r[4]>0&&r[5]).map(r=>r[5]))].sort();
    const clLines=cls.map(cl=>({
      cl,
      mes:MES.map((_,m)=>d.filter(r=>r[5]===cl&&r[4]>0&&r[2]-1===m).reduce((s,r)=>s+r[4],0)),
      tot:d.filter(r=>r[5]===cl&&r[4]>0).reduce((s,r)=>s+r[4],0),
    })).sort((a,b)=>b.tot-a.tot);
    return {depM,retM,netoM,clLines,tDep:depM.reduce((s,v)=>s+v,0),tRet:retM.reduce((s,v)=>s+v,0)};
  }

  const pnl=tipos.map(pnlForTipo);
  const tagCls=['tag-ual','tag-javpf','tag-javpnf'];
  const tagLbl=['UAL','JAVP Fiscal','JAVP No Fiscal'];

  function buildPNLTable(p,i){
    const rows=[];
    const pc=(v)=>`<td class="${v<0?'pnl-neg':v>0?'pnl-pos':''}">${v?fmt(Math.abs(v)):'$0'}</td>`;
    const pct=(n,d)=>d?((n/d)*100).toFixed(1)+'%':'N/A';
    rows.push(`<tr class="r-ing"><td>INGRESOS</td>${p.depM.map(v=>pc(v)).join('')}<td>${fmt(p.tDep)}</td></tr>`);
    rows.push(`<tr class="r-sec"><td>(-) EGRESOS POR CLASIFICACION</td>${MES.map(()=>'<td></td>').join('')}<td>${fmt(p.tRet)}</td></tr>`);
    p.clLines.forEach(cl=>{
      if(cl.tot===0)return;
      rows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;${cl.cl}</td>${cl.mes.map(v=>`<td class="mu">${v?'('+fmt(v)+')':'—'}</td>`).join('')}<td class="re">(${fmt(cl.tot)})</td></tr>`);
    });
    rows.push(`<tr class="r-tot"><td>TOTAL EGRESOS</td>${p.retM.map(v=>`<td class="re">${v?'('+fmt(v)+')':'—'}</td>`).join('')}<td class="re">(${fmt(p.tRet)})</td></tr>`);
    rows.push(`<tr class="r-net"><td>NETO</td>${p.netoM.map(v=>pc(v)).join('')}<td>${fmt(Math.abs(p.tDep-p.tRet))}</td></tr>`);
    rows.push(`<tr class="r-pct"><td>&nbsp;&nbsp;% Margen</td>${p.netoM.map((v,m)=>`<td>${p.depM[m]?(v/p.depM[m]*100).toFixed(0)+'%':'N/A'}</td>`).join('')}<td>${p.tDep?((p.tDep-p.tRet)/p.tDep*100).toFixed(1)+'%':'N/A'}</td></tr>`);
    return rows.join('');
  }

  $('main').innerHTML=tipos.map((t,i)=>`
    <div class="slbl"><span class="tag-empresa ${tagCls[i]}">${tagLbl[i]}</span> — Estado de Resultados ${y==='all'?'todos los anos':y}</div>
    <div class="krow">
      <div class="kc"><div class="kc-hd"><div class="kl">Ingresos</div><div class="ki g"></div></div><div class="kv g">${fmtK(pnl[i].tDep)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Egresos</div><div class="ki r"></div></div><div class="kv r">${fmtK(pnl[i].tRet)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Neto</div><div class="ki t"></div></div><div class="kv ${pnl[i].tDep-pnl[i].tRet>=0?'t':'r'}">${fmtK(pnl[i].tDep-pnl[i].tRet)}</div><div class="kd">${pnl[i].tDep?((pnl[i].tDep-pnl[i].tRet)/pnl[i].tDep*100).toFixed(1)+'%':''}</div></div>
    </div>
    <div class="pnl-wrap"><table class="pnl-tbl">
      <thead><tr><th>${tagLbl[i]}</th>${MES.map(m=>`<th>${m}</th>`).join('')}<th>TOTAL</th></tr></thead>
      <tbody>${buildPNLTable(pnl[i],i)}</tbody>
    </table></div>`).join('');
}

// ── CSV PARSER ────────────────────────────────────────────────────────────
function parseCSV(txt, hdrRow=0){
  const lines = txt.trim().split('\n');
  const hdr   = lines[hdrRow].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(hdrRow+1).map(l=>{
    const vals=[]; let cur='', inQ=false;
    for(const ch of l){
      if(ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=ch;
    }
    vals.push(cur.trim());
    const o={};
    hdr.forEach((h,i)=>{ o[h]=(vals[i]||'').replace(/^"|"$/g,''); });
    return o;
  });
}

// ── KEYWORD AUTO-CLASSIFIER ───────────────────────────────────────────────
const KW_MAP=[
  ['Pago Alen',            ['ALEN','TM LOGISTICS','TM LOGI']],
  ['Pago TML',             ['TML','TRANS MERCA']],
  ['Pago TYT',             ['TYT']],
  ['Pago a Proveedores',   ['CITI MEXICO HR','RECIBIDO','DEPOSITO CLIENTE']],
  ['Nomina',               ['NOMINA','NÓMINA','SUELDO','SEMANADA']],
  ['Diesel',               ['DIESEL','GAS ROBLE','COMBUSTIBLE']],
  ['Casetas',              ['CASETA','TELEVIA','IAVE']],
  ['Mantenimiento',        ['MANTENIMIENTO','REFACCION','LLANTA','TALLER']],
  ['IMSS',                 ['IMSS','SEGURO SOCIAL']],
  ['Credito Konfio',       ['KONFIO']],
  ['Gastos Operativos',    ['SPEI','BXI','ORDEN DE PAGO','TRASP FONDOS','GASTO','COMPRA','PAYPAL','AMAZON']],
  ['Renta Camion y Caja',  ['RENTA CAMION','ARRENDAMIENTO']],
  ['Prestamo Alma',        ['ALMA PAEZ','GAGE830714']],
  ['Gasolina - Juan',      ['GASOLINA','GAS STATION','PEMEX']],
  ['Maniobras',            ['MANIOBRA']],
  ['Transpaso cuenta propia',['TRASPASO A CUENTA PROPIA','TRASPASA A CUENTA PROPIA']],
];
function autoClasifDesc(desc, dep, ret){
  if(dep>0 && ret===0) return 'Ingreso';
  const d = String(desc).toUpperCase();
  for(const [cat,keys] of KW_MAP) if(keys.some(k=>d.includes(k))) return cat;
  return '';
}

// ── EDO CTAS PROCESSOR ────────────────────────────────────────────────────
function processEdoCSV(rows){
  const out=[];
  for(const r of rows){
    // Get fecha - try multiple column names
    const fechaStr = r['Fecha']||r['FECHA']||r['fecha']||'';
    if(!fechaStr) continue;
    let yr=0, mes=0;
    const parts = fechaStr.split('/');
    if(parts.length===3){
      // dd/mm/yyyy
      yr  = parseInt(parts[2]);
      mes = parseInt(parts[1]);
    } else {
      const m = fechaStr.match(/(20\d{2})[\-\/](\d{1,2})/);
      if(m){ yr=parseInt(m[1]); mes=parseInt(m[2]); }
    }
    if(!yr || !mes) continue;

    const dep = parseFloat(String(r['Monto del deposito']||r['Monto del depósito']||r['Deposito']||0).replace(/[$,]/g,''))||0;
    const ret = parseFloat(String(r['Monto del retiro']||r['Retiro']||0).replace(/[$,]/g,''))||0;
    if(dep===0 && ret===0) continue;

    const clRaw = r['Clasificacion de gastos personales']||
                  r['Clasificación de gastos personales']||
                  r['Clasificacion']||r['Clasificación']||'';
    const cl = (clRaw && !clRaw.startsWith('=') && clRaw.trim())
               ? clRaw.trim()
               : autoClasifDesc(r['Descripcion']||r['Descripción']||'', dep, ret);

    const socio = r['Socio']||'';
    const tipo  = r['Tipo']||r['TIPO']||'';
    const desc  = (r['Descripcion']||r['Descripción']||'').substring(0,60);

    out.push([tipo, yr, mes, dep, ret, cl,
              (!socio||socio.startsWith('='))?'':socio,
              desc, '']);
  }
  return out;
}

// ── FIJOS PROCESSOR ───────────────────────────────────────────────────────
const MF_NAMES=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
                'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
function processFijosCSV(rows){
  if(!rows.length) return [];
  const keys     = Object.keys(rows[0]);
  const gastoKey = keys.find(k=>k.trim().toUpperCase()==='GASTO')||'GASTO';
  const clasKey  = keys.find(k=>k.trim().toLowerCase().includes('clasif'))||keys[0];
  const mesKeys  = MF_NAMES.map(m=>keys.find(k=>k.trim().toUpperCase()===m)||m);
  return rows
    .filter(r=>r[gastoKey]&&String(r[gastoKey]).trim())
    .map(r=>[
      String(r[clasKey]||'').trim(),
      String(r[gastoKey]||'').trim(),
      mesKeys.map(mk=>parseFloat(String(r[mk]||0).replace(/[$,]/g,''))||0),
    ]);
}

// ── LOAD FROM GOOGLE SHEETS ───────────────────────────────────────────────
async function loadFromSheets(){
  try{
    $('ld-msg').textContent='Cargando estado de cuentas...';
    const rEdo = await fetch(URL_EDO);
    if(!rEdo.ok) throw new Error('Error '+rEdo.status+' al cargar Edo Ctas');
    const tEdo = await rEdo.text();
    const rowsEdo = parseCSV(tEdo, 0);
    const processed = processEdoCSV(rowsEdo);
    RAW_DATA.length=0;
    processed.forEach(r=>RAW_DATA.push(r));

    $('ld-msg').textContent='Cargando gastos fijos...';
    const rFij = await fetch(URL_FIJOS_CSV);
    if(!rFij.ok) throw new Error('Error '+rFij.status+' al cargar Gastos Fijos');
    const tFij = await rFij.text();
    const rowsFij = parseCSV(tFij, 1); // row 1 = year labels, row 2 = headers
    const fijProcesados = processFijosCSV(rowsFij);
    FIJOS_DATA.length=0;
    fijProcesados.forEach(f=>FIJOS_DATA.push(f));

    const years=[...new Set(RAW_DATA.map(r=>r[1]))].sort();
    $('sbInfo').textContent=RAW_DATA.length.toLocaleString('es-MX')+' movimientos';

    $('loading').style.display='none';
    $('app').style.display='flex';
    render();
  }catch(e){
    $('ld-msg').textContent='Error al cargar datos';
    const existing = document.querySelector('#loading .err-msg');
    if(!existing){
      const err=document.createElement('div');
      err.className='err-msg';
      err.style.cssText='background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:#fca5a5;padding:10px 18px;border-radius:8px;font-size:12px;max-width:420px;text-align:center;margin-top:8px;line-height:1.6';
      err.textContent=e.message+'. Asegurate de abrir desde GitHub Pages (https://), no desde tu disco (file://).';
      $('loading').appendChild(err);
    }
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadFromSheets();

// ── ACTUALIZAR BUTTON ─────────────────────────────────────────────────────
function recargarSheets(){
  $('loading').style.display='flex';
  $('app').style.display='none';
  $('ld-msg').textContent='Actualizando datos...';
  loadFromSheets();
