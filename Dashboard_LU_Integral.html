function renderMeta30(rows){
  var MAX_BARS = 180;

  function drawMetaChart(canvasId, META, lineColor, suffixId, field, fieldLabel){
    // Days with < 30% of day capacity = effectively no operation (inhábil/festivo)
    var dayCap30 = function(date){ return Math.round(getDayCap(date)*0.3)||1; };
    var active = rows.filter(function(r){return (r[field]||0)>=dayCap30(r.date);});
    var filtered = active.slice().sort(function(a,b){return a.date<b.date?-1:1;});
    var zero  = rows.filter(function(r){return (r[field]||0)<dayCap30(r.date);}).length;
    // Use per-day scaled meta: getDayCap(date)/28 * META
    // A day "meets meta" if cargados >= that day's scaled target
    var exact = filtered.filter(function(r){
      var dayMeta=Math.round(getDayCap(r.date)/28*META);
      return (r[field]||0)===dayMeta;
    }).length;
    var over  = filtered.filter(function(r){
      var dayMeta=Math.round(getDayCap(r.date)/28*META);
      return (r[field]||0)>dayMeta;
    }).length;
    var under = filtered.filter(function(r){
      var dayMeta=Math.round(getDayCap(r.date)/28*META);
      var v=r[field]||0;
      return v>0&&v<dayMeta;
    }).length;
    var peakVal = filtered.length ? Math.max.apply(null, filtered.map(function(r){return r[field]||0;})) : 0;
    var peakPct = META>0 ? Math.round(peakVal/META*10)/10 : 0;
    var el;
    el=document.getElementById('cntExact'+suffixId); if(el) el.textContent=exact;
    el=document.getElementById('cntOver'+suffixId);  if(el) el.textContent=over;
    el=document.getElementById('cntUnder'+suffixId); if(el) el.textContent=under;
    el=document.getElementById('cntZero'+suffixId);  if(el) el.textContent=zero;
    el=document.getElementById('cntPeak'+suffixId);  if(el) el.textContent=Math.round(peakVal/META*1000)/10+'%';
    // met = days where actual >= day's scaled meta (includes exact and over)
    var met=filtered.filter(function(r){
      var dayMeta=Math.round(getDayCap(r.date)/28*META);
      return (r[field]||0)>=dayMeta&&(r[field]||0)>0;
    }).length;
    el=document.getElementById('cntMet'+suffixId);   if(el) el.textContent=met;

    var display = filtered.length > MAX_BARS ? filtered.slice(filtered.length - MAX_BARS) : filtered;
    var labels  = display.map(function(r){ return r.date.substring(5); });
    var vals    = display.map(function(r){ return r[field]||0; });
    var yMax    = Math.max(META*1.6|0, Math.max.apply(null,vals.concat([0]))*1.08|0);

    var colors = display.map(function(r){
      var v=r[field]||0;
      var dayMeta=Math.round(getDayCap(r.date)/28*META);
      if(v===0)         return 'rgba(239,68,68,0.70)';
      if(v===dayMeta)   return 'rgba(22,163,74,0.80)';
      if(v>dayMeta)     return 'rgba(37,99,235,0.75)';
      return 'rgba(148,163,184,0.55)';
    });

    // Dynamic meta line: per-day capacity scaled to this chart's META
    // For cargado charts: cap = getDayCap(date), for total: cap*49/28
    var metaLine = display.map(function(r){
      var base = getDayCap(r.date); // 0, 14, or 28
      if(field==='total') return Math.round(base/28*META);
      if(field==='cargado') return Math.round(base/28*META);
      return Math.round(base/28*META);
    });

    mk(canvasId,'bar',{
      labels: labels,
      datasets:[
        {label:fieldLabel+'/día',data:vals,backgroundColor:colors,borderRadius:2,borderSkipped:false,datalabels:{display:false}},
        {label:'Meta',data:metaLine,type:'line',borderColor:lineColor,backgroundColor:'transparent',
         borderWidth:2,pointRadius:0,borderDash:[6,4],
         datalabels:{display:false},order:0}
      ]
    },{
      scales:{
        x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:7},maxRotation:90,autoSkip:true,maxTicksLimit:30}},
        y:{grid:{color:'rgba(0,0,0,0.04)'},min:0,max:yMax,
           ticks:{color:'#94a3b8',font:{size:10}},
           title:{display:true,text:fieldLabel,color:'#94a3b8',font:{size:10}}}
      },
      plugins:{
        tooltip:{callbacks:{
          title:function(items){return display[items[0].dataIndex]?display[items[0].dataIndex].date:'';},
          label:function(c){
            if(c.dataset.label==='Meta') return 'Meta ese día: '+c.parsed.y+' '+fieldLabel;
            var v=c.parsed.y;
            var dayM=metaLine[c.dataIndex]||META;
            var flag=v===0?'sin operación':v>=dayM?'✓ meta cumplida ('+dayM+')':'✗ bajo meta ('+dayM+')';
            return v+' '+fieldLabel+' — '+flag;
          }
        }},
        legend:{display:false}
      }
    });
  }

  drawMetaChart('cMeta28', 28, '#f59e0b', '28', 'cargado', 'Cargados');
  drawMetaChart('cMeta30', 30, '#ef4444', '30', 'cargado', 'Cargados');
  drawMetaChart('cMeta49', 49, '#8b5cf6', '49', 'total',   'Total (C+V)');
}

function renderProd(){
  var field = SEL.prodVista==='cargados'?'cargado':SEL.prodVista==='vacios'?'vacio':'total';
  var denom = SEL.prodVista==='cargados'?28:SEL.prodVista==='vacios'?19:49;
  var vistaLbl = SEL.prodVista==='cargados'?'Cargados':SEL.prodVista==='vacios'?'Vacíos':'Total';

  var pvM=document.getElementById('pvMedia');
  if(pvM) pvM.textContent='Media diaria '+vistaLbl+': '+denom+' viajes/día';

  // ── helper: avg % of daily values in a row array ──────────────────────────
  function avgPctRows(rows){
    var active=rows.filter(function(r){return (r[field]||0)>0;});
    if(!active.length) return null;
    return Math.round(active.reduce(function(s,r){return s+(r[field]||0)/denom*100;},0)/active.length*10)/10;
  }

  // ── filtered data respecting RNG + year + month ───────────────────────────
  var curRows = filtDay();   // already applies RNG.a/b + SEL.yr + SEL.mes
  var prevRows = filtDayPrev();

  var curYr  = SEL.yr==='all'?2025:SEL.yr;
  var py     = prevYr(curYr);
  var yrs    = SEL.yr==='all'?[2024,2025,2026]:[curYr];

  // ── KPI values from filtered rows ─────────────────────────────────────────
  // Year avg = avgPct of curRows (already filtered)
  var yP = avgPctRows(curRows)||0;
  // prev year for delta — use filtDayPrev (same month filter, prev year)
  var yP0 = prevRows.length ? avgPctRows(prevRows) : null;
  var dlt = SEL.vs&&yP0!=null ? Math.round((yP-yP0)*10)/10 : null;

  // Best/worst month within filtered range
  var MES_K_IDX2={1:'Ene',2:'Feb',3:'Mar',4:'Abr',5:'May',6:'Jun',7:'Jul',8:'Ago',9:'Sep',10:'Oct',11:'Nov',12:'Dic'};
  var mesPcts={};
  for(var m=1;m<=12;m++){
    var mr=curRows.filter(function(r){return r.month===m;});
    var v=avgPctRows(mr);
    if(v!==null) mesPcts[MES_K_IDX2[m]]=v;
  }
  var mesEntries=Object.entries(mesPcts);
  var bestM  = mesEntries.length?mesEntries.reduce(function(a,b){return b[1]>a[1]?b:a;},['--',0]):['--',0];
  var worstM = mesEntries.length?mesEntries.reduce(function(a,b){return b[1]<a[1]?b:a;},['--',999]):['--',0];

  // Best DOW within filtered range
  var DOW_K2={0:'Dom',1:'Lun',2:'Mar',3:'Mié',4:'Jue',5:'Vie',6:'Sáb'};
  var dowPcts={};
  for(var d=0;d<7;d++){
    var dr=curRows.filter(function(r){return r.dow===d;});
    var vd=avgPctRows(dr);
    if(vd!==null) dowPcts[DOW_K2[d]]=vd;
  }
  var dowEntries=Object.entries(dowPcts);
  var bestDow=dowEntries.length?dowEntries.reduce(function(a,b){return b[1]>a[1]?b:a;},['--',0]):['--',0];

  // Best single day
  var activeRows=curRows.filter(function(r){return (r[field]||0)>0;});
  var bestDay=activeRows.length?activeRows.reduce(function(a,b){return (b[field]||0)>(a[field]||0)?b:a;}):null;
  var bestDayPct=bestDay?Math.round(bestDay[field]/denom*1000)/10:0;
  var bestDayLbl=bestDay&&bestDay.date?bestDay.date.split('-').slice(1).reverse().join('/'):'--';

  // ── KPIs ──────────────────────────────────────────────────────────────────
  var periodLbl=SEL.yr==='all'?'periodo filtrado':String(curYr);
  var prev2024=avgPctRows(D.daily.filter(function(r){return r.year===2024&&(r[field]||0)>0;}))||0;
  var prev2026=avgPctRows(D.daily.filter(function(r){return r.year===2026&&(r[field]||0)>0;}))||0;
  // Working days breakdown for filtered period
  var _wdFull=0,_wdHalf=0,_wdZero=0,_wdCap=0;
  var _seenMon={};
  curRows.forEach(function(r){var k=r.year+'-'+r.month;_seenMon[k]={yr:r.year,mo:r.month};});
  Object.values(_seenMon).forEach(function(ym){
    var mm=getMonthMeta(ym.yr,ym.mo);
    if(mm){_wdFull+=mm.full;_wdHalf+=mm.half;_wdZero+=mm.zero;_wdCap+=mm.cap28;}
  });
  var _wdTotal=_wdFull+_wdHalf+_wdZero;

  document.getElementById('kProd').innerHTML=
    mkPKpi('Promedio '+periodLbl,yP.toFixed(1),'2024: '+prev2024.toFixed(1)+'% · 2026: '+prev2026.toFixed(1)+'%',dlt,C.teal)+
    mkPKpi('Día pico',bestDayPct.toFixed(1),bestDayLbl+' · '+Math.round(bestDayPct*denom/100)+' viajes',null,'#f59e0b')+
    mkPKpi('Mejor mes',bestM[1].toFixed?bestM[1].toFixed(1):String(bestM[1]),bestM[0]+' '+curYr,null,C.green)+
    mkPKpi('Peor mes',worstM[1].toFixed?worstM[1].toFixed(1):String(worstM[1]),worstM[0]+' '+curYr,null,'#ef4444')+
    mkPKpi('Días hábiles',_wdFull,'de '+_wdTotal+' días · '+_wdHalf+' medio día',null,C.teal)+
    mkPKpi('Inhábiles+½ día',_wdZero+' / '+_wdHalf,'Cap real: '+_wdCap.toLocaleString('es-MX')+' cargados posibles',null,'#94a3b8')+
    mkPKpi('Día más productivo',bestDow[1].toFixed?bestDow[1].toFixed(1):String(bestDow[1]),bestDow[0],null,C.teal2);

  var mesStr2=SEL.mes!=='all'?' · '+MES_N[SEL.mes]:'';
  // Working days KPI
  var labDaysTotal=0, inhTotal=0, halfTotal=0, capTotal=0;
  var filtMonths={};
  curRows.forEach(function(r){var k=r.year+'-'+r.month;filtMonths[k]={yr:r.year,mo:r.month};});
  Object.values(filtMonths).forEach(function(ym){var mm=getMonthMeta(ym.yr,ym.mo);if(mm){labDaysTotal+=mm.full;inhTotal+=mm.zero;halfTotal+=mm.half;capTotal+=mm.cap28;}});

  // Build inhábiles detail note
  var inh_note = '<div style="margin-top:8px;padding:8px 12px;background:#f8fafc;border-radius:8px;border-left:3px solid #0d9488;font-size:10px;color:#475569;line-height:1.7">'
    +'<b style="color:#0d4f3c">Días considerados en el cálculo · '+curYr+'</b><br>'
    +'<span style="color:#16a34a">✓ Días hábiles completos: <b>'+labDaysTotal+'</b></span> · '
    +'<span style="color:#f59e0b">½ Medio día (último mes + 2° viernes): <b>'+halfTotal+'</b> · meta '+Math.round(28*8/24)+' carg.</span> · '
    +'<span style="color:#ef4444">✗ Inhábiles: <b>'+inhTotal+'</b></span><br>'
    +'<b style="color:#475569">Inhábiles oficiales LFT:</b> 1° Ene · 1er Lun Feb (5 Feb) · 3er Lun Mar (21 Mar) · 1° May · 16 Sep · 3er Lun Nov (20 Nov) · 25 Dic<br>'
    +'<b style="color:#475569">No oficiales Alen:</b> 24 Dic · 31 Dic · Viernes Santo · Sábado Santo · Domingo de Pascua<br>'
    +'<b style="color:#0d9488">Capacidad real del periodo: <b>'+capTotal.toLocaleString('es-MX')+'</b> cargados posibles</b>'
    +'</div>';

  document.getElementById('noteP').innerHTML=
    'Productividad '+curYr+mesStr2+': <strong>'+yP.toFixed(1)+'%</strong>'+
    (py&&yP0!=null?' vs <strong>'+yP0.toFixed(1)+'%</strong> en '+py:'')+
    (bestM[0]!=='--'?'. Mejor mes: <strong>'+bestM[0]+'</strong>':'')+
    '. Día más puntual: <strong>'+bestDow[0]+'</strong>.'
    + inh_note;

  // ── Chart data built live from curRows ────────────────────────────────────
  var PCOLS={2024:C.slate2,2025:C.teal,2026:C.teal2};

  // Build per-year, per-month avg pcts for chart — using ALL D.daily per year (for multi-year view)
  // but filtered by RNG date range
  var dA=ALL_DATES[RNG.a], dB=ALL_DATES[RNG.b];
  function rowsForYr(yr){
    return D.daily.filter(function(r){
      if(r.date<dA||r.date>dB) return false;
      if(yr!=='all'&&r.year!==yr) return false;
      return true;
    });
  }

  var mkF = SEL.mes==='all'?MES_K:[MES_K[SEL.mes-1]];
  var pmDS=yrs.map(function(y){
    var yrows=rowsForYr(y);
    return {
      label:String(y),
      data:mkF.map(function(m){
        var mi=MES_I[m];
        var mr=yrows.filter(function(r){return r.month===mi;});
        var v=avgPctRows(mr);
        return v!=null?parseFloat(v.toFixed(1)):null;
      }),
      borderColor:PCOLS[y]||C.slate2,
      backgroundColor:(PCOLS[y]||C.slate2)+'22',
      fill:yrs.length===1,borderWidth:yrs.length===1?2:1.5,
      pointRadius:3,tension:.3,spanGaps:false,
      datalabels:{display:true,align:'top',anchor:'top',color:PCOLS[y]||C.slate2,font:{size:8,weight:'600'},formatter:function(v){return v!=null?v+'%':'';}},
    };
  });
  if(SEL.vs&&py&&yrs.length===1){
    var pyrows=rowsForYr(py);
    pmDS.push({label:String(py),data:mkF.map(function(m){var mi=MES_I[m];var mr=pyrows.filter(function(r){return r.month===mi;});var v=avgPctRows(mr);return v!=null?parseFloat(v.toFixed(1)):null;}),borderColor:C.amber,backgroundColor:'transparent',borderWidth:1.5,pointRadius:2,tension:.3,spanGaps:false,borderDash:[4,3],datalabels:DL_OFF});
  }
  document.getElementById('lgPM').innerHTML=yrs.map(function(y){return '<div class="li"><div class="ld" style="background:'+PCOLS[y]+'"></div>'+y+'</div>';}).join('')+(SEL.vs&&py&&yrs.length===1?'<div class="li"><div class="ld" style="background:'+C.amber+'"></div>'+py+' ant</div>':'');
  document.getElementById('ctPM').innerHTML='% PROD. POR MES <em>'+yrs.join(' / ')+'</em>';
  
  
  mk('cPM','line',{labels:mkF,datasets:pmDS},{scales:{x:ax,y:{...ax,min:0,max:120,ticks:{color:TC,font:{size:11},callback:function(v){return v+'%';}}}},'plugins':{tooltip:{mode:'index',intersect:false,callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y+'%':'N/D');}}}}});

  var pdDS=yrs.map(function(y){
    var yrows=rowsForYr(y);
    return {
      label:String(y),
      data:DIAS.map(function(d){
        var di=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].indexOf(d);
        // D.daily dow: 0=Dom,1=Lun...6=Sáb
        var dowIdx=[1,2,3,4,5,6,0][di];
        var dr=yrows.filter(function(r){return r.dow===dowIdx;});
        var v=avgPctRows(dr);
        return v!=null?parseFloat(v.toFixed(1)):null;
      }),
      backgroundColor:(PCOLS[y]||C.slate2)+'aa',borderRadius:3,
      datalabels:{display:true,anchor:'end',align:'end',color:PCOLS[y]||C.slate2,font:{size:9,weight:'700'},formatter:function(v){return v!=null?v+'%':'';}},
    };
  });
  if(SEL.vs&&py&&yrs.length===1){
    var pyrows2=rowsForYr(py);
    pdDS.push({label:String(py),data:DIAS.map(function(d){var di=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].indexOf(d);var dowIdx=[1,2,3,4,5,6,0][di];var dr=pyrows2.filter(function(r){return r.dow===dowIdx;});var v=avgPctRows(dr);return v!=null?parseFloat(v.toFixed(1)):null;}),backgroundColor:C.amber+'44',borderRadius:3,datalabels:DL_OFF});
  }
  document.getElementById('lgPD').innerHTML=yrs.map(function(y){return '<div class="li"><div class="ld" style="background:'+PCOLS[y]+'"></div>'+y+'</div>';}).join('');
  document.getElementById('ctPD').innerHTML='% PROD. POR DÍA <em>'+yrs.join(' / ')+'</em>';
  mk('cPD','bar',{labels:DIAS,datasets:pdDS},{scales:{x:ax,y:{...ax,min:0,max:120,ticks:{color:TC,font:{size:11},callback:function(v){return v+'%';}}}},'plugins':{tooltip:{mode:'index',intersect:false,callbacks:{label:function(c){return c.dataset.label+': '+c.parsed.y+'%';}}}}});

  var allW=Array.from({length:52},function(_,i){return i+1;});
  var psDS=yrs.map(function(y){
    var yrows=rowsForYr(y);
    return {
      label:String(y),
      data:allW.map(function(w){
        var wr=yrows.filter(function(r){return r.week===w;});
        var v=avgPctRows(wr);
        return v!=null?parseFloat(v.toFixed(1)):null;
      }),
      borderColor:PCOLS[y]||C.slate2,backgroundColor:'transparent',
      borderWidth:yrs.length===1?2:1.5,pointRadius:1.5,tension:.3,spanGaps:false,
      datalabels:{display:yrs.length<=2,align:'top',anchor:'top',color:PCOLS[y]||C.slate2,font:{size:7},formatter:function(v){return v!=null?v+'%':'';}},
    };
  });
  if(SEL.vs&&py&&yrs.length===1){
    var pyrows3=rowsForYr(py);
    psDS.push({label:String(py),data:allW.map(function(w){var wr=pyrows3.filter(function(r){return r.week===w;});var v=avgPctRows(wr);return v!=null?parseFloat(v.toFixed(1)):null;}),borderColor:C.amber,backgroundColor:'transparent',borderWidth:1.5,pointRadius:1,tension:.3,spanGaps:false,borderDash:[4,3],datalabels:DL_OFF});
  }
  document.getElementById('lgPS').innerHTML=yrs.map(function(y){return '<div class="li"><div class="ld" style="background:'+PCOLS[y]+'"></div>'+y+'</div>';}).join('');
  document.getElementById('ctPS').innerHTML='% PROD. POR SEMANA <em>'+yrs.join(' / ')+'</em>';
  mk('cPS','line',{labels:allW.map(function(w){return 'S'+w;}),datasets:psDS},{scales:{x:{...ax,ticks:{color:TC,font:{size:9},autoSkip:true,maxTicksLimit:13}},y:{...ax,min:0,max:120,ticks:{color:TC,font:{size:11},callback:function(v){return v+'%';}}}},'plugins':{tooltip:{mode:'index',intersect:false,callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y!=null?c.parsed.y+'%':'N/D');}}}}});

  // DOW ranking bar
  var dEntries=Object.entries(dowPcts).sort(function(a,b){return b[1]-a[1];});
  var mxDP=dEntries.length?dEntries[0][1]:1;
  document.getElementById('rkD').innerHTML=dEntries.map(function(e,i){var pv=e[1];var col=pv>=100?C.green:pv>=70?C.teal:C.slate;return '<div class="rr"><div style="font-size:10px;color:'+C.slate2+';width:14px">'+(i+1)+'</div><div class="rn">'+e[0]+'</div><div class="rbw"><div class="rb" style="width:'+Math.round(pv/mxDP*100)+'%;background:'+col+'"></div></div><div class="rv" style="color:'+col+'">'+pv.toFixed(1)+'%</div></div>';}).join('');

  updateProdCard();
  renderMeta30(curRows);
}


// ============ MANTENIMIENTOS ============

  {year:2025,month:7,mes:'Jul',cargados:636,facturado:1122960.81,cu:1765.66},

function renderCosto(){
  function mxn(v){return '$'+v.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});}
  var dA=ALL_DATES[RNG.a], dB=ALL_DATES[RNG.b];
  var rows=CU_DATA.filter(function(r){
    var ds=String(r.year)+'-'+(r.month<10?'0':'')+String(r.month);
    if(ds<dA.substring(0,7)||ds>dB.substring(0,7)) return false;
    if(SEL.yr!=='all'&&r.year!==SEL.yr) return false;
    if(SEL.mes!=='all'&&r.month!==SEL.mes) return false;
    return true;
  });
  if(!rows.length){
    document.getElementById('cuKpis').innerHTML='<div style="color:var(--slate2);padding:20px;text-align:center">Sin datos para el periodo seleccionado</div>';
    document.getElementById('cuTable').innerHTML='';
    return;
  }
  var totalCarg=rows.reduce(function(s,r){return s+r.cargados;},0);
  var totalFact=rows.reduce(function(s,r){return s+r.facturado;},0);
  var cuProm=totalCarg>0?totalFact/totalCarg:0;
  var maxFact=rows.reduce(function(a,r){return r.facturado>a.facturado?r:a;},rows[0]);
  var minFact=rows.reduce(function(a,r){return r.facturado<a.facturado?r:a;},rows[0]);
  var maxCU=rows.reduce(function(a,r){return r.cu>a.cu?r:a;},rows[0]);
  var minCU=rows.reduce(function(a,r){return r.cu<a.cu?r:a;},rows[0]);

  document.getElementById('cuKpis').innerHTML=
    '<div class="kpi" style="border-top:2px solid var(--teal)"><div class="klbl">Total facturado</div><div class="kval" style="color:var(--teal)">'+mxn(totalFact)+'</div><div class="ksub">'+totalCarg.toLocaleString('es-MX')+' mov cargados</div></div>'+
    '<div class="kpi" style="border-top:2px solid var(--teal)"><div class="klbl">CU promedio</div><div class="kval" style="color:var(--teal)">'+mxn(cuProm)+'</div><div class="ksub">por movimiento cargado</div></div>'+
    '<div class="kpi" style="border-top:2px solid #16a34a"><div class="klbl">Mayor facturación</div><div class="kval" style="color:#16a34a">'+mxn(maxFact.facturado)+'</div><div class="ksub">'+maxFact.mes+' '+maxFact.year+'</div></div>'+
    '<div class="kpi" style="border-top:2px solid #ef4444"><div class="klbl">Menor facturación</div><div class="kval" style="color:#ef4444">'+mxn(minFact.facturado)+'</div><div class="ksub">'+minFact.mes+' '+minFact.year+'</div></div>'+
    '<div class="kpi" style="border-top:2px solid #f59e0b"><div class="klbl">CU más alto</div><div class="kval" style="color:#f59e0b">'+mxn(maxCU.cu)+'</div><div class="ksub">'+maxCU.mes+' '+maxCU.year+'</div></div>'+
    '<div class="kpi" style="border-top:2px solid #64748b"><div class="klbl">CU más bajo</div><div class="kval" style="color:#64748b">'+mxn(minCU.cu)+'</div><div class="ksub">'+minCU.mes+' '+minCU.year+'</div></div>';

  var lbls=rows.map(function(r){return r.mes+' '+String(r.year).slice(2);});
  var cuVals=rows.map(function(r){return r.cu;});
  var cargVals=rows.map(function(r){return r.cargados;});
  var factVals=rows.map(function(r){return Math.round(r.facturado);});

  mk('cCuLine','line',{labels:lbls,datasets:[
    {label:'CU ($/mov)',data:cuVals,borderColor:'#0d9488',backgroundColor:'rgba(13,148,136,0.08)',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#0d9488',tension:0.3,fill:true,yAxisID:'yCU',
      datalabels:{display:function(ctx){return ctx.dataIndex%2===0;},align:'top',anchor:'top',color:'#0d9488',font:{size:7,weight:'700'},formatter:function(v){return '$'+v.toLocaleString('es-MX');}}},
    {label:'Mov cargados',data:cargVals,type:'bar',backgroundColor:'rgba(148,163,184,0.3)',borderRadius:3,yAxisID:'yMov',
      datalabels:{display:true,align:'end',anchor:'end',color:'#94a3b8',font:{size:8},formatter:function(v){return v;}}}
  ]},{
    scales:{
      x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:9},maxRotation:45}},
      yCU:{position:'left',grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#0d9488',font:{size:10},callback:function(v){return '$'+v.toLocaleString('es-MX');}},title:{display:true,text:'CU $/mov',color:'#0d9488',font:{size:10}}},
      yMov:{position:'right',grid:{display:false},ticks:{color:'#94a3b8',font:{size:10}},title:{display:true,text:'Movimientos',color:'#94a3b8',font:{size:10}}}
    },
    plugins:{tooltip:{mode:'index',intersect:false,callbacks:{label:function(c){return c.dataset.yAxisID==='yCU'?'CU: $'+c.parsed.y.toLocaleString('es-MX',{minimumFractionDigits:2}):'Movimientos: '+c.parsed.y;}}}}
  });

  var cuColors=cuVals.map(function(v){return v>=2000?'rgba(239,68,68,0.75)':v>=1800?'rgba(245,158,11,0.75)':'rgba(13,148,136,0.75)';});
  mk('cCuBar','bar',{labels:lbls,datasets:[
    {label:'Facturado ($)',data:factVals,backgroundColor:cuColors,borderRadius:4,
      datalabels:{display:true,anchor:'end',align:'top',rotation:-90,color:'#fff',font:{size:7,weight:'700'},formatter:function(v){return '$'+(v/1000).toFixed(0)+'k';}}}
  ]},{
    scales:{
      x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:9},maxRotation:45}},
      y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#94a3b8',font:{size:10},callback:function(v){return '$'+(v/1000000).toFixed(1)+'M';}}}
    },
    plugins:{tooltip:{callbacks:{label:function(c){return 'Facturado: $'+c.parsed.y.toLocaleString('es-MX',{minimumFractionDigits:2});}}}}
  });

  // Table with year subtotals
  var byYear={};
  rows.forEach(function(r){
    var k=String(r.year);
    if(!byYear[k]){byYear[k]={rows:[],carg:0,fact:0};}
    byYear[k].rows.push(r);
    byYear[k].carg+=r.cargados;
    byYear[k].fact+=r.facturado;
  });
  var grandFact=rows.reduce(function(s,r){return s+r.facturado;},0);
  var grandCarg=rows.reduce(function(s,r){return s+r.cargados;},0);
  var maxRowFact=Math.max.apply(null,rows.map(function(r){return r.facturado;}));
  var TH='font-size:10px;font-weight:700;color:#fff;padding:8px 12px;text-align:right;';
  var THL='font-size:10px;font-weight:700;color:#fff;padding:8px 12px;text-align:left;';
  var TD='font-size:11px;padding:7px 12px;text-align:right;color:#1e293b;';
  var TDL='font-size:11px;padding:7px 12px;text-align:left;color:#1e293b;';
  var tbl='<table style="width:100%;border-collapse:collapse;">';
  tbl+='<thead><tr style="background:#0d4f3c;"><th style="'+THL+'">Año / Mes</th><th style="'+TH+'">Mov Cargados</th><th style="'+TH+'">Facturado</th><th style="'+TH+'">Costo Unitario</th><th style="'+TH+'">% del total</th></tr></thead><tbody>';
  var ri=0;
  Object.keys(byYear).sort().forEach(function(yr){
    var yd=byYear[yr];
    var yrCU=yd.carg>0?yd.fact/yd.carg:0;
    tbl+='<tr style="background:#e8f5f0;"><td style="'+TDL+'font-weight:800;color:#0d4f3c;">⊞ '+yr+'</td><td style="'+TD+'font-weight:800;">'+yd.carg.toLocaleString('es-MX')+'</td><td style="'+TD+'font-weight:800;">'+mxn(yd.fact)+'</td><td style="'+TD+'font-weight:800;">'+mxn(yrCU)+'</td><td style="'+TD+'font-weight:800;">'+(grandFact>0?(yd.fact/grandFact*100).toFixed(1):'—')+'%</td></tr>';
    yd.rows.forEach(function(r){
      var cuColor=r.cu>=2000?'#dc2626':r.cu>=1800?'#d97706':'#0d9488';
      var bg=ri%2===0?'#fff':'#f8fafb'; ri++;
      var barW=maxRowFact>0?Math.round(r.facturado/maxRowFact*100):0;
      var pct=grandFact>0?(r.facturado/grandFact*100).toFixed(1):0;
      tbl+='<tr style="background:'+bg+';border-bottom:1px solid #f1f5f9;">';
      tbl+='<td style="'+TDL+'padding-left:28px;color:#475569;">'+r.mes+'</td>';
      tbl+='<td style="'+TD+'">'+r.cargados.toLocaleString('es-MX')+'</td>';
      tbl+='<td style="'+TD+'"><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end"><div style="width:60px;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden"><div style="width:'+barW+'%;height:100%;background:#0d9488;border-radius:3px"></div></div>'+mxn(r.facturado)+'</div></td>';
      tbl+='<td style="'+TD+'font-weight:700;color:'+cuColor+';">'+mxn(r.cu)+'</td>';
      tbl+='<td style="'+TD+'color:#64748b;">'+pct+'%</td></tr>';
    });
  });
  tbl+='<tr style="background:#0d4f3c;"><td style="'+THL+'font-size:11px;">TOTAL GENERAL</td><td style="'+TH+'font-size:12px;">'+grandCarg.toLocaleString('es-MX')+'</td><td style="'+TH+'font-size:12px;">'+mxn(grandFact)+'</td><td style="'+TH+'font-size:12px;">'+mxn(grandCarg>0?grandFact/grandCarg:0)+'</td><td style="'+TH+'">100%</td></tr>';
  tbl+='</tbody></table>';
  document.getElementById('cuTable').innerHTML=tbl;
}
