<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logistics Ultra — Dashboard Integral</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root{
  --teal:#00897B; --teal2:#00796B; --teal3:#e0f2f1; --teal4:#b2dfdb;
  --nav:#1e2d3d; --nav2:#253649;
  --bg:#f0f4f8; --s0:#fff; --s1:#f7fafc; --s2:#edf2f7;
  --grn:#059669; --grn2:#d1fae5;
  --red:#dc2626; --red2:#fee2e2;
  --ylw:#d97706; --ylw2:#fef3c7;
  --blu:#2563eb; --blu2:#dbeafe;
  --pur:#7c3aed; --pur2:#ede9fe;
  --t0:#0f172a; --t1:#1e293b; --t2:#475569; --t3:#94a3b8;
  --br:#e2e8f0; --br2:#cbd5e1;
  --r:10px; --r2:7px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 2px 10px rgba(0,0,0,.04);
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;background:var(--bg);color:var(--t1)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--nav);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.ld-icon{width:88px;height:88px;background:var(--teal);border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,137,123,.4)}
.ld-icon svg{width:46px;height:46px;fill:#fff}
.ld-title{color:#fff;font-size:24px;font-weight:700;letter-spacing:-.3px;margin-top:4px}
#ld-msg{color:rgba(255,255,255,.45);font-size:13px;margin-top:-6px}
.ld-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin-top:4px}
.ld-fill{height:100%;background:var(--teal);border-radius:99px;animation:lbar 2.5s ease-in-out infinite}
@keyframes lbar{0%{width:0%}70%{width:85%}100%{width:100%}}
#ld-err{display:none;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.3);color:#fca5a5;padding:10px 18px;border-radius:8px;font-size:12px;max-width:400px;text-align:center;line-height:1.5;margin-top:8px}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:220px;background:var(--nav);display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-ico{width:32px;height:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-ico svg{width:16px;height:16px;fill:#fff}
.sb-n{font-size:14px;font-weight:700;color:#fff}
.sb-s{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.09em;padding:8px 8px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.4);font-size:13px;font-weight:500;margin-bottom:2px;transition:all .12s;user-select:none}
.ni:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.ni.on{background:var(--teal);color:#fff}
.ni svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}
.sb-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:rgba(255,255,255,.22);line-height:1.7}
.sb-foot b{color:rgba(255,255,255,.4);display:block}

.cnt{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{background:var(--s0);border-bottom:1px solid var(--br);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-tit{font-size:15px;font-weight:600;color:var(--t0)}
.top-r{display:flex;align-items:center;gap:8px}
.t-sel{background:var(--s1);border:1px solid var(--br2);color:var(--t1);font-size:13px;padding:6px 10px;border-radius:var(--r2);font-family:var(--font);cursor:pointer}
.cmp-lbl{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--t2);cursor:pointer;padding:6px 10px;border-radius:var(--r2);border:1px solid var(--br);background:var(--s1)}
.cmp-lbl input{accent-color:var(--teal)}
.sync-btn{background:var(--teal);border:none;color:#fff;font-size:13px;padding:6px 14px;border-radius:var(--r2);cursor:pointer;font-family:var(--font);font-weight:600;display:flex;align-items:center;gap:5px;transition:opacity .12s}
.sync-btn:hover{opacity:.85}
.dot{width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0}
.dot.spin{animation:bl 1s infinite}.dot.err{background:#fca5a5}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.15}}

.main{flex:1;overflow-y:auto;padding:20px 22px;background:var(--bg)}

/* FILTER BOX */
.fbox{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);margin-bottom:18px}
.fbox-hd{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.fbox-hd::before{content:'';width:3px;height:13px;background:var(--teal);border-radius:2px}
.fbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.04em}
.f-sel{width:100%;background:var(--s1);border:1px solid var(--br2);color:var(--t1);font-size:13px;padding:6px 10px;border-radius:var(--r2);font-family:var(--font);cursor:pointer}
.f-sel:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px rgba(0,137,123,.15)}

/* KPI */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh)}
.kc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kl{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.ki{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.ki svg{width:14px;height:14px;fill:currentColor}
.ki.g{background:var(--grn2);color:var(--grn)}.ki.r{background:var(--red2);color:var(--red)}
.ki.b{background:var(--blu2);color:var(--blu)}.ki.y{background:var(--ylw2);color:var(--ylw)}
.ki.p{background:var(--pur2);color:var(--pur)}.ki.t{background:var(--teal3);color:var(--teal)}
.kv{font-size:22px;font-weight:700;color:var(--t0);line-height:1}
.kv.g{color:var(--grn)}.kv.r{color:var(--red)}.kv.b{color:var(--blu)}.kv.y{color:var(--ylw)}.kv.p{color:var(--pur)}.kv.t{color:var(--teal)}
.kd{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.4}
.up{color:var(--grn)}.dn{color:var(--red)}.vs{color:var(--t3);font-size:11px}

/* CHART */
.cc{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:16px}
.cc-t{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.lgnd{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.lgnd span{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2)}
.lsq{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.g2{grid-template-columns:1fr}}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--br);box-shadow:var(--sh);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--nav);color:rgba(255,255,255,.65);padding:8px 12px;font-size:10px;font-weight:600;text-align:left;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;border-bottom:2px solid var(--teal)}
th.r{text-align:right}
td{padding:8px 12px;border-bottom:1px solid var(--br);color:var(--t1);vertical-align:middle;white-space:nowrap}
td.r{text-align:right;font-family:var(--mono);font-size:12px}
td.g{color:var(--grn);font-weight:600}.td.re{color:var(--red);font-weight:600}
td.re{color:var(--red);font-weight:600}
td.mu{color:var(--t2)}
td.y{color:var(--ylw);font-weight:600}
td.t{color:var(--teal);font-weight:600}
td.b{color:var(--blu);font-weight:600}
tr:hover td{background:#f0fdfb}
tr:last-child td{border-bottom:none}
tfoot td{padding:8px 12px;background:var(--nav);color:rgba(255,255,255,.7);font-weight:700;border-top:2px solid var(--teal);font-family:var(--mono);font-size:12px}
tfoot td.r{text-align:right}.tfoot td.g{color:#6ee7b7}

/* P&L TABLE */
.pnl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--br);box-shadow:var(--sh);margin-bottom:16px}
.pnl-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
.pnl-tbl th{background:var(--nav);color:rgba(255,255,255,.65);padding:8px 10px;font-size:10px;font-weight:600;text-align:right;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;border-bottom:2px solid var(--teal);position:sticky;top:0;z-index:2}
.pnl-tbl th:first-child{text-align:left;position:sticky;left:0;background:var(--nav);z-index:3}
.pnl-tbl td{padding:6px 10px;border-bottom:1px solid var(--br);color:var(--t1);white-space:nowrap;text-align:right;font-family:var(--mono);font-size:11px}
.pnl-tbl td:first-child{text-align:left;font-family:var(--font);font-size:12px;position:sticky;left:0;background:var(--s0);z-index:1;min-width:200px}
.pnl-tbl tr:hover td{background:#f0fdfb}
.pnl-tbl tr:hover td:first-child{background:#f0fdfb}
/* P&L row types */
.pnl-tbl tr.r-ing td{background:#e0f2f1;font-weight:700;font-size:12px;border-top:2px solid var(--teal)}
.pnl-tbl tr.r-ing td:first-child{background:#e0f2f1;color:var(--teal2)}
.pnl-tbl tr.r-sub td:first-child{padding-left:22px;color:var(--t2);font-size:11px}
.pnl-tbl tr.r-section td{background:var(--nav2);color:rgba(255,255,255,.75);font-weight:700;font-size:11px;border-top:1px solid rgba(255,255,255,.1)}
.pnl-tbl tr.r-section td:first-child{background:var(--nav2);color:rgba(255,255,255,.9)}
.pnl-tbl tr.r-tot td{background:var(--s2);font-weight:700;border-top:2px solid var(--br2);font-size:12px}
.pnl-tbl tr.r-tot td:first-child{background:var(--s2);color:var(--t0)}
.pnl-tbl tr.r-ebitda td{background:#1e2d3d;color:#fff;font-weight:700;font-size:13px;border-top:3px solid var(--teal)}
.pnl-tbl tr.r-ebitda td:first-child{background:#1e2d3d;color:#4DB6AC}
.pnl-tbl tr.r-net td{background:var(--teal2);color:#fff;font-weight:700;font-size:13px;border-top:3px solid var(--teal3)}
.pnl-tbl tr.r-net td:first-child{background:var(--teal2);color:#fff}
.pnl-tbl tr.r-pct td{background:var(--s1);color:var(--t2);font-size:11px;font-style:italic}
.pnl-tbl tr.r-pct td:first-child{background:var(--s1);padding-left:22px}
.pnl-neg{color:var(--red)!important}
.pnl-pos{color:var(--grn)!important}

.bdg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;white-space:nowrap}
.bg{background:var(--s2);color:var(--t2);border:1px solid var(--br)}
.bt{background:var(--teal3);color:var(--teal2)}
.by{background:var(--ylw2);color:#92400e}
.bb{background:var(--blu2);color:#1e40af}

.slbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}


.socio-card{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:16px}
.socio-name{font-size:16px;font-weight:700;color:var(--t0);margin-bottom:4px}
.socio-total{font-size:22px;font-weight:700;color:var(--red);margin-bottom:8px;font-family:var(--mono)}
.socio-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.socio-bar-lbl{font-size:11px;color:var(--t2);min-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.socio-bar-track{flex:1;height:10px;background:var(--s2);border-radius:3px;overflow:hidden}
.socio-bar-fill{height:100%;border-radius:3px;background:var(--red)}
.socio-bar-val{font-size:11px;font-family:var(--mono);color:var(--red);min-width:80px;text-align:right;font-weight:600}
.alen-wrap{background:var(--bg);min-height:100%}
.alen-wrap .hdr{background:#0f172a;padding:12px 20px;display:flex;align-items:center;gap:12px;border-radius:var(--r) var(--r) 0 0;flex-wrap:wrap}
.alen-wrap .logo{width:36px;height:36px;background:#0d9488;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.alen-wrap .brand{flex:1}
.alen-wrap .brand b{display:block;color:#f1f5f9;font-size:14px;font-weight:700}
.alen-wrap .brand span{font-size:11px;color:#64748b}
.alen-wrap .tabs{display:flex;gap:2px;flex-wrap:wrap}
.alen-wrap .tab{padding:8px 14px;font-size:12px;font-weight:600;color:#94a3b8;border:none;background:rgba(255,255,255,.07);cursor:pointer;border-radius:6px;transition:.15s}
.alen-wrap .tab.active{background:#0d9488;color:#fff}
.alen-wrap .fbar,.alen-wrap .rbar{background:var(--s0);border:1px solid var(--br);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--t2)}
.alen-wrap .rbar{border-top:none}
.alen-wrap .fb{padding:5px 12px;border:1px solid var(--br2);border-radius:5px;background:var(--s1);cursor:pointer;font-size:11px;font-weight:600;color:var(--t2);transition:.12s}
.alen-wrap .fb.act{background:#0d9488;color:#fff;border-color:#0d9488}
.alen-wrap select.fb{padding:5px 8px;min-width:140px}
.alen-wrap .panel{display:none}
.alen-wrap .panel.active{display:block}
.alen-wrap .shell{padding:16px;max-width:100%}
.alen-wrap .card{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:14px}
.alen-wrap .ct{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.alen-wrap .cw{position:relative}
.alen-wrap .c2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.alen-wrap .c3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.alen-wrap .kg{display:grid;gap:10px;margin-bottom:14px}
.alen-wrap .kgc{background:var(--s0);border:1px solid var(--br);border-radius:var(--r);padding:12px;box-shadow:var(--sh)}
.alen-wrap .kgc .kl{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.alen-wrap .kgc .kv{font-size:20px;font-weight:700;color:var(--t0)}
.alen-wrap .kgc .kd{font-size:11px;color:var(--t3);margin-top:2px}
.alen-wrap .rw{position:relative;height:18px;width:180px;margin:0 6px}
.alen-wrap .rtrack{position:absolute;top:7px;left:0;right:0;height:4px;background:var(--br2);border-radius:2px}
.alen-wrap #rngFill{position:absolute;top:7px;height:4px;background:var(--teal);border-radius:2px}
.alen-wrap input[type=range]{position:absolute;top:0;left:0;right:0;width:100%;appearance:none;-webkit-appearance:none;background:transparent;height:18px;margin:0}
.alen-wrap .rlbl{font-size:11px;color:var(--t2);font-weight:600;min-width:60px;text-align:center}
.alen-wrap .rrst{padding:4px 10px;border:1px solid var(--br2);border-radius:5px;background:var(--s1);cursor:pointer;font-size:11px;color:var(--t2)}
.pnl-tbl tr.r-ebitda td{background:#ecfdf5;font-weight:700;border-top:2px solid #059669;color:#065f46}
.pnl-tbl tr.r-net td{background:#0f172a;color:#f1f5f9;font-weight:700;border-top:2px solid var(--teal)}
.pnl-tbl tr.r-net td:first-child{background:#0f172a;color:#5eead4}
.pnl-tbl .pnl-pos{color:#059669;font-weight:600}
.pnl-tbl .pnl-neg{color:#dc2626;font-weight:600}
.pnl-tbl tr.r-pct td{font-size:10px;color:var(--t3);font-family:var(--mono)}
.pnl-tbl tr.r-pct td:first-child{font-family:var(--font);color:var(--t3);padding-left:22px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
@media(max-width:900px){.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.alen-wrap .c2,.alen-wrap .c3{grid-template-columns:1fr}}

</style>
</head>
<body>

<div id="loading">
  <div class="ld-icon"><svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg></div>
  <div class="ld-title">Logistics Ultra</div>
  <div id="ld-msg">Iniciando dashboard integral...</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div id="ld-err"></div>
</div>

<div class="app" id="app" style="display:none">
  <div class="sb">
    <div class="sb-brand">
      <div class="sb-ico"><svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg></div>
      <div>
        <div class="sb-n">Logistics Ultra</div>
        <div class="sb-s">Dashboard Integral</div>
      </div>
    </div>
    <nav class="sb-nav">

    <div class="sb-sec">Operación</div>
    <div class="ni on" onclick="goTab('viajes',this)"><svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>Viajes</div>

// === CSV ===
function parseCSV(txt,hdrRow=0){
  const lines=txt.trim().split('\n');
  const hdr=lines[hdrRow].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(hdrRow+1).map(l=>{
    const v=[];let c='',q=false;
    for(const ch of l){if(ch==='"'){q=!q}else if(ch===','&&!q){v.push(c.trim());c=''}else c+=ch;}
    v.push(c.trim());
    const o={};hdr.forEach((h,i)=>{o[h]=(v[i]||'').replace(/^"|"$/g,'');});return o;
  });
}

async function fetchCSV(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return await r.text();
}

// === LOAD ===
async function loadAll(){
  try{
    $('ld-msg').textContent='Cargando viajes...';
    const tv=await fetchCSV(URL_V);
    V=parseCSV(tv).filter(r=>r['Dia']&&r['Dia']!='Dia'&&r['Dia']!='');

    $('ld-msg').textContent='Cargando gastos...';
    const tg=await fetchCSV(URL_G);
    const gRaw=parseCSV(tg,6);
    G=gRaw.filter(r=>r['Fecha']&&pM(r['Monto'])>0&&!GEXCL.includes(r['Categoria']||r['Categoría']));

    $('ld-msg').textContent='Cargando diesel...';
    const td=await fetchCSV(URL_D);
    const dRaw=parseCSV(td,7);
    D=dRaw.filter(r=>r['Fecha']&&pM(r['Monto'])>0);

    $('ld-msg').textContent='Cargando kilometros...';
    const tk=await fetchCSV(URL_K);
    K=parseCSV(tk).filter(r=>r['Trip Distance (km)']&&!isNaN(parseFloat(r['Trip Distance (km)'])));

    // Diesel has no AÑO column -- inject year from Fecha field
    D.forEach(r=>{
      if(!r['AÑO']||r['AÑO']===''){
        const f=r['Fecha']||'';
        // Try to extract 4-digit year from date string
        const m4=f.match(/\b(20\d{2})\b/);
        if(m4)r['AÑO']=m4[1];
        else if(f.includes('/')){
          // format d/m/yyyy or m/d/yyyy or d/m/yy
          const parts=f.split('/');
          const last=parts[parts.length-1];
          if(last.length===4)r['AÑO']=last;
          else if(last.length===2)r['AÑO']='20'+last;
        }
      }
    });
    // KMS also has no AÑO -- inject from Año column or Start At
    K.forEach(r=>{
      if(!r['AÑO']||r['AÑO']===''){
        r['AÑO']=r['Año']||r['ano']||r['year']||'';
        if(!r['AÑO']){
          const sa=r['Start At']||'';
          const m4=sa.match(/\b(20\d{2})\b/);
          if(m4)r['AÑO']=m4[1];
        }
      }
    });

    const now=new Date();
    $('sbDate').textContent=now.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    $('sbRows').textContent=V.length+' viajes, '+G.length+' gastos, '+D.length+' diesel';
    $('loading').style.display='none';
    $('app').style.display='flex';
    $('dot').className='dot';
    render();
  }catch(e){
    $('dot').className='dot err';
    $('ld-msg').textContent='Error al cargar';
    const eb=$('ld-err');
    eb.style.display='block';
    eb.textContent='No se pudo conectar con Google Sheets. Abre este archivo desde GitHub Pages (https://), no desde tu disco (file://).';
  }
}

// === AGG HELPERS ===
function mStats(arr,valFn){
  const s=MES.map(()=>({v:0,i:0}));
  arr.forEach(r=>{const m=mOf(r);if(m<0)return;s[m].v++;if(valFn)s[m].i+=valFn(r);});
  return s;
}
function byField(arr,field,valFn){
  const out={};
  arr.forEach(r=>{const k=r[field]||'S/D';if(!out[k])out[k]={v:0,i:0};out[k].v++;if(valFn)out[k].i+=valFn(r);});
  return out;
}
function gCat(arr,catField){
  const catF=r=>r[catField]||r['Categoria']||r['Categoría']||'Otro';
  const out={};arr.forEach(r=>{const c=catF(r);out[c]=(out[c]||0)+pM(r['Monto']);});
  return out;
}
function gMes(arr,y){
  return MES.map((_,m)=>fYr(arr).filter(r=>mOf(r)===m).reduce((s,r)=>s+pM(r['Monto']),0));
}

}

// === TAB: GASTOS ===
function dGastos(){
  const c=co();
  const catF=r=>r['Categoria']||r['Categoría']||'Otro';
  const clasF=r=>r['Clasificacion']||r['Clasificación']||'Otro';
  const rutaF=r=>r['Ruta']||'S/R';
  const uniF=r=>String(r['Unidad']||'S/U');
  const opF=r=>r['Operador']||'S/O';

  // Excluir CAPEX de analisis operativo
  const EXCL=['CAPEX','Créditos','Creditos','Importaciones y compra de Unidades','Importaciones y compra de unidades'];

  let base=fYr(G).filter(r=>!EXCL.includes(catF(r)));
  let baseA=fYrA(G).filter(r=>!EXCL.includes(catF(r)));

  // Filter
  if(curMes>=0){base=base.filter(r=>mOf(r)===curMes);baseA=baseA.filter(r=>mOf(r)===curMes);}
  if(curCat!='Todos')base=base.filter(r=>catF(r)===curCat);
  if(curSvc!='Todos')base=base.filter(r=>clasF(r)===curSvc);  // reuse curSvc for clasificacion
  if(curUni!='Todos')base=base.filter(r=>uniF(r)===curUni);
  if(curOp!='Todos')base=base.filter(r=>opF(r)===curOp);

  const allBase=fYr(G).filter(r=>!EXCL.includes(catF(r)));
  const allCats=[...new Set(allBase.map(catF).filter(Boolean))].sort();
  const allClas=[...new Set(allBase.map(clasF).filter(Boolean))].sort();
  const allUnis=[...new Set(allBase.map(uniF).filter(Boolean))].sort();
  const allOps=[...new Set(allBase.map(opF).filter(Boolean))].sort();

  const tG=base.reduce((s,r)=>s+pM(r['Monto']),0);
  const tGa=baseA.reduce((s,r)=>s+pM(r['Monto']),0);
  const fij=base.filter(r=>r['Tipo']==='Fijos').reduce((s,r)=>s+pM(r['Monto']),0);
  const vr=base.filter(r=>r['Tipo']==='Variables').reduce((s,r)=>s+pM(r['Monto']),0);

  // 1. Por Categoria
  const byCat={};base.forEach(r=>{const k=catF(r);byCat[k]=(byCat[k]||0)+pM(r['Monto']);});
  const catS=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  // 2. Por Clasificacion
  const byClas={};base.forEach(r=>{const k=clasF(r);byClas[k]=(byClas[k]||0)+pM(r['Monto']);});
  const clasS=Object.entries(byClas).sort((a,b)=>b[1]-a[1]).slice(0,20);

  // 3. Por Unidad
  const byUni={};base.forEach(r=>{const k=uniF(r);if(k&&k!='S/U'&&k!='0'){if(!byUni[k])byUni[k]=0;byUni[k]+=pM(r['Monto']);}});
  const uniS=Object.entries(byUni).sort((a,b)=>b[1]-a[1]).slice(0,15);

  // 4. Por Operador
  const byOp={};base.forEach(r=>{const k=opF(r);if(k&&k!='S/O'){if(!byOp[k])byOp[k]=0;byOp[k]+=pM(r['Monto']);}});
  const opS=Object.entries(byOp).sort((a,b)=>b[1]-a[1]).slice(0,12);

  // 5. Por Ruta
  const byRuta={};base.forEach(r=>{const k=rutaF(r);if(k&&k!='S/R'&&k!=''){if(!byRuta[k])byRuta[k]=0;byRuta[k]+=pM(r['Monto']);}});
  const rutaS=Object.entries(byRuta).sort((a,b)=>b[1]-a[1]).slice(0,12);

  // 6. Mensual
  const sgM=MES.map((_,m)=>allBase.filter(r=>mOf(r)===m).reduce((s,r)=>s+pM(r['Monto']),0));
  const sgaM=MES.map((_,m)=>baseA.filter(r=>mOf(r)===m).reduce((s,r)=>s+pM(r['Monto']),0));

  // 7. Tabla mensual por top 6 categorias
  const top6=catS.slice(0,6).map(([c])=>c);
  const byCatM={};top6.forEach(c=>byCatM[c]=MES.map(()=>0));
  allBase.forEach(r=>{const cat=catF(r);const m=mOf(r);if(top6.includes(cat)&&m>=0)byCatM[cat][m]+=pM(r['Monto']);});
  const mRows=MES.map((m,i)=>{const gm=sgM[i];if(!gm)return '';
    return `<tr><td style="font-weight:600">${m}</td>${top6.map(c=>`<td class="r mu">${byCatM[c][i]?fmt(byCatM[c][i]):'—'}</td>`).join('')}<td class="r re">${fmt(gm)}</td></tr>`;
  }).join('');

  // Bar helper
  const mkHBar=(id,labels,data,color)=>`<div class="cc" style="margin-bottom:14px"><div class="cc-t">${id}</div><div style="position:relative;height:${Math.max(160,labels.length*28+60)}px"><canvas id="c${id.replace(/\s/g,'_')}"></canvas></div></div>`;

  // Detail table
  const rows=base.slice(0,250).map(r=>`<tr>
    <td class="mu">${r['Fecha']||''}</td>
    <td>${r['Descripcion']||r['Descripción']||''}</td>
    <td><span class="bdg bg">${catF(r)}</span></td>
    <td><span class="bdg bt">${clasF(r)}</span></td>
    <td class="mu">${uniF(r)}</td>
    <td class="mu">${opF(r)}</td>
    <td class="mu">${rutaF(r)}</td>
    <td>${r['Tipo']==='Fijos'?'<span class="bdg by">Fijo</span>':r['Tipo']==='Variables'?'<span class="bdg bb">Variable</span>':''}</td>
    <td class="r re">${fmt(pM(r['Monto']))}</td>
  </tr>`).join('');

  $('main').innerHTML=
    filterBox([
      {label:'Mes',html:selMes()},
      {label:'Categoria',html:`<select class="f-sel" onchange="curCat=this.value;render()"><option value="Todos">Todas las categorias</option>${allCats.map(o=>`<option value="${o}" ${curCat===o?'selected':''}>${o}</option>`).join('')}</select>`},
      {label:'Clasificacion',html:`<select class="f-sel" onchange="curSvc=this.value;render()"><option value="Todos">Todas las clasificaciones</option>${allClas.map(o=>`<option value="${o}" ${curSvc===o?'selected':''}>${o}</option>`).join('')}</select>`},
      {label:'Unidad',html:`<select class="f-sel" onchange="curUni=this.value;render()"><option value="Todos">Todas las unidades</option>${allUnis.map(o=>`<option value="${o}" ${curUni===o?'selected':''}>${o}</option>`).join('')}</select>`},
      {label:'Operador',html:`<select class="f-sel" onchange="curOp=this.value;render()"><option value="Todos">Todos los operadores</option>${allOps.map(o=>`<option value="${o}" ${curOp===o?'selected':''}>${o}</option>`).join('')}</select>`},
    ])+
    `<div class="krow">
      <div class="kc"><div class="kc-hd"><div class="kl">Gasto total</div><div class="ki r"><svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg></div></div><div class="kv r">${fmtK(tG)}</div><div class="kd">${c?`AA: ${fmtK(tGa)} ${dlt(tG,tGa)}`:''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Fijos</div><div class="ki y"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/></svg></div></div><div class="kv y">${fmtK(fij)}</div><div class="kd">${tG?(fij/tG*100).toFixed(1)+'% del total':''}</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Variables</div><div class="ki b"><svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4 7-8"/></svg></div></div><div class="kv b">${fmtK(vr)}</div><div class="kd">${tG?(vr/tG*100).toFixed(1)+'% del total':''}</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Categorias</div><div class="ki t"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg></div></div><div class="kv t">${catS.length}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Mayor gasto</div><div class="ki r"><svg viewBox="0 0 24 24"><path d="M12 2l3 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg></div></div><div class="kv r" style="font-size:14px">${catS[0]?catS[0][0]:'—'}</div><div class="kd">${catS[0]?fmtK(catS[0][1]):''}</div></div>
    </div>

    <div class="g2">
      <div class="cc"><div class="cc-t">Gasto mensual${c?' vs AA':''}</div>
        <div class="lgnd"><span><span class="lsq" style="background:rgba(220,38,38,.75)"></span>${yr()==='all'?'Todos':yr()}</span>${c?`<span><span class="lsq" style="background:rgba(220,38,38,.25)"></span>AA</span>`:''}</div>
        <div style="position:relative;height:200px"><canvas id="cGmes"></canvas></div>
      </div>
      <div>
        <div class="cc"><div class="cc-t">Por categoria</div>
          ${catS.slice(0,10).map(([k,v])=>{const pct2=tG?(v/tG*100).toFixed(1):0;return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <div style="font-size:12px;color:var(--t1);min-width:165px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${k}</div>
            <div style="flex:1;height:13px;background:var(--s2);border-radius:3px;overflow:hidden"><div style="width:${(v/(catS[0]?catS[0][1]:1)*100).toFixed(1)}%;height:100%;background:#dc2626;opacity:.7;border-radius:3px"></div></div>
            <div style="font-size:11px;min-width:75px;text-align:right;font-family:var(--mono);color:var(--red);font-weight:600">${fmt(v)}</div>
            <div style="font-size:10px;min-width:38px;text-align:right;color:var(--t3)">${pct2}%</div>
          </div>`;}).join('')}
        </div>
      </div>
    </div>

    <div class="g2">
      <div class="cc"><div class="cc-t">Por clasificacion - top 20</div>
        <div style="position:relative;height:${Math.max(200,clasS.length*28+60)}px"><canvas id="cGclas"></canvas></div>
      </div>
      <div class="cc"><div class="cc-t">Por unidad - areas de oportunidad</div>
        <div style="position:relative;height:${Math.max(200,uniS.length*28+60)}px"><canvas id="cGuni"></canvas></div>
      </div>
    </div>

    <div class="g2">
      <div class="cc"><div class="cc-t">Por operador - top 12</div>
        <div style="position:relative;height:${Math.max(200,opS.length*28+60)}px"><canvas id="cGop"></canvas></div>
      </div>
      <div class="cc"><div class="cc-t">Por ruta - top 12</div>
        <div style="position:relative;height:${Math.max(200,rutaS.length*28+60)}px"><canvas id="cGruta"></canvas></div>
      </div>
    </div>

    <div class="slbl">Desglose mensual - top 6 categorias</div>
    <div class="tw"><table>
      <thead><tr><th>Mes</th>${top6.map(c=>`<th class="r">${c.substring(0,16)}</th>`).join('')}<th class="r">Total</th></tr></thead>
      <tbody>${mRows}</tbody>
      <tfoot><tr><td>Total</td>${top6.map(c=>`<td class="r">${fmt(byCatM[c].reduce((s,v)=>s+v,0))}</td>`).join('')}<td class="r">${fmt(tG)}</td></tr></tfoot>
    </table></div>

    <div class="g2">
      <div>
        <div class="slbl">Ranking por clasificacion</div>
        <div class="tw"><table>
          <thead><tr><th>Clasificacion</th><th class="r">Monto</th><th class="r">% del total</th></tr></thead>
          <tbody>${clasS.map(([k,v])=>`<tr><td style="font-weight:500">${k}</td><td class="r re">${fmt(v)}</td><td class="r mu">${tG?(v/tG*100).toFixed(1):0}%</td></tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div>
        <div class="slbl">Ranking por unidad</div>
        <div class="tw"><table>
          <thead><tr><th>Unidad</th><th class="r">Gasto</th><th class="r">% del total</th></tr></thead>
          <tbody>${uniS.map(([k,v])=>`<tr><td style="font-weight:700">${k}</td><td class="r re">${fmt(v)}</td><td class="r mu">${tG?(v/tG*100).toFixed(1):0}%</td></tr>`).join('')}</tbody>
        </table></div>
      </div>
    </div>

    <div class="slbl">Detalle de gastos${base.length>250?' (250 registros)':''}</div>
    <div class="tw"><table>
      <thead><tr><th>Fecha</th><th>Descripcion</th><th>Categoria</th><th>Clasificacion</th><th>Unidad</th><th>Operador</th><th>Ruta</th><th>Tipo</th><th class="r">Monto</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="8">Total</td><td class="r re">${fmt(tG)}</td></tr></tfoot>
    </table></div>`;

  // Charts
  const dsG=[{label:'g',data:sgM,backgroundColor:'rgba(220,38,38,.75)',borderRadius:4}];
  if(c)dsG.push({label:'ga',data:sgaM,backgroundColor:'rgba(220,38,38,.25)',borderRadius:4});
  mkChart('cGmes','bar',MES,dsG,mkBarOpts(false,false));
  mkChart('cGclas','bar',clasS.map(([k])=>k),[{label:'g',data:clasS.map(([,v])=>v),backgroundColor:CLRS.map(c=>`${c}cc`),borderRadius:4}],mkBarHOpts(false));
  mkChart('cGuni','bar',uniS.map(([k])=>k),[{label:'g',data:uniS.map(([,v])=>v),backgroundColor:'rgba(220,38,38,.7)',borderRadius:4}],mkBarHOpts(false));
  mkChart('cGop','bar',opS.map(([k])=>k),[{label:'g',data:opS.map(([,v])=>v),backgroundColor:'rgba(124,58,237,.7)',borderRadius:4}],mkBarHOpts(false));
  mkChart('cGruta','bar',rutaS.map(([k])=>k),[{label:'g',data:rutaS.map(([,v])=>v),backgroundColor:'rgba(8,145,178,.7)',borderRadius:4}],mkBarHOpts(false));
}

// === TAB: DIESEL ===
function dDiesel(){
  let d=fYr(D),da=fYrA(D);
  if(curMes>=0){d=d.filter(r=>mOf(r)===curMes);da=da.filter(r=>mOf(r)===curMes);}
  if(curUni!='Todos'){d=d.filter(r=>String(r['Unidad'])===curUni);da=da.filter(r=>String(r['Unidad'])===curUni);}

  const base=fYr(D);
  const allUni=[...new Set(base.map(r=>String(r['Unidad'])).filter(Boolean))].sort();

  const tLts=d.reduce((s,r)=>s+pM(r['Litros']),0),tMnt=d.reduce((s,r)=>s+pM(r['Monto']),0);
  const tLtsa=da.reduce((s,r)=>s+pM(r['Litros']),0);

  const kmByU={};
  fYr(K).forEach(r=>{const u=r['Unidad']||'';const km=parseFloat(r['Trip Distance (km)'])||0;if(u&&km>0){if(!kmByU[u])kmByU[u]=0;kmByU[u]+=km;}});

  const byU={};
  d.forEach(r=>{const u=String(r['Unidad'])||'S/U';if(!byU[u])byU[u]={lts:0,mnt:0};byU[u].lts+=pM(r['Litros']);byU[u].mnt+=pM(r['Monto']);});
  const uniS=Object.keys(byU).filter(u=>u).sort((a,b)=>byU[b].lts-byU[a].lts).slice(0,15);
  const sgL=MES.map((_,m)=>fYr(D).filter(r=>mOf(r)===m).reduce((s,r)=>s+pM(r['Litros']),0));

  // Rendimiento flota total
  const tKmAll=Object.values(kmByU).reduce((s,v)=>s+v,0);
  const rendFlota=tLts>0&&tKmAll>0?tKmAll/tLts:0;

  // Mejor rendimiento por unidad (min 10 litros para ser válido)
  let mejorUni='N/A',mejorRend=0;
  uniS.forEach(u=>{
    const r=byU[u],km=kmByU[u]||0;
    if(r.lts>=10&&km>0){const rnd=km/r.lts;if(rnd>mejorRend){mejorRend=rnd;mejorUni=u;}}
  });

  // Mes de mayor consumo
  const mesMayorIdx=sgL.reduce((b,v,i)=>v>sgL[b]?i:b,0);

  const tipoRows=Object.entries(d.reduce((acc,r)=>{const t=r['Tipo']||'Otro';acc[t]=(acc[t]||0)+pM(r['Litros']);return acc;},{})).sort((a,b)=>b[1]-a[1]).map(([t,lts])=>`<tr><td style="font-weight:600">${t}</td><td class="r">${lts.toFixed(0)} L</td><td class="r y">${tLts>0?(lts/tLts*100).toFixed(1):0}%</td></tr>`).join('');

  const rows=uniS.map(u=>{
    const r=byU[u],km=kmByU[u]||0;
    const rend=r.lts>0&&km>0?(km/r.lts).toFixed(2):'N/A';
    const rendN=parseFloat(rend);
    const rendCls=!isNaN(rendN)?(rendN>=3?'g':rendN>=2?'y':'re'):'mu';
    return `<tr><td style="font-weight:700">${u}</td><td class="r b">${r.lts.toFixed(0)} L</td><td class="r re">${fmt(r.mnt)}</td><td class="r mu">${r.lts>0?'$'+(r.mnt/r.lts).toFixed(2)+'/L':'N/A'}</td><td class="r mu">${km>0?fmtN(km)+' km':'N/A'}</td><td class="r ${rendCls}">${rend}${!isNaN(rendN)?' km/L':''}</td></tr>`;
  }).join('');

  $('main').innerHTML=
    filterBox([
      {label:'Mes',html:selMes()},
      {label:'Unidad',html:`<select class="f-sel" onchange="curUni=this.value;render()"><option value="Todos">Todas</option>${allUni.map(o=>`<option value="${o}" ${curUni===o?'selected':''}>${o}</option>`).join('')}</select>`},
    ])+
    `<div class="krow">
      <div class="kc"><div class="kc-hd"><div class="kl">Total litros</div><div class="ki b"><svg viewBox="0 0 24 24"><path d="M19.77 7.23l.01-.01-3.72-3.72L15 4.56l2.11 2.11c-.94.36-1.61 1.26-1.61 2.33 0 1.38 1.12 2.5 2.5 2.5.36 0 .69-.08 1-.21v7.21c0 .55-.45 1-1 1s-1-.45-1-1V14c0-1.1-.9-2-2-2h-1V5c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v16h10v-7.5h1.5v5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V9c0-.69-.28-1.32-.73-1.77z"/></svg></div></div><div class="kv b">${fmtN(tLts)} L</div><div class="kd">${co()?`AA: ${fmtN(tLtsa)} L ${dlt(tLts,tLtsa)}`:''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Gasto diesel</div><div class="ki r"><svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg></div></div><div class="kv r">${fmtK(tMnt)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Rendimiento flota</div><div class="ki g"><svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4 7-8"/></svg></div></div><div class="kv g">${rendFlota>0?rendFlota.toFixed(2)+' km/L':'N/A'}</div><div class="kd">${rendFlota>=3?'Bueno':rendFlota>=2?'Regular':rendFlota>0?'Bajo':''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Mejor rendimiento</div><div class="ki t"><svg viewBox="0 0 24 24"><path d="M12 2l3 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg></div></div><div class="kv t" style="font-size:15px">${mejorUni}</div><div class="kd">${mejorRend>0?mejorRend.toFixed(2)+' km/L':''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Mes mayor consumo</div><div class="ki y"><svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg></div></div><div class="kv y">${MES[mesMayorIdx]}</div><div class="kd">${fmtN(sgL[mesMayorIdx])} L consumidos</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Precio prom./L</div><div class="ki p"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/></svg></div></div><div class="kv p">${tLts>0?'$'+(tMnt/tLts).toFixed(2):'N/A'}</div><div class="kd">&nbsp;</div></div>
    </div>
    <div class="g2">
      <div class="cc"><div class="cc-t">Litros por mes</div><div style="position:relative;height:200px"><canvas id="cDm"></canvas></div></div>
      <div><div class="slbl">Por tipo de registro</div><div class="tw"><table><thead><tr><th>Tipo</th><th class="r">Litros</th><th class="r">%</th></tr></thead><tbody>${tipoRows}</tbody></table></div></div>
    </div>
    <div class="slbl">Rendimiento por unidad - verde >= 3 km/L, amarillo >= 2 km/L, rojo < 2 km/L</div>
    <div class="tw"><table><thead><tr><th>Unidad</th><th class="r">Litros</th><th class="r">Gasto</th><th class="r">$/Litro</th><th class="r">KM recorridos</th><th class="r">Rendimiento</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td>Total</td><td class="r">${tLts.toFixed(0)} L</td><td class="r">${fmt(tMnt)}</td><td></td><td class="r">${fmtN(Object.values(kmByU).reduce((s,v)=>s+v,0))} km</td><td></td></tr></tfoot></table></div>`;

  mkChart('cDm','bar',MES,[{label:'L',data:sgL,backgroundColor:'rgba(15,52,96,.75)',borderRadius:4}],mkBarN_Opts());
}

// === TAB: RENTABILIDAD ===
function dRent(){
  const vd=fYr(V).filter(r=>pM(r['Tarifa'])>0);
  const gd=fYr(G);
  const dd=fYr(D);
  const byU={};
  vd.forEach(r=>{
    const u=String(r['Unidad'])||'S/U';
    if(!byU[u])byU[u]={v:0,ing:0,viat:0,diesel:0,casetas:0,arreglos:0,mant:0,nomina:0,multas:0,otros:0};
    byU[u].v++;byU[u].ing+=pM(r['Tarifa']);
    byU[u].viat+=pM(r['Viaticos']||r['Viáticos']);
    byU[u].diesel+=pM(r['Diesel']);
    byU[u].casetas+=pM(r['Casetas']);
    byU[u].arreglos+=pM(r['Arreglos']);
    byU[u].mant+=pM(r['Rescate / Mantenimiento']);
  });
  gd.forEach(r=>{
    const u=String(r['Unidad'])||'';if(!u||!byU[u])return;
    const m=pM(r['Monto']),cl=(r['Clasificacion']||r['Clasificación']||'').toLowerCase();
    if(cl.includes('nomina')||cl.includes('nómina'))byU[u].nomina+=m;
    else if(cl.includes('multa'))byU[u].multas+=m;
    else if(cl.includes('mant')||cl.includes('llanta'))byU[u].mant+=m;
    else if(cl.includes('viatico')||cl.includes('viático'))byU[u].viat+=m;
    else if(cl.includes('arregl'))byU[u].arreglos+=m;
    else if(cl.includes('diesel'))byU[u].diesel+=m;
    else if(cl.includes('caseta'))byU[u].casetas+=m;
  });
  dd.forEach(r=>{const u=String(r['Unidad'])||'';if(u&&byU[u])byU[u].diesel+=pM(r['Monto']);});

  const units=Object.keys(byU).filter(u=>byU[u].ing>0).sort((a,b)=>byU[b].ing-byU[a].ing);
  const tI=units.reduce((s,u)=>s+byU[u].ing,0);
  const rows=units.map(u=>{
    const r=byU[u];
    const ct=r.viat+r.diesel+r.casetas+r.arreglos+r.mant+r.nomina+r.multas+r.otros;
    const ut=r.ing-ct;const mg=r.ing?(ut/r.ing*100).toFixed(1):'N/A';
    const mc=parseFloat(mg)>=30?'g':parseFloat(mg)>=0?'y':'re';
    return`<tr><td style="font-weight:700">${u}</td><td class="r b">${r.v}</td><td class="r g">${fmt(r.ing)}</td><td class="r mu">${r.v?fmt(Math.round(r.ing/r.v)):'N/A'}</td><td class="r re">${r.nomina?fmt(r.nomina):'—'}</td><td class="r re">${r.viat?fmt(r.viat):'—'}</td><td class="r re">${r.diesel?fmt(r.diesel):'—'}</td><td class="r re">${r.casetas?fmt(r.casetas):'—'}</td><td class="r re">${r.mant?fmt(r.mant):'—'}</td><td class="r re">${r.arreglos?fmt(r.arreglos):'—'}</td><td class="r re">${r.multas?fmt(r.multas):'—'}</td><td class="r re">${ct?fmt(ct):'—'}</td><td class="r ${ut>=0?'g':'re'}">${fmt(ut)}</td><td class="r ${mc}">${mg}%</td><td class="r y">${tI?(r.ing/tI*100).toFixed(1):0}%</td></tr>`;
  }).join('');
  const tC=units.reduce((s,u)=>{const r=byU[u];return s+r.viat+r.diesel+r.casetas+r.arreglos+r.mant+r.nomina+r.multas+r.otros;},0);
  const tU=tI-tC,tMg=tI?(tU/tI*100).toFixed(1):0;
  const mgD=units.map(u=>{const r=byU[u];const ct=r.viat+r.diesel+r.casetas+r.arreglos+r.mant+r.nomina+r.multas+r.otros;return r.ing?((r.ing-ct)/r.ing*100).toFixed(1):0;});
  const mgC=mgD.map(v=>+v>=30?'rgba(5,150,105,.8)':+v>=0?'rgba(217,119,6,.8)':'rgba(220,38,38,.8)');

  $('main').innerHTML=
    `<div class="krow">
      <div class="kc"><div class="kc-hd"><div class="kl">Unidades</div><div class="ki y"><svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg></div></div><div class="kv y">${units.length}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Ingresos</div><div class="ki g"><svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4 7-8"/></svg></div></div><div class="kv g">${fmtK(tI)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Costos</div><div class="ki r"><svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg></div></div><div class="kv r">${fmtK(tC)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Utilidad</div><div class="ki ${tU>=0?'g':'r'}"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg></div></div><div class="kv ${tU>=0?'g':'r'}">${fmtK(tU)}</div><div class="kd">&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Margen prom.</div><div class="ki b"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/></svg></div></div><div class="kv b">${tMg}%</div><div class="kd">&nbsp;</div></div>
    </div>
    <div class="cc"><div class="cc-t">Margen directo por unidad - verde >= 30%, amarillo >= 0%, rojo negativo</div><div style="position:relative;height:${Math.max(200,units.length*26+60)}px"><canvas id="cRent"></canvas></div></div>
    <div class="slbl">Costeo detallado por unidad</div>
    <div class="tw"><table><thead><tr><th>Unidad</th><th class="r">Viajes</th><th class="r">Ingresos</th><th class="r">$/Viaje</th><th class="r">Nomina</th><th class="r">Viaticos</th><th class="r">Diesel</th><th class="r">Casetas</th><th class="r">Mant/Llant</th><th class="r">Arreglos</th><th class="r">Multas</th><th class="r">Costo Total</th><th class="r">Utilidad</th><th class="r">Margen</th><th class="r">% Ing</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td>TOTAL</td><td class="r">${fmtN(units.reduce((s,u)=>s+byU[u].v,0))}</td><td class="r">${fmt(tI)}</td><td></td><td class="r">${fmt(units.reduce((s,u)=>s+byU[u].nomina,0))}</td><td class="r">${fmt(units.reduce((s,u)=>s+byU[u].viat,0))}</td><td class="r">${fmt(units.reduce((s,u)=>s+byU[u].diesel,0))}</td><td class="r">${fmt(units.reduce((s,u)=>s+byU[u].casetas,0))}</td><td class="r">${fmt(units.reduce((s,u)=>s+byU[u].mant,0))}</td><td class="r">${fmt(units.reduce((s,u)=>s+byU[u].arreglos,0))}</td><td class="r">${fmt(units.reduce((s,u)=>s+byU[u].multas,0))}</td><td class="r">${fmt(tC)}</td><td class="r ${tU>=0?'g':'re'}">${fmt(tU)}</td><td class="r y">${tMg}%</td><td class="r">100%</td></tr></tfoot></table></div>`;

  CH['cRent']=new Chart($('cRent'),{type:'bar',data:{labels:units,datasets:[{label:'Margen %',data:mgD,backgroundColor:mgC,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:true,anchor:'end',align:'right',color:'#475569',font:{size:10},formatter:v=>v+'%'},tooltip:{callbacks:{label:c=>` ${c.raw}%`}}},scales:{x:{ticks:{color:'#94a3b8',font:{size:11},callback:v=>v+'%'},grid:{color:'rgba(0,0,0,.04)'}},y:{ticks:{color:'#475569',font:{size:11}},grid:{display:false}}}}});
}

// === TAB: P&L ===
function dPNL(){
  const c=co();
  const y=yr();

  // Ingresos por mes
  const sv=mStats(fYr(V).filter(r=>pM(r['Tarifa'])>0),r=>pM(r['Tarifa']));
  const sva=mStats(fYrA(V).filter(r=>pM(r['Tarifa'])>0),r=>pM(r['Tarifa']));
  const tI=sv.reduce((s,r)=>s+r.i,0),tIa=sva.reduce((s,r)=>s+r.i,0);

  // Ingresos por cliente (para desglose)
  const byCli={};
  fYr(V).filter(r=>pM(r['Tarifa'])>0).forEach(r=>{
    const cl=r['Cliente']||'Otro';
    if(!byCli[cl])byCli[cl]=MES.map(()=>0);
    const m=mOf(r);if(m>=0)byCli[cl][m]+=pM(r['Tarifa']);
  });

  // Gastos clasificados por Clasificacion, por mes
  const gd=fYr(G);
  function gByClasM(claves){
    return MES.map((_,m)=>gd.filter(r=>{const cl=r['Clasificacion']||r['Clasificación']||'';return claves.some(k=>cl.toLowerCase().includes(k.toLowerCase()))&&mOf(r)===m;}).reduce((s,r)=>s+pM(r['Monto']),0));
  }
  function gByClasTotal(claves){return gd.filter(r=>{const cl=r['Clasificacion']||r['Clasificación']||'';return claves.some(k=>cl.toLowerCase().includes(k.toLowerCase()));}).reduce((s,r)=>s+pM(r['Monto']),0);}
  function gByCatM(cat){return MES.map((_,m)=>gd.filter(r=>{const c2=r['Categoria']||r['Categoría']||'';return c2===cat&&mOf(r)===m;}).reduce((s,r)=>s+pM(r['Monto']),0));}
  function gByCatTotal(cat){return gd.filter(r=>(r['Categoria']||r['Categoría']||'')=== cat).reduce((s,r)=>s+pM(r['Monto']),0);}

  // Cost to serve lines (Clasificacion field)
  const costLines=[
    {label:'Diesel',keys:['Diesel']},
    {label:'Diesel Credito',keys:['Diesel Crédito','Diesel Credito']},
    {label:'Diesel Interno',keys:['Diesel Interno']},
    {label:'Diesel Prisciliano',keys:['Diesel Prisciliano']},
    {label:'Casetas',keys:['Casetas']},
    {label:'Viaticos',keys:['Viáticos','Viaticos']},
    {label:'Grua',keys:['Grúa','Grua']},
    {label:'Seguro',keys:['Seguro']},
    {label:'Bascula',keys:['Báscula','Bascula']},
    {label:'Activacion camiones',keys:['Activación de camiones','Activacion de camiones']},
    {label:'Equipo seguridad',keys:['Equipo de seguridad']},
    {label:'Permisos SCT',keys:['Permisos SCT']},
    {label:'Regulacion - Placas',keys:['Regulación - Placas','Regulacion - Placas']},
    {label:'Multas',keys:['Multas']},
    {label:'Mant. Camiones',keys:['Mantenimiento Camiones']},
    {label:'Mant. Llantas',keys:['Mantenimiento Llantas']},
    {label:'Mant. Caja',keys:['Mantenimiento Caja']},
    {label:'Refacciones',keys:['Refacciones, consumibles y aditamentos']},
    {label:'Herramientas',keys:['Herramientas y área Mantenimiento','Herramientas y area Mantenimiento']},
    {label:'Arreglo',keys:['Arreglo']},
    {label:'Otros Gastos Op.',keys:['Otros Gastos Operativos']},
    {label:'Nomina OPS',keys:['Nómina OPS','Nomina OPS']},
    {label:'Adelanto Nomina OPS',keys:['Adelanto de Nómina OPS','Adelanto de Nomina OPS']},
    {label:'Renta Camion y Caja',keys:['Renta Camión y Caja','Renta Camion y Caja','Renta CAmión y Caja']},
    {label:'Renta Patio',keys:['Renta Patio']},
  ];

  const costMes=costLines.map(cl=>({...cl,mes:gByClasM(cl.keys),total:gByClasTotal(cl.keys)}));
  const totalCostServe=MES.map((_,m)=>costMes.reduce((s,cl)=>s+cl.mes[m],0));
  const totalCostServeT=costMes.reduce((s,cl)=>s+cl.total,0);

  // Fijos Ops
  const fijosOpsM=MES.map((_,m)=>gd.filter(r=>r['Tipo']==='Fijos'&&mOf(r)===m).reduce((s,r)=>s+pM(r['Monto']),0));
  const fijosOpsT=gd.filter(r=>r['Tipo']==='Fijos').reduce((s,r)=>s+pM(r['Monto']),0);

  // Creditos
  const creditosM=gByClasM(['Créditos','Creditos','Intereses']);
  const creditosT=gByClasTotal(['Créditos','Creditos','Intereses']);

  const fijosM=MES.map((_,m)=>fijosOpsM[m]+creditosM[m]);
  const fijosT=fijosOpsT+creditosT;

  // SG&A (gastos administrativos)
  const sgaM=MES.map((_,m)=>gd.filter(r=>{const cat=r['Categoria']||r['Categoría']||'';return cat==='Gastos Administrativos'&&mOf(r)===m;}).reduce((s,r)=>s+pM(r['Monto']),0));
  const sgaT=gd.filter(r=>(r['Categoria']||r['Categoría']||'')==='Gastos Administrativos').reduce((s,r)=>s+pM(r['Monto']),0);

  // Derived lines
  const margenDirectoM=MES.map((_,m)=>sv[m].i-totalCostServe[m]);
  const margenDirectoT=tI-totalCostServeT;

  const totalGastosM=MES.map((_,m)=>totalCostServe[m]+fijosM[m]);
  const totalGastosT=totalCostServeT+fijosT;

  const margenBrutoM=MES.map((_,m)=>sv[m].i-totalGastosM[m]);
  const margenBrutoT=tI-totalGastosT;

  const ebitdaM=MES.map((_,m)=>margenBrutoM[m]-sgaM[m]);
  const ebitdaT=margenBrutoT-sgaT;

  // EBIT = EBITDA (no tenemos depreciacion)
  const ebitM=ebitdaM;const ebitT=ebitdaT;
  const netM=ebitM;const netT=ebitT;

  // Format P&L cell
  const pc=(v,cls='')=>`<td class="${v<0?'pnl-neg':v>0?'pnl-pos':''} ${cls}">${v!==0?fmt(v):'$0'}</td>`;
  const pcPct=(num,den)=>{if(!den||den===0)return '<td class="mu">N/A</td>';const p=num/den*100;return `<td class="${p<0?'pnl-neg':'pnl-pos'}">${p.toFixed(1)}%</td>`;};

  // Build P&L table rows
  const pnlRows=[];
  // Header months
  pnlRows.push(`<tr class="r-ing"><td>INGRESOS TOTALES</td>${sv.map((_,m)=>pc(sv[m].i)).join('')}<td>${fmt(tI)}</td></tr>`);
  // by cliente
  Object.entries(byCli).sort((a,b)=>b[1].reduce((s,v)=>s+v,0)-a[1].reduce((s,v)=>s+v,0)).forEach(([cli,mes])=>{
    const tot=mes.reduce((s,v)=>s+v,0);
    pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;${cli}</td>${mes.map(v=>`<td class="${v<0?'pnl-neg':''} ${v>0?'pnl-pos':''}">${v?fmt(v):'—'}</td>`).join('')}<td>${fmt(tot)}</td></tr>`);
  });

  pnlRows.push(`<tr class="r-section"><td>(-) COST TO SERVE</td>${totalCostServe.map(v=>`<td>${v?'('+fmt(v)+')':'—'}</td>`).join('')}<td>(${fmt(totalCostServeT)})</td></tr>`);
  costMes.forEach(cl=>{
    if(cl.total===0)return;
    pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;${cl.label}</td>${cl.mes.map(v=>`<td class="mu">${v?'('+fmt(v)+')':'—'}</td>`).join('')}<td class="mu">(${fmt(cl.total)})</td></tr>`);
  });

  pnlRows.push(`<tr class="r-tot"><td>MARGEN DIRECTO</td>${margenDirectoM.map(v=>pc(v)).join('')}<td class="${margenDirectoT>=0?'pnl-pos':'pnl-neg'}">${fmt(margenDirectoT)}</td></tr>`);
  pnlRows.push(`<tr class="r-pct"><td>&nbsp;&nbsp;% Margen Directo</td>${margenDirectoM.map((v,m)=>pcPct(v,sv[m].i)).join('')}<td>${pcPct(margenDirectoT,tI).replace('<td','').replace('</td>','')}</td></tr>`);

  pnlRows.push(`<tr class="r-section"><td>FIJOS</td>${fijosM.map(v=>`<td>${v?'('+fmt(v)+')':'—'}</td>`).join('')}<td>(${fmt(fijosT)})</td></tr>`);
  if(fijosOpsT>0)pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;Fijos Ops</td>${fijosOpsM.map(v=>`<td class="mu">${v?'('+fmt(v)+')':'—'}</td>`).join('')}<td class="mu">(${fmt(fijosOpsT)})</td></tr>`);
  if(creditosT>0)pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;Creditos + Intereses</td>${creditosM.map(v=>`<td class="mu">${v?'('+fmt(v)+')':'—'}</td>`).join('')}<td class="mu">(${fmt(creditosT)})</td></tr>`);

  pnlRows.push(`<tr class="r-tot"><td>MARGEN BRUTO</td>${margenBrutoM.map(v=>pc(v)).join('')}<td class="${margenBrutoT>=0?'pnl-pos':'pnl-neg'}">${fmt(margenBrutoT)}</td></tr>`);

  pnlRows.push(`<tr class="r-section"><td>(-) SG&amp;A</td>${sgaM.map(v=>`<td>${v?'('+fmt(v)+')':'—'}</td>`).join('')}<td>(${fmt(sgaT)})</td></tr>`);

  pnlRows.push(`<tr class="r-ebitda"><td>EBITDA</td>${ebitdaM.map(v=>pc(v)).join('')}<td class="${ebitdaT>=0?'pnl-pos':'pnl-neg'}">${fmt(ebitdaT)}</td></tr>`);
  pnlRows.push(`<tr class="r-pct"><td>&nbsp;&nbsp;% Margen Operativo</td>${ebitdaM.map((v,m)=>pcPct(v,sv[m].i)).join('')}<td>${pcPct(ebitdaT,tI).replace('<td','').replace('</td>','')}</td></tr>`);

  pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;Depreciacion y amortizacion</td>${MES.map(()=>'<td class="mu">$0</td>').join('')}<td class="mu">$0</td></tr>`);
  pnlRows.push(`<tr class="r-tot"><td>EBIT</td>${ebitM.map(v=>pc(v)).join('')}<td class="${ebitT>=0?'pnl-pos':'pnl-neg'}">${fmt(ebitT)}</td></tr>`);
  pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;Intereses</td>${MES.map(()=>'<td class="mu">$0</td>').join('')}<td class="mu">$0</td></tr>`);
  pnlRows.push(`<tr class="r-tot"><td>EBT</td>${ebitM.map(v=>pc(v)).join('')}<td class="${ebitT>=0?'pnl-pos':'pnl-neg'}">${fmt(ebitT)}</td></tr>`);

  pnlRows.push(`<tr class="r-net"><td>NET INCOME</td>${netM.map(v=>pc(v)).join('')}<td>${fmt(netT)}</td></tr>`);
  pnlRows.push(`<tr class="r-pct"><td>&nbsp;&nbsp;% Margen Neto</td>${netM.map((v,m)=>pcPct(v,sv[m].i)).join('')}<td>${pcPct(netT,tI).replace('<td','').replace('</td>','')}</td></tr>`);
  pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;Flujo Operativo</td>${netM.map(v=>`<td>${v?fmt(v):'$0'}</td>`).join('')}<td>${fmt(netT)}</td></tr>`);
  pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;CAPEX</td>${MES.map(()=>'<td class="mu">$0</td>').join('')}<td class="mu">$0</td></tr>`);
  pnlRows.push(`<tr class="r-sub"><td>&nbsp;&nbsp;Free Cash Flow</td>${netM.map(v=>`<td>${v?fmt(v):'$0'}</td>`).join('')}<td>${fmt(netT)}</td></tr>`);

  $('main').innerHTML=
    `<div class="krow">
      <div class="kc"><div class="kc-hd"><div class="kl">Ingresos ${y==='all'?'':y}</div><div class="ki g"><svg viewBox="0 0 24 24"><path d="M3.5 18.5l6-6 4 4 7-8"/></svg></div></div><div class="kv g">${fmtK(tI)}</div><div class="kd">${c?`AA: ${fmtK(tIa)} ${dlt(tI,tIa)}`:''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Margen Directo</div><div class="ki ${margenDirectoT>=0?'g':'r'}"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg></div></div><div class="kv ${margenDirectoT>=0?'g':'r'}">${fmtK(margenDirectoT)}</div><div class="kd">${tI?(margenDirectoT/tI*100).toFixed(1)+'%':''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Margen Bruto</div><div class="ki ${margenBrutoT>=0?'g':'r'}"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg></div></div><div class="kv ${margenBrutoT>=0?'g':'r'}">${fmtK(margenBrutoT)}</div><div class="kd">${tI?(margenBrutoT/tI*100).toFixed(1)+'%':''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">EBITDA</div><div class="ki t"><svg viewBox="0 0 24 24"><path d="M3 13h2v8H3zm4-4h2v12H7zm4-4h2v16h-2zm4 8h2v8h-2zm4-4h2v12h-2z"/></svg></div></div><div class="kv t">${fmtK(ebitdaT)}</div><div class="kd">${tI?(ebitdaT/tI*100).toFixed(1)+'%':''}&nbsp;</div></div>
      <div class="kc"><div class="kc-hd"><div class="kl">Net Income</div><div class="ki ${netT>=0?'g':'r'}"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/></svg></div></div><div class="kv ${netT>=0?'g':'r'}">${fmtK(netT)}</div><div class="kd">${tI?(netT/tI*100).toFixed(1)+'%':''}&nbsp;</div></div>
    </div>
    <div class="cc"><div class="cc-t">Ingresos vs Total Gastos${c?' vs AA':''}</div><div class="lgnd"><span><span class="lsq" style="background:rgba(5,150,105,.75)"></span>Ingresos</span><span><span class="lsq" style="background:rgba(220,38,38,.75)"></span>Gastos</span><span><span class="lsq" style="background:rgba(0,137,123,.75)"></span>EBITDA</span></div><div style="position:relative;height:220px"><canvas id="cPNL"></canvas></div></div>
    <div class="slbl">Estado de Resultados - ${y==='all'?'Todos los anos':y}</div>
    <div class="pnl-wrap"><table class="pnl-tbl">
      <thead><tr><th>Concepto</th>${MES.map(m=>`<th>${m}</th>`).join('')}<th>TOTAL</th></tr></thead>
      <tbody>${pnlRows.join('')}</tbody>
    </table></div>`;

// === LOAD CUENTAS POR PAGAR ===
async function loadCP() {
  if (cpLoaded) return;
  try {
    const t = await fetchCSV(URL_CP);
    CP = parseCSV(t).filter(r => r['Proveedor'] && r['Proveedor'] !== 'Proveedor' && r['Proveedor'] !== '');

// Lookup for EX daily series by date
var EX_BY_DATE=(function(){
  var m={};
  (EX.daily_series||[]).forEach(function(r){m[r.date]=r;});
  return m;
})();

function getTmSrc(){
  var dA=ALL_DATES[RNG.a], dB=ALL_DATES[RNG.b];
  var T3=Array(48).fill(0), T4=Array(48).fill(0);
  var DDOW={0:'Lun',1:'Mar',2:'Mi\u00e9',3:'Jue',4:'Vie',5:'S\u00e1b',6:'Dom'};
  Object.keys(BDD.dates).forEach(function(d){
    if(d<dA||d>dB) return;
    if(SEL.yr!=='all'&&parseInt(d.substring(0,4))!==SEL.yr) return;
    if(SEL.mes!=='all'&&parseInt(d.substring(5,7))!==SEL.mes) return;
    if(TM.dow!=='all'){var dt=new Date(d+'T12:00:00');if(DDOW[dt.getDay()]!==TM.dow) return;}
    var row=BDD.dates[d]; if(!row) return;
    var ex=EX_BY_DATE[d];
    if(ex){
      var rawT3=row.T3.reduce(function(a,b){return a+b;},0);
      var rawT4=row.T4.reduce(function(a,b){return a+b;},0);
      var rawTotal=rawT3+rawT4;
      var scaleT3=rawT3>0?ex.c/rawT3:0;
      var scaleT4=rawT4>0?ex.v/rawT4:0;
      if(rawTotal>0&&rawT3===0&&rawT4===0){
        var scaleAll=ex.t/rawTotal;
        for(var i=0;i<48;i++){T3[i]+=(row.T3[i]||0)*scaleAll;T4[i]+=(row.T4[i]||0)*scaleAll;}
      } else {
        for(var i=0;i<48;i++){T3[i]+=(row.T3[i]||0)*scaleT3;T4[i]+=(row.T4[i]||0)*scaleT4;}
      }
    } else {
      for(var i=0;i<48;i++){T3[i]+=row.T3[i]||0;T4[i]+=row.T4[i]||0;}
    }
  });
  T3=T3.map(function(v){return Math.round(v);});
  T4=T4.map(function(v){return Math.round(v);});
  var total=T3.map(function(v,i){return v+T4[i];});
  return {T3:T3,T4:T4,total:total};
}

function renderHorasMuertas(src, thresh){
  // Merge consecutive dead blocks into time ranges
  var vals = TM.turno==='T3'?src.T3 : TM.turno==='T4'?src.T4 : src.total;
  var mx = Math.max.apply(null, vals.concat([1]));
  var grandTotal = vals.reduce(function(a,b){return a+b;},0);

  // Find dead blocks (below threshold)
  var dead = ALEN_BLOCKS.map(function(b,i){
    return {block:b, idx:i, v:vals[i]||0, isDead: vals[i]<mx*thresh};
  });

  // Merge consecutive dead blocks into ranges
  var ranges = [];
  var i = 0;
  while(i < dead.length){
    if(dead[i].isDead){
      var start = i;
      var sum = 0;
      while(i < dead.length && dead[i].isDead){
        sum += dead[i].v;
        i++;
      }
      var end = i - 1;
      // Format range label: startBlock – next block after end (or 24:00)
      var startLbl = ALEN_BLOCKS[start];
      var endIdx = end + 1;
      var endLbl = endIdx < ALEN_BLOCKS.length ? ALEN_BLOCKS[endIdx] : '24:00';
      ranges.push({label: startLbl + ' – ' + endLbl, sum: sum, blocks: end-start+1});
    } else {
      i++;
    }
  }

  var totalDead = ranges.reduce(function(a,r){return a+r.sum;},0);
  var maxRange = ranges.length ? Math.max.apply(null, ranges.map(function(r){return r.sum;})) : 1;

  // Update header labels
  var el;
  el=document.getElementById('ctHMumbral'); if(el) el.textContent=Math.round(thresh*100)+'%';
  el=document.getElementById('ctHMturno');  if(el) el.textContent=TM.turno==='T3'?'T3 Día':TM.turno==='T4'?'T4 Noche':'Ambos';
  el=document.getElementById('ctHMperiodo'); if(el){
    var yr=SEL.yr==='all'?'Todos':String(SEL.yr);
    var mes=SEL.mes!=='all'?' · '+['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][SEL.mes]:'';
    el.textContent='· '+yr+mes;
  }

  // Build rows
  var tableEl = document.getElementById('tmHorasTable');
  if(!tableEl) return;

  if(!ranges.length){
    tableEl.innerHTML='<div style="padding:16px;text-align:center;color:var(--slate2);font-size:11px">No hay bloques de horas muertas con el umbral actual</div>';
  } else {
    var rows = ranges.map(function(r, idx){
      var pct = grandTotal>0 ? Math.round(r.sum/grandTotal*10000)/100 : 0;
      var barW = maxRange>0 ? Math.round(r.sum/maxRange*100) : 0;
      var bg = idx%2===0?'#fff':'#f8fafb';
      return '<div style="display:grid;grid-template-columns:160px 1fr 180px;gap:0;padding:11px 14px;background:'+bg+';border-bottom:1px solid #f1f5f9;align-items:center">'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'+
          '<span style="font-size:12px;font-weight:600;color:#1e293b">'+r.label+'</span>'+
        '</div>'+
        '<div style="font-size:14px;font-weight:700;color:#1e293b;padding-left:8px">'+r.sum.toLocaleString('es-MX')+'</div>'+
        '<div style="padding-left:8px">'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<div style="flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden">'+
              '<div style="width:'+barW+'%;height:100%;background:linear-gradient(90deg,#16a34a,#22c55e);border-radius:4px"></div>'+
            '</div>'+
            '<span style="font-size:11px;font-weight:600;color:#475569;white-space:nowrap">'+pct.toFixed(2)+'%</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
    tableEl.innerHTML = rows;
  }

  // Total row
  var totalPct = grandTotal>0 ? Math.round(totalDead/grandTotal*10000)/100 : 0;
  var totalBarW = grandTotal>0 ? Math.round(totalDead/grandTotal*100) : 0;
  var totalEl = document.getElementById('tmHorasTotal');
  if(totalEl){
    totalEl.innerHTML = ranges.length?
      '<div style="display:grid;grid-template-columns:160px 1fr 180px;gap:0;padding:11px 14px;background:#0d9488;border-radius:8px;align-items:center;color:#fff">'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-4"/></svg>'+
          '<span style="font-size:11px;font-weight:700;letter-spacing:.04em">TOTAL HORAS MUERTAS</span>'+
        '</div>'+
        '<div style="font-size:15px;font-weight:800;padding-left:8px">'+totalDead.toLocaleString('es-MX')+'</div>'+
        '<div style="padding-left:8px">'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<div style="flex:1;height:8px;background:rgba(255,255,255,0.3);border-radius:4px;overflow:hidden">'+
              '<div style="width:'+totalBarW+'%;height:100%;background:#fff;border-radius:4px"></div>'+
            '</div>'+
            '<span style="font-size:12px;font-weight:800;white-space:nowrap">'+totalPct.toFixed(2)+'%</span>'+
          '</div>'+
        '</div>'+
      '</div>' : '';
  }

  // Grand total footer — total ALL movements in period
  var grandEl = document.getElementById('tmHorasGrand');
  if(grandEl){
    var yr2=SEL.yr==='all'?'Nov 2024 – May 2026':String(SEL.yr);
    var mes2=SEL.mes!=='all'?' · '+['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][SEL.mes]:'';
    grandEl.innerHTML=
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6ee7b7" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>'+
        '<div>'+
          '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.04em">TOTAL DE MOVIMIENTOS</div>'+
          '<div style="font-size:10px;color:rgba(255,255,255,.6)">'+yr2+mes2+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="font-size:22px;font-weight:800;color:#fff">'+grandTotal.toLocaleString('es-MX')+'</div>';
  }
}

// DOW name map for EX lookup (DIAS uses short Spanish names)
var DIAS_ES_TO_FULL={'Lun':'Lunes','Mar':'Martes','Mié':'Miércoles','Jue':'Jueves','Vie':'Viernes','Sáb':'Sábado','Dom':'Domingo'};

function buildTmHeatmap(thresh){
  // Build dowData from filtered EX daily_series + BDD proportions (respects year/month/range filters)
  var dA=ALL_DATES[RNG.a], dB=ALL_DATES[RNG.b];
  var DDOW_IDX={0:'Lun',1:'Mar',2:'Mié',3:'Jue',4:'Vie',5:'Sáb',6:'Dom'};
  // accumulators: per-DOW, per-block sums of scaled T3/T4
  var acc={};
  DIAS.forEach(function(d){acc[d]={T3:Array(48).fill(0),T4:Array(48).fill(0),days:0};});

  Object.keys(BDD.dates).forEach(function(d){
    if(d<dA||d>dB) return;
    if(SEL.yr!=='all'&&parseInt(d.substring(0,4))!==SEL.yr) return;
    if(SEL.mes!=='all'&&parseInt(d.substring(5,7))!==SEL.mes) return;
    var row=BDD.dates[d]; if(!row) return;
    var dt=new Date(d+'T12:00:00');
    var dayKey=DDOW_IDX[dt.getDay()];
    var ex=EX_BY_DATE[d];
    if(ex){
      var rawT3=row.T3.reduce(function(a,b){return a+b;},0);
      var rawT4=row.T4.reduce(function(a,b){return a+b;},0);
      var scT3=rawT3>0?ex.c/rawT3:0;
      var scT4=rawT4>0?ex.v/rawT4:0;
      for(var i=0;i<48;i++){
        acc[dayKey].T3[i]+=(row.T3[i]||0)*scT3;
        acc[dayKey].T4[i]+=(row.T4[i]||0)*scT4;
      }
    } else {
      for(var i=0;i<48;i++){
        acc[dayKey].T3[i]+=row.T3[i]||0;
        acc[dayKey].T4[i]+=row.T4[i]||0;
      }
    }
    acc[dayKey].days++;
  });

  // Build dowData rounding values
  var dowData={};
  DIAS.forEach(function(d){
    var a=acc[d];
    if(!a.days){dowData[d]=null;return;}
    var t3=a.T3.map(function(v){return Math.round(v);});
    var t4=a.T4.map(function(v){return Math.round(v);});
    var tot=t3.map(function(v,i){return v+t4[i];});
    dowData[d]={T3:t3,T4:t4,total:tot};
  });

  // Get all values to find max
  var allV=[];
  DIAS.forEach(function(d){
    if(!dowData[d]) return;
    var arr=TM.turno==='T3'?dowData[d].T3:TM.turno==='T4'?dowData[d].T4:dowData[d].total;
    allV=allV.concat(arr);
  });
  var hmMax=allV.length?Math.max.apply(null,allV.concat([1])):1;

  function hc(v,mx){
    var p=v/mx;
    if(p===0)return{bg:'#f8fafb',fg:'#cbd5e1'};
    if(p<0.25)return{bg:'#ccfbf1',fg:'#0f766e'};
    if(p<0.50)return{bg:'#6ee7b7',fg:'#064e3b'};
    if(p<0.75)return{bg:'#14b8a6',fg:'#fff'};
    if(p<0.90)return{bg:'#0d9488',fg:'#fff'};
    return{bg:'#0f766e',fg:'#fff'};
  }

  // ── Totals ────────────────────────────────────────────────────────────────
  var colTotals={};
  DIAS.forEach(function(d){
    if(!dowData[d]){colTotals[d]=0;return;}
    var arr=TM.turno==='T3'?dowData[d].T3:TM.turno==='T4'?dowData[d].T4:dowData[d].total;
    colTotals[d]=arr.reduce(function(a,b){return a+b;},0);
  });
  var rowTotals=Array(48).fill(0);
  ALEN_BLOCKS.forEach(function(b,bi){
    DIAS.forEach(function(d){
      if(!dowData[d]) return;
      var arr=TM.turno==='T3'?dowData[d].T3:TM.turno==='T4'?dowData[d].T4:dowData[d].total;
      rowTotals[bi]+=(arr[bi]||0);
    });
  });
  var grandTotal=Object.keys(colTotals).reduce(function(s,d){return s+colTotals[d];},0);

  var TH='font-size:9px;font-weight:700;padding:2px 3px;text-align:center;';
  var TH_STICKY='font-size:9px;color:#94a3b8;font-family:DM Mono,monospace;padding:2px 8px 2px 0;text-align:left;white-space:nowrap;position:sticky;left:0;background:#fff;z-index:1;';
  var TOTAL_BG='background:#f1f5f9;';

  // ── Header ────────────────────────────────────────────────────────────────
  var h='<div style="overflow-x:auto"><table style="border-collapse:collapse;min-width:100%">';
  h+='<thead><tr>';
  h+='<th style="'+TH_STICKY+'">Bloque</th>';
  DIAS.forEach(function(d){
    var hasData=!!dowData[d];
    var ct=colTotals[d]||0;
    var sub=hasData?'<br><span style="font-size:8px;font-weight:400;color:#94a3b8">'+(ALEN_TM_PCT?'100%':ct.toLocaleString('es-MX'))+'</span>':'';
    h+='<th style="'+TH+'color:'+(hasData?'#64748b':'#cbd5e1')+'">'+d+sub+'</th>';
  });
  h+='<th style="'+TH+TOTAL_BG+'color:#475569;border-left:2px solid #e2e8f0;">'+(ALEN_TM_PCT?'% fil':'Total')+'</th>';
  h+='</tr></thead><tbody>';

  // ── Data rows ─────────────────────────────────────────────────────────────
  ALEN_BLOCKS.forEach(function(b,bi){
    var rowStyle='';
    if(b==='07:00'||b==='19:00')rowStyle='border-top:2px solid #e2e8f0;';
    h+='<tr style="'+rowStyle+'">';
    h+='<td style="font-size:9px;font-family:DM Mono,monospace;color:#94a3b8;padding:1px 8px 1px 0;white-space:nowrap;position:sticky;left:0;background:#fff">'+b+'</td>';

    DIAS.forEach(function(d){
      var arr=dowData[d]?(TM.turno==='T3'?dowData[d].T3:TM.turno==='T4'?dowData[d].T4:dowData[d].total):null;
      var v=arr?(arr[bi]||0):0;

      var c,lbl;
      if(ALEN_TM_PCT){
        // % of column (day) total → each column sums to 100%
        var colSum=colTotals[d]||0;
        var pc=colSum>0?v/colSum:0;
        var pctVal=colSum>0?Math.round(pc*1000)/10:0;
        lbl=pctVal>0?pctVal+'%':'';
        if(pc===0) c={bg:'#f8fafb',fg:'#cbd5e1'};
        else if(pc<0.04) c={bg:'#ccfbf1',fg:'#0f766e'};
        else if(pc<0.08) c={bg:'#6ee7b7',fg:'#064e3b'};
        else if(pc<0.14) c={bg:'#14b8a6',fg:'#fff'};
        else if(pc<0.22) c={bg:'#0d9488',fg:'#fff'};
        else c={bg:'#0f766e',fg:'#fff'};
      } else {
        var pa=hmMax>0?v/hmMax:0;
        lbl=v>0?v:'';
        if(pa===0) c={bg:'#f8fafb',fg:'#cbd5e1'};
        else if(pa<0.25) c={bg:'#ccfbf1',fg:'#0f766e'};
        else if(pa<0.50) c={bg:'#6ee7b7',fg:'#064e3b'};
        else if(pa<0.75) c={bg:'#14b8a6',fg:'#fff'};
        else if(pa<0.90) c={bg:'#0d9488',fg:'#fff'};
        else c={bg:'#0f766e',fg:'#fff'};
      }

      var titlePct=colTotals[d]>0?Math.round(v/colTotals[d]*1000)/10:0;
      var title=d+' '+b+': '+v+' viajes ('+titlePct+'% del día)';
      h+='<td style="padding:1px 2px" title="'+title+'">';
      h+='<div style="width:40px;height:20px;border-radius:4px;background:'+c.bg+';color:'+c.fg+';font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto">'+lbl+'</div>';
      h+='</td>';
    });

    // Row total or row % of grand total
    var rt=rowTotals[bi];
    var rtLbl;
    if(ALEN_TM_PCT){
      var rp=grandTotal>0?Math.round(rt/grandTotal*1000)/10:0;
      rtLbl=rp>0?rp+'%':'';
    } else {
      rtLbl=rt>0?rt:'';
    }
    h+='<td style="padding:1px 4px;border-left:2px solid #e2e8f0;'+TOTAL_BG+'">';
    h+='<div style="width:44px;height:20px;border-radius:4px;font-size:9px;font-weight:700;color:#475569;display:flex;align-items:center;justify-content:center;margin:0 auto">'+rtLbl+'</div>';
    h+='</td>';
    h+='</tr>';
  });

  // ── Footer: column totals ─────────────────────────────────────────────────
  h+='<tr style="border-top:2px solid #cbd5e1;">';
  h+='<td style="font-size:9px;font-weight:700;color:#475569;padding:3px 8px 3px 0;white-space:nowrap;position:sticky;left:0;'+TOTAL_BG+'">TOTAL</td>';
  DIAS.forEach(function(d){
    var ct=colTotals[d]||0;
    var footLbl=ALEN_TM_PCT?'100%':(ct>0?ct.toLocaleString('es-MX'):'—');
    h+='<td style="padding:1px 2px;'+TOTAL_BG+'">';
    h+='<div style="width:40px;height:22px;border-radius:4px;font-size:9px;font-weight:700;color:#0d9488;display:flex;align-items:center;justify-content:center;margin:0 auto">'+footLbl+'</div>';
    h+='</td>';
  });
  // Grand total
  var gtLbl=ALEN_TM_PCT?'100%':grandTotal.toLocaleString('es-MX');
  h+='<td style="padding:1px 4px;'+TOTAL_BG+'border-left:2px solid #e2e8f0;">';
  h+='<div style="width:44px;height:22px;border-radius:4px;font-size:9px;font-weight:800;color:#0f172a;display:flex;align-items:center;justify-content:center;margin:0 auto">'+gtLbl+'</div>';
  h+='</td>';
  h+='</tr>';

  h+='</tbody></table></div>';
  document.getElementById('tmHeat').innerHTML=h;
}

function mk(id,type,data,opts){
  if(CH[id])CH[id].destroy();
  var cfg={type:type,data:data,options:{responsive:true,maintainAspectRatio:false,plugins:{
    legend:{display:false},
    datalabels:{display:true}
  }}};
  if(opts&&opts.scales)cfg.options.scales=opts.scales;
  if(opts&&opts.cutout)cfg.options.cutout=opts.cutout;
  if(opts&&opts.layout)cfg.options.layout=opts.layout;
  if(opts&&opts.plugins){
    Object.keys(opts.plugins).forEach(function(k){
      if(cfg.options.plugins[k]&&typeof cfg.options.plugins[k]==='object'&&!Array.isArray(cfg.options.plugins[k])){
        Object.assign(cfg.options.plugins[k],opts.plugins[k]);
      } else {
        cfg.options.plugins[k]=opts.plugins[k];
      }
    });
  }
  CH[id]=new Chart(document.getElementById(id),cfg);
}
function filtDay(){
  var d=D.daily;
  var dA=ALL_DATES[RNG.a],dB=ALL_DATES[RNG.b];
  d=d.filter(function(x){return x.date>=dA&&x.date<=dB;});
  if(SEL.excludeZeros)d=d.filter(function(x){return (x.cargado||0)>0||(x.vacio||0)>0||(x.total||0)>0;});
  if(SEL.yr!=='all')d=d.filter(function(x){return x.year===SEL.yr;});
  if(SEL.mes!=='all')d=d.filter(function(x){return x.month===SEL.mes;});
  return d;
}
function filtDayPrev(){
  var py=prevYr(SEL.yr);if(!py)return [];
  var d=D.daily.filter(function(x){return x.year===py;});
  if(SEL.mes!=='all')d=d.filter(function(x){return x.month===SEL.mes;});
  return d;
}

}
function mkPKpi(lbl,val,sub,delta,col){
  var dh='';
  if(delta!=null&&delta!==0){var cls=delta>0?'dup':'ddn';dh='<div class="kdelta '+cls+'">'+(delta>0?'+':'')+Math.abs(delta).toFixed(1)+'pp</div>';}
  return '<div class="kpi" style="'+(col?'border-top:2px solid '+col:'')+'"><div class="klbl">'+lbl+'</div><div class="kval" style="'+(col?'color:'+col:'')+'">'+val+'%</div><div class="ksub">'+sub+'</div>'+dh+'</div>';

var PCOLS={2024:C.slate2,2025:C.teal,2026:C.green};
function updateProdCard(){
  var vista=SEL.prodVista; // 'all' | 'cargados' | 'vacios'
  var yr=SEL.yr;
  var meta=PROD_MEDIA[vista]; // THE denominator: 49 total / 27 cargados / 19 vacios
  var vistaLbl=vista==='cargados'?'Cargados':vista==='vacios'?'Vacíos':'Total';
  var vistaField=vista==='cargados'?'cargado':vista==='vacios'?'vacio':'total';

  // ── Example in formula visual: use media as typical day, meta as denominator ──
  var exPct=(meta>0?(meta/meta*100).toFixed(0):100);
  // Show a real example: find a day close to 1.5x meta to illustrate >100% case
  var days=D.daily;
  if(yr!=='all') days=days.filter(function(r){return r.year===yr;});
  var exDay=days.reduce(function(best,r){
    var v=r[vistaField]||0;
    var target=Math.round(meta*1.6);
    return Math.abs(v-target)<Math.abs((best[vistaField]||0)-target)?r:best;
  },{});
  var exViajes=exDay[vistaField]||Math.round(meta*1.5);
  var exPctReal=meta>0?(exViajes/meta*100).toFixed(1):'—';

  var el;
  el=document.getElementById('pcExViajes'); if(el) el.textContent=exViajes;
  el=document.getElementById('pcExMax');    if(el) el.textContent=meta;
  el=document.getElementById('pcExMaxSub'); if(el) el.textContent='meta '+vistaLbl.toLowerCase()+'/día';
  el=document.getElementById('pcExPct');    if(el) el.textContent=exPctReal+'%';

  // ── Reference data section ────────────────────────────────────────────────
  var ref=document.getElementById('prodCardRef');
  if(!ref) return;

  var filtDays=D.daily;
  if(yr!=='all') filtDays=filtDays.filter(function(r){return r.year===yr;});
  if(SEL.mes!=='all') filtDays=filtDays.filter(function(r){return r.month===SEL.mes;});
  var totalViajes=filtDays.reduce(function(s,r){return s+(r[vistaField]||0);},0);
  var daysOver=filtDays.filter(function(r){return (r[vistaField]||0)>meta;}).length;
  var periodo=yr==='all'?'19 meses · Nov 2024–May 2026':(SEL.mes!=='all'?['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][SEL.mes]+' '+yr:String(yr));

  ref.innerHTML=
    '<div style="display:flex;flex-wrap:wrap;gap:14px">'+
    '<div style="font-size:9px;font-weight:700;color:var(--slate2);letter-spacing:.06em;width:100%">DATOS DE REFERENCIA · '+vistaLbl.toUpperCase()+' · '+periodo.toUpperCase()+'</div>'+
    '<div style="font-size:10px;color:var(--slate)"><b style="color:var(--dark)">'+totalViajes.toLocaleString('es-MX')+'</b> viajes '+vistaLbl.toLowerCase()+' en el periodo</div>'+
    '<div style="font-size:10px;color:var(--slate)"><b style="color:var(--dark)">Meta (denominador):</b> '+meta+' viajes/día · '+vistaLbl+'</div>'+
    '<div style="font-size:10px;color:var(--slate)"><b style="color:var(--dark)">'+daysOver+'</b> días superaron la meta (% &gt; 100%)</div>'+
    '</div>';
}
