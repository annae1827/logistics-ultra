<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logistics Ultra — Finanzas Socios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#00897B;--teal2:#00796B;--teal3:#e0f2f1;--teal4:#b2dfdb;
  --nav:#0d1b2a;--nav2:#1a2e40;
  --bg:#f0f4f8;--s0:#fff;--s1:#f7fafc;--s2:#edf2f7;
  --grn:#10b981;--grn2:#d1fae5;
  --red:#ef4444;--red2:#fee2e2;
  --ylw:#f59e0b;--ylw2:#fef3c7;
  --blu:#3b82f6;--blu2:#dbeafe;
  --pur:#8b5cf6;--pur2:#ede9fe;
  --t0:#0f172a;--t1:#1e293b;--t2:#475569;--t3:#94a3b8;
  --br:#e2e8f0;--br2:#cbd5e1;
  --r:14px;--r2:10px;--r3:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);font-size:14px;background:var(--bg);color:var(--t1)}
#loading{position:fixed;inset:0;background:linear-gradient(135deg,#0d1b2a,#1a3a4a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px}
.ld-icon{font-size:56px}
.ld-title{color:#fff;font-size:24px;font-weight:800;letter-spacing:-.3px}
.ld-title span{color:#4DB6AC}
#ld-msg{color:rgba(255,255,255,.45);font-size:13px}
.ld-bar{width:220px;height:4px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--teal),#00bcd4);animation:lbar 2s ease-in-out infinite}
@keyframes lbar{0%{width:0%}70%{width:85%}100%{width:100%}}
#ld-err{display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:12px 20px;border-radius:10px;font-size:12px;max-width:400px;text-align:center;line-height:1.5;margin-top:6px}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:225px;background:var(--nav);display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
.sb-emoji{font-size:30px;width:46px;height:46px;background:linear-gradient(135deg,var(--teal),#00bcd4);border-radius:12px;display:flex;align-items:center;justify-content:center}
.sb-n{font-size:14px;font-weight:800;color:#fff}
.sb-s{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-sec{font-size:9px;font-weight:800;color:rgba(255,255,255,.18);text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.4);font-size:13px;font-weight:500;margin-bottom:2px;transition:all .15s;user-select:none}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.ni.on{background:linear-gradient(135deg,rgba(0,137,123,.6),rgba(0,188,212,.35));color:#fff;box-shadow:0 4px 12px rgba(0,137,123,.25)}
.ni-e{font-size:16px;width:22px;text-align:center}
.sb-foot{padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);font-size:10px;color:rgba(255,255,255,.22);line-height:1.8}
.sb-foot b{color:rgba(255,255,255,.45);display:block;font-size:11px}
.cnt{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{background:var(--s0);border-bottom:1px solid var(--br);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-tit{font-size:16px;font-weight:700;color:var(--t0)}
.top-r{display:flex;align-items:center;gap:10px}
.t-sel{background:var(--s1);border:1.5px solid var(--br2);color:var(--t1);font-size:13px;padding:6px 10px;border-radius:var(--r3);font-family:var(--font);font-weight:500;cursor:pointer}
.act-btn{background:linear-gradient(135deg,var(--teal),#00acc1);border:none;color:#fff;font-size:13px;padding:7px 16px;border-radius:var(--r3);cursor:pointer;font-family:var(--font);font-weight:700;box-shadow:0 4px 12px rgba(0,137,123,.3)}
.main{flex:1;overflow-y:auto;padding:22px;background:var(--bg)}
.fbox{background:var(--s0);border:1.5px solid var(--br);border-radius:var(--r);padding:14px 18px;box-shadow:var(--sh);margin-bottom:18px;position:relative;overflow:hidden}
.fbox::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),#00bcd4)}
.fbox-hd{font-size:10px;font-weight:800;color:var(--teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.fbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.f-sel{width:100%;background:var(--s1);border:1.5px solid var(--br2);color:var(--t1);font-size:12px;padding:6px 9px;border-radius:var(--r3);font-family:var(--font);cursor:pointer}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:18px}
.kc{background:var(--s0);border:1.5px solid var(--br);border-radius:var(--r);padding:16px;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;cursor:default}
.kc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.kc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.ke{font-size:20px}
.kv{font-size:22px;font-weight:800;color:var(--t0);line-height:1;letter-spacing:-.4px}
.kv.g{color:var(--grn)}.kv.r{color:var(--red)}.kv.b{color:var(--blu)}
.kv.y{color:var(--ylw)}.kv.p{color:var(--pur)}.kv.t{color:var(--teal)}
.kd{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.4}
.cc{background:var(--s0);border:1.5px solid var(--br);border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:16px}
.cc-t{font-size:11px;font-weight:700;color:var(--t1);margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.05em}
.lgnd{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.lgnd span{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);font-weight:500}
.lsq{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.tw{overflow-x:auto;border-radius:var(--r);border:1.5px solid var(--br);box-shadow:var(--sh);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--nav);color:rgba(255,255,255,.65);padding:9px 12px;font-size:9px;font-weight:700;text-align:left;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;border-bottom:2px solid var(--teal)}
th.r{text-align:right}
td{padding:8px 12px;border-bottom:1px solid var(--br);color:var(--t1);white-space:nowrap;font-size:12px}
td.r{text-align:right;font-family:var(--mono)}
td.g{color:var(--grn);font-weight:700}td.re{color:var(--red);font-weight:700}
td.mu{color:var(--t2)}td.y{color:var(--ylw);font-weight:700}
td.t{color:var(--teal);font-weight:700}td.b{color:var(--blu);font-weight:700}
tr:hover td{background:#f0fdfb}tr:last-child td{border-bottom:none}
tfoot td{padding:9px 12px;background:var(--nav);color:rgba(255,255,255,.7);font-weight:700;border-top:2px solid var(--teal);font-family:var(--mono);font-size:11px}
tfoot td.r{text-align:right}
.pnl-wrap{overflow-x:auto;border-radius:var(--r);border:1.5px solid var(--br);box-shadow:var(--sh);margin-bottom:16px}
.pnl-tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:800px}
.pnl-tbl th{background:var(--nav);color:rgba(255,255,255,.65);padding:8px 10px;font-size:9px;font-weight:700;text-align:right;white-space:nowrap;border-bottom:2px solid var(--teal);position:sticky;top:0;z-index:2}
.pnl-tbl th:first-child{text-align:left;position:sticky;left:0;background:var(--nav);z-index:3;min-width:180px}
.pnl-tbl th:last-child{position:sticky;right:0;background:var(--nav);color:#4DB6AC;border-left:2px solid var(--teal)}
.pnl-tbl td{padding:6px 10px;border-bottom:1px solid var(--br);white-space:nowrap;text-align:right;font-family:var(--mono)}
.pnl-tbl td:first-child{text-align:left;font-family:var(--font);font-size:12px;position:sticky;left:0;background:var(--s0);z-index:1}
.pnl-tbl td:last-child{position:sticky;right:0;background:var(--s0);border-left:2px solid var(--teal4);font-weight:700}
.pnl-tbl tr:hover td{background:#f0fdfb}
.pnl-tbl tr.r-ing td{background:var(--teal3);font-weight:700;color:var(--teal2)}
.pnl-tbl tr.r-ing td:first-child,.pnl-tbl tr.r-ing td:last-child{background:var(--teal3)}
.pnl-tbl tr.r-sub td:first-child{padding-left:22px;color:var(--t2);font-size:11px}
.pnl-tbl tr.r-sec td{background:var(--nav2);color:rgba(255,255,255,.8);font-weight:700;font-size:10px}
.pnl-tbl tr.r-sec td:first-child,.pnl-tbl tr.r-sec td:last-child{background:var(--nav2)}
.pnl-tbl tr.r-tot td{background:var(--s2);font-weight:700}
.pnl-tbl tr.r-tot td:first-child,.pnl-tbl tr.r-tot td:last-child{background:var(--s2)}
.pnl-tbl tr.r-net td{background:var(--teal2);color:#fff;font-weight:800}
.pnl-tbl tr.r-net td:first-child,.pnl-tbl tr.r-net td:last-child{background:var(--teal2)}
.pnl-tbl tr.r-pct td{background:var(--s1);color:var(--t2);font-size:10px}
.pnl-tbl tr.r-pct td:first-child,.pnl-tbl tr.r-pct td:last-child{background:var(--s1)}
.pnl-neg{color:var(--red)!important;font-weight:700!important}
.pnl-pos{color:var(--grn)!important;font-weight:700!important}
.ibox{background:linear-gradient(135deg,#f0fdfb,#f0f9ff);border:1.5px solid var(--teal4);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;position:relative;overflow:hidden}
.ibox::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),#00bcd4)}
.ibox-hd{font-size:10px;font-weight:800;color:var(--teal2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.ibox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ic{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid var(--br);display:flex;align-items:flex-start;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ic-e{font-size:22px;flex-shrink:0;margin-top:1px}
.ic-t{font-size:11px;font-weight:700;color:var(--t0);margin-bottom:3px}
.ic-b{font-size:11px;color:var(--t2);line-height:1.5}
.bdg{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600}
.bt{background:var(--teal3);color:var(--teal2)}.bg{background:var(--s2);color:var(--t2);border:1px solid var(--br)}
.by{background:var(--ylw2);color:#92400e}.bb{background:var(--blu2);color:#1e40af}
.tag-u{background:#dbeafe;color:#1e40af;font-weight:700;padding:2px 9px;border-radius:99px;font-size:11px;display:inline-block}
.tag-jf{background:var(--grn2);color:#065f46;font-weight:700;padding:2px 9px;border-radius:99px;font-size:11px;display:inline-block}
.tag-jnf{background:var(--ylw2);color:#92400e;font-weight:700;padding:2px 9px;border-radius:99px;font-size:11px;display:inline-block}
.slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 9px;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--br)}
@media(max-width:800px){.g2{grid-template-columns:1fr}.sb{display:none}}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-icon">&#x1F4B0;</div>
  <div class="ld-title">Logistics Ultra &mdash; <span>Socios</span></div>
  <div id="ld-msg">Iniciando...</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
  <div id="ld-err"></div>
</div>

<div class="app" id="app" style="display:none">
<aside class="sb">
  <div class="sb-brand">
    <div class="sb-emoji">&#x1F4B0;</div>
    <div><div class="sb-n">Finanzas UAL</div><div class="sb-s">Dashboard Socios</div></div>
  </div>
  <nav class="sb-nav">
    <div class="sb-sec">Resumen</div>
    <div class="ni on" onclick="goTab('resumen',this)"><span class="ni-e">&#x1F4CA;</span>Resumen General</div>
    <div class="sb-sec">Por Empresa</div>
    <div class="ni" onclick="goTab('ual',this)"><span class="ni-e">&#x1F69B;</span>UAL</div>
    <div class="ni" onclick="goTab('javpf',this)"><span class="ni-e">&#x1F3E2;</span>JAVP Fiscal</div>
    <div class="ni" onclick="goTab('javpnf',this)"><span class="ni-e">&#x1F4BC;</span>JAVP No Fiscal</div>
    <div class="sb-sec">Analisis</div>
    <div class="ni" onclick="goTab('socios',this)"><span class="ni-e">&#x1F465;</span>Gastos por Socio</div>
    <div class="ni" onclick="goTab('clasif',this)"><span class="ni-e">&#x1F5C2;&#xFE0F;</span>Por Clasificacion</div>
    <div class="ni" onclick="goTab('pnl',this)"><span class="ni-e">&#x1F4C8;</span>P&amp;L por Empresa</div>
    <div class="sb-sec">Archivos</div>
    <div class="ni" onclick="goTab('fijos',this)"><span class="ni-e">&#x1F4CC;</span>Gastos Fijos</div>
  </nav>
  <div class="sb-foot"><b id="sbInfo">Cargando...</b><span id="sbSub"></span></div>
</aside>
<div class="cnt">
  <header class="top">
    <div class="top-tit" id="topTit">&#x1F4CA; Resumen General</div>
    <div class="top-r">
      <select class="t-sel" id="yrSel" onchange="render()">
        <option value="all">Todos los anos</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026" selected>2026</option>
      </select>
      <button class="act-btn" onclick="recargarSheets()">&#x1F504; Actualizar</button>
    </div>
  </header>
  <main class="main" id="main"></main>
</div>
</div>

<script>
Chart.register(ChartDataLabels);
const URL_EDO='https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ74TLWKbQNiyCJzbUeFbcRMK_LwQsqdsomEGSoiWrtpsn2FPg4uu_BXiU0IgOvmaDTM7LK2OSBNGN/pub?gid=1477204894&single=true&output=csv';
const URL_FIJOS='https://docs.google.com/spreadsheets/d/e/2PACX-1vQJ74TLWKbQNiyCJzbUeFbcRMK_LwQsqdsomEGSoiWrtpsn2FPg4uu_BXiU0IgOvmaDTM7LK2OSBNGN/pub?gid=1651919043&single=true&output=csv';
const MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const CLRS=['#00897B','#3b82f6','#f59e0b','#8b5cf6','#ef4444','#10b981','#0891b2','#ec4899','#14b8a6','#f97316'];
const $=id=>document.getElementById(id);
const yr=()=>$('yrSel').value;
const fmt=n=>'$'+Math.round(Math.abs(n)).toLocaleString('es-MX');
const fmtK=n=>{const a=Math.abs(n),s=n<0?'-':'';return s+(a>=1e6?'$'+(a/1e6).toFixed(2)+'M':a>=1e3?'$'+Math.round(a/1e3).toLocaleString('es-MX')+'k':fmt(a));}
const fmtN=n=>Math.round(n).toLocaleString('es-MX');
let RAW=[],FIJOS=[],CH={};
let curTab='resumen',curMes=-1,curCli='all',curSocio='all',curCl='all';
function getTipos(){return [...new Set(RAW.map(r=>r[0]).filter(Boolean))].sort();}
function fYr(arr){const y=yr();return y==='all'?arr:arr.filter(r=>r[1]===parseInt(y));}
function filtered(){
  let d=fYr(RAW);
  if(curMes>=0) d=d.filter(r=>r[2]-1===curMes);
  if(curCli!=='all') d=d.filter(r=>r[0]===curCli);
  if(curSocio!=='all') d=d.filter(r=>r[6]===curSocio);
  if(curCl!=='all') d=d.filter(r=>r[5]===curCl);
  return d;
}
function filtTipo(tipo){
  let d=fYr(RAW);
  if(curMes>=0) d=d.filter(r=>r[2]-1===curMes);
  if(curSocio!=='all') d=d.filter(r=>r[6]===curSocio);
  if(curCl!=='all') d=d.filter(r=>r[5]===curCl);
  if(tipo==='UAL') return d.filter(r=>r[0]==='UAL');
  if(tipo==='JAVP_No_Fiscal') return d.filter(r=>r[0]&&r[0].includes('No'));
  if(tipo==='JAVP_Fiscal') return d.filter(r=>r[0]&&r[0].includes('Fiscal')&&!r[0].includes('No'));
  return d;
}
const sumD=a=>a.reduce((s,r)=>s+r[3],0);
const sumR=a=>a.reduce((s,r)=>s+r[4],0);
const byMD=a=>MES.map((_,m)=>a.filter(r=>r[2]-1===m).reduce((s,r)=>s+r[3],0));
const byMR=a=>MES.map((_,m)=>a.filter(r=>r[2]-1===m).reduce((s,r)=>s+r[4],0));
const uniq=(a,i)=>[...new Set(a.map(r=>r[i]).filter(Boolean))].sort();
const grpBy=(a,i,vi)=>{const o={};a.forEach(r=>{const k=r[i]||'S/D';if(!o[k])o[k]=0;o[k]+=r[vi];});return Object.entries(o).sort((a,b)=>b[1]-a[1]);}
function ibox(items){
  return '<div class="ibox"><div class="ibox-hd">&#x1F9E0; Insights</div><div class="ibox-grid">'+
    items.map(i=>'<div class="ic"><div class="ic-e">'+i.e+'</div><div><div class="ic-t">'+i.t+'</div><div class="ic-b">'+i.b+'</div></div></div>').join('')+
    '</div></div>';
}
function fbox(fields){
  return '<div class="fbox"><div class="fbox-hd">&#x1F50D; Filtros</div><div class="fbox-grid">'+
    fields.map(f=>'<div class="fg"><label>'+f.l+'</label>'+f.h+'</div>').join('')+
    '</div></div>';
}
function sMes(){return '<select class="f-sel" onchange="curMes=parseInt(this.value);render()"><option value="-1">Todos los meses</option>'+MES.map((m,i)=>'<option value="'+i+'"'+(curMes===i?' selected':'')+'>'+m+'</option>').join('')+'</select>';}
function sSocio(a){const o=uniq(a,6);return '<select class="f-sel" onchange="curSocio=this.value;render()"><option value="all">Todos los socios</option>'+o.map(v=>'<option value="'+v+'"'+(curSocio===v?' selected':'')+'>'+v+'</option>').join('')+'</select>';}
function sCl(a){const o=uniq(a,5);return '<select class="f-sel" onchange="curCl=this.value;render()"><option value="all">Todas</option>'+o.map(v=>'<option value="'+v+'"'+(curCl===v?' selected':'')+'>'+v+'</option>').join('')+'</select>';}
function sCta(){return '<select class="f-sel" onchange="curCli=this.value;render()"><option value="all">Todas las cuentas</option><option value="UAL"'+(curCli==='UAL'?' selected':'')+'>UAL</option><option value="JAVP_Fiscal"'+(curCli==='JAVP_Fiscal'?' selected':'')+'>JAVP Fiscal</option><option value="JAVP_No_Fiscal"'+(curCli==='JAVP_No_Fiscal'?' selected':'')+'>JAVP No Fiscal</option></select>';}

function mkBar(id,labs,datasets,hor){
  const el=$(id);if(!el)return;
  CH[id]=new Chart(el,{type:'bar',data:{labels:labs,datasets},options:{
    indexAxis:hor?'y':'x',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:datasets.length>1,position:'top',labels:{font:{size:11},usePointStyle:true}},
      datalabels:{display:true,anchor:'end',align:hor?'right':'top',color:'#475569',font:{size:9},
        formatter:v=>v>0?fmtK(v):''},
      tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}} },
    scales:{

const TABS={resumen:'&#x1F4CA; Resumen',ual:'&#x1F69B; UAL',javpf:'&#x1F3E2; JAVP Fiscal',javpnf:'&#x1F4BC; JAVP No Fiscal',socios:'&#x1F465; Gastos por Socio',clasif:'&#x1F5C2;&#xFE0F; Por Clasificacion',pnl:'&#x1F4C8; P&L por Empresa',fijos:'&#x1F4CC; Gastos Fijos'};
function goTab(name,el){
  curTab=name;curMes=-1;curSocio='all';curCl='all';curCli='all';
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  el.classList.add('on');
  $('topTit').innerHTML=TABS[name];
  render();
}
function render(){
  Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}} );CH={};
  if(curTab==='resumen')dRes();
  else if(curTab==='ual')dEmp('UAL','&#x1F69B;','tag-u');
  else if(curTab==='javpf')dEmp('JAVP_Fiscal','&#x1F3E2;','tag-jf');
  else if(curTab==='javpnf')dEmp('JAVP_No_Fiscal','&#x1F4BC;','tag-jnf');
  else if(curTab==='socios')dSocios();
  else if(curTab==='clasif')dClasif();
  else if(curTab==='pnl')dPNL();
  else if(curTab==='fijos')dFijos();
}

function kc(label,val,cls,emoji,sub){

function dSocios(){

  const totS=socios.map(s=>{const d=all.filter(r=>r[6]===s);return {s,tot:d.reduce((a,r)=>a+r[4],0),n:d.length};}).sort((a,b)=>b.tot-a.tot);
  const grand=totS.reduce((a,x)=>a+x.tot,0);
  const ins=[
    {e:'&#x1F451;',t:'Mayor gastador',b:totS[0]?'<b>'+totS[0].s+'</b>: '+fmtK(totS[0].tot)+' ('+( grand>0?(totS[0].tot/grand*100).toFixed(1):0)+'%)':'Sin datos'},
    {e:'&#x1F4CA;',t:'Total gastos socios',b:fmtK(grand)+' entre '+socios.length+' socios identificados'},
    {e:'&#x1F50D;',t:'Oportunidad',b:'Revisar gastos sin socio asignado para mejor control'},
  ];
  $('main').innerHTML=ibox(ins)+
    fbox([{l:'Mes',h:sMes()},{l:'Clasificacion',h:sCl(all)}])+
    '<div class="krow">'+socios.map((s,i)=>{
      const d=all.filter(r=>r[6]===s);const tot=d.reduce((a,r)=>a+r[4],0);

    }).join('')+'</div>'+

    '<div style="position:relative;height:220px"><canvas id="cSm"></canvas></div></div>'+
    '<div class="g2">'+socios.map((s,i)=>{

      const byCl=grpBy(d,5,4).slice(0,8);
      return '<div class="cc"><div class="cc-t">'+['&#x1F464;','&#x1F465;','&#x1F4BC;'][i]+'&#xFE0F; '+s+'</div>'+
        '<div style="position:relative;height:'+Math.max(160,byCl.length*26+50)+'px"><canvas id="cSc'+i+'"></canvas></div></div>';
    }).join('')+'</div>';

  }));

    mkBar('cSc'+i,byCl.map(x=>x[0]),[{label:'g',data:byCl.map(x=>x[1]),backgroundColor:clrs[i],borderRadius:4}],true);
  });
}

function dPNL(){
  const tipos_=[['UAL','&#x1F69B;','tag-u'],['JAVP_Fiscal','&#x1F3E2;','tag-jf'],['JAVP_No_Fiscal','&#x1F4BC;','tag-jnf']];
  const lbl={UAL:'UAL','JAVP_Fiscal':'JAVP Fiscal','JAVP_No_Fiscal':'JAVP No Fiscal'};
  $('main').innerHTML=tipos_.map(([tipo,emoji,tag])=>{
    const d=filtTipo(tipo);
    const dM=byMD(d),rM=byMR(d);
    const tD=sumD(d),tR=sumR(d),neto=tD-tR;
    const cls=[...new Set(d.filter(r=>r[4]>0&&r[5]).map(r=>r[5]))].sort();
    const rows=[];
    rows.push('<tr class="r-ing"><td>INGRESOS</td>'+MES.map((_,m)=>'<td>'+(dM[m]?fmt(dM[m]):'$0')+'</td>').join('')+'<td>'+fmt(tD)+'</td></tr>');
    rows.push('<tr class="r-sec"><td>(-) EGRESOS POR CLASIFICACION</td>'+MES.map(()=>'<td></td>').join('')+'<td>('+fmt(tR)+')</td></tr>');
    cls.forEach(cl=>{
      const meses=MES.map((_,m)=>d.filter(r=>r[5]===cl&&r[4]>0&&r[2]-1===m).reduce((a,r)=>a+r[4],0));
      const tot=meses.reduce((a,v)=>a+v,0);
      if(tot===0) return;
      rows.push('<tr class="r-sub"><td>&nbsp;&nbsp;'+cl+'</td>'+meses.map(v=>'<td class="mu">'+(v?'('+fmt(v)+')':'&mdash;')+'</td>').join('')+'<td class="pnl-neg">('+fmt(tot)+')</td></tr>');
    });
    rows.push('<tr class="r-tot"><td>TOTAL EGRESOS</td>'+rM.map(v=>'<td class="pnl-neg">'+(v?'('+fmt(v)+')':'&mdash;')+'</td>').join('')+'<td class="pnl-neg">('+fmt(tR)+')</td></tr>');
    const netoM=MES.map((_,m)=>dM[m]-rM[m]);
    rows.push('<tr class="r-net"><td>NETO</td>'+netoM.map(v=>'<td>'+(dM[netoM.indexOf(v)]||rM[netoM.indexOf(v)]?fmt(Math.abs(v)):'$0')+'</td>').join('')+'<td>'+fmt(Math.abs(neto))+'</td></tr>');
    rows.push('<tr class="r-pct"><td>&nbsp;&nbsp;% Margen</td>'+netoM.map((v,m)=>'<td>'+(dM[m]?((v/dM[m])*100).toFixed(0)+'%':'N/A')+'</td>').join('')+'<td>'+(tD?((neto/tD)*100).toFixed(1)+'%':'N/A')+'</td></tr>');
    return '<div class="slbl"><span class="'+tag+'">'+emoji+' '+lbl[tipo]+'</span></div>'+
      '<div class="krow">'+
      kc('Ingresos',fmtK(tD),'g','&#x1F4B0;','&nbsp;')+
      kc('Egresos',fmtK(tR),'r','&#x1F4B8;','&nbsp;')+
      kc('Neto',fmtK(neto),neto>=0?'t':'r','&#x2696;&#xFE0F;',tD>0?((neto/tD)*100).toFixed(1)+'% margen':'&nbsp;')+
      '</div>'+
      '<div class="pnl-wrap"><table class="pnl-tbl"><thead><tr><th>'+lbl[tipo]+'</th>'+MES.map(m=>'<th>'+m+'</th>').join('')+'<th>TOTAL</th></tr></thead><tbody>'+rows.join('')+'</tbody></table></div>';
  }).join('');
}

    clSort.map(([k,v])=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><div style="font-size:12px;font-weight:500;min-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+k+'</div><div style="flex:1;height:12px;background:var(--s2);border-radius:3px;overflow:hidden"><div style="width:'+(v/(clSort[0]?clSort[0][1]:1)*100).toFixed(1)+'%;height:100%;background:#f59e0b;opacity:.75;border-radius:3px"></div></div><div style="font-size:11px;min-width:80px;text-align:right;font-family:var(--mono);color:var(--ylw);font-weight:700">'+fmt(v)+'</div></div>').join('')+
    '</div></div>'+

    '<tfoot><tr><td colspan="2">TOTAL</td>'+totalM.map(v=>'<td class="r y">'+fmt(v)+'</td>').join('')+'<td class="r y">'+fmt(totalA)+'</td><td class="r y">'+fmt(Math.round(totalA/12))+'</td></tr></tfoot></table></div>';

  mkBar('cFm',MES,[{label:'Fijos',data:totalM,backgroundColor:'rgba(245,158,11,.75)',borderRadius:4}]);
}

// CSV PARSER
function parseCSV(txt,hdrRow=0){
  const lines=txt.split(/\r?\n/);
  function splitLine(l){const c=[];let cur='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cur);cur='';}else cur+=ch;}c.push(cur);return c.map(v=>v.trim().replace(/^"|"$/g,''));}
  const hdr=splitLine(lines[hdrRow]);
  const out=[];
  for(let i=hdrRow+1;i<lines.length;i++){const l=lines[i].trim();if(!l)continue;const v=splitLine(l);if(v.every(x=>!x))continue;const o={};hdr.forEach((h,j)=>o[h]=v[j]||'');out.push(o);}
  return out;
}

// AUTO-CLASSIFY
const KW=[
  ['Pago Alen',['ALEN','TM LOGISTICS']],
  ['Pago TML',['TML','TRANS MERCA']],
  ['Pago TYT',['TYT']],
  ['Nomina',['NOMINA','NÓMINA','SUELDO']],
  ['Diesel',['DIESEL','GAS ROBLE']],
  ['Casetas',['CASETA','TELEVIA']],
  ['Mantenimiento',['MANTENIMIENTO','REFACCION','LLANTA']],
  ['IMSS',['IMSS']],
  ['Credito Konfio',['KONFIO']],
  ['Gastos Operativos',['SPEI','BXI','ORDEN DE PAGO','GASTO','COMPRA','PAYPAL']],
  ['Renta',['RENTA CAMION','ARRENDAMIENTO']],
  ['Prestamo',['ALMA PAEZ','GAGE830714','PRESTAMO']],
  ['Gasolina',['GASOLINA','PEMEX']],
];
function autoCl(desc,dep,ret){
  if(dep>0&&ret===0)return 'Ingreso';
  const d=String(desc).toUpperCase();
  for(const[cat,keys]of KW)if(keys.some(k=>d.includes(k)))return cat;
  return '';
}

// PROCESS EDO CTAS
function processEdo(rows){
  const out=[];
  for(const r of rows){
    const fs=r['Fecha']||r['FECHA']||'';
    if(!fs)continue;
    let yr=0,mes=0;
    const dp=fs.replace(/[^\d\/\-\.]/g,'').split(/[\/\-\.]/);
    if(dp.length>=3){const a=parseInt(dp[0]),b=parseInt(dp[1]),c=parseInt(dp[2]);if(c>=2000){yr=c;mes=b;}else if(a>=2000){yr=a;mes=b;}}
    if(!yr){const m=fs.match(/20\d{2}/);if(m)yr=parseInt(m[0]);}
    if(!mes||mes<1||mes>12){const m=fs.match(/[\.\/\-](\d{1,2})[\.\/\-]/);if(m)mes=parseInt(m[1]);}
    if(!yr||!mes||mes<1||mes>12)continue;
    const dep=parseFloat(String(r['Monto del deposito']||r['Monto del depósito']||0).replace(/[$,]/g,''))||0;
    const ret=parseFloat(String(r['Monto del retiro']||0).replace(/[$,]/g,''))||0;
    if(dep===0&&ret===0)continue;
    const clR=r['Clasificacion de gastos personales']||r['Clasificación de gastos personales']||'';
    const cl=(clR&&!clR.startsWith('=')&&clR.trim())?clR.trim():autoCl(r['Descripcion']||r['Descripción']||'',dep,ret);
    const soc=r['Socio']||'';
    const tipo=(r['Tipo']||r['TIPO']||'').trim();
    out.push([tipo,yr,mes,dep,ret,cl,(!soc||soc.startsWith('='))?'':soc,(r['Descripcion']||r['Descripción']||'').substring(0,60),'']);
  }
  return out;
}

// PROCESS FIJOS
const MF_N=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
function processFijos(rows){
  if(!rows.length)return[];
  const keys=Object.keys(rows[0]);
  const gk=keys.find(k=>k.trim().toUpperCase()==='GASTO')||keys[2]||'GASTO';
  const ck=keys.find(k=>k.trim().toLowerCase().includes('clasif'))||keys[0];
  const mk=MF_N.map(m=>keys.find(k=>k.trim().toUpperCase()===m)||m);
  return rows.filter(r=>r[gk]&&String(r[gk]).trim()&&!String(r[gk]).toUpperCase().includes('TOTAL'))
    .map(r=>[String(r[ck]||'').trim(),String(r[gk]||'').trim(),mk.map(k=>parseFloat(String(r[k]||0).replace(/[$,]/g,''))||0)]);
}

// LOAD
async function loadAll(){
  try{
    $('ld-msg').textContent='Cargando estado de cuentas...';
    const re=await fetch(URL_EDO);
    if(!re.ok)throw new Error('HTTP '+re.status+' en Edo Ctas');
    const te=await re.text();
    const rowsE=parseCSV(te,0);
    const proc=processEdo(rowsE);
    RAW.length=0;proc.forEach(r=>RAW.push(r));

    $('ld-msg').textContent='Cargando gastos fijos...';
    const rf=await fetch(URL_FIJOS);
    if(!rf.ok)throw new Error('HTTP '+rf.status+' en Fijos');
    const tf=await rf.text();
    const fLines=tf.split(/\r?\n/);
    let fHdr=0;
    for(let i=0;i<Math.min(5,fLines.length);i++){if(fLines[i].toUpperCase().includes('GASTO')){fHdr=i;break;}}
    const rowsF=parseCSV(tf,fHdr);
    const fij=processFijos(rowsF);
    FIJOS.length=0;fij.forEach(f=>FIJOS.push(f));

    const yrs=[...new Set(RAW.map(r=>r[1]))].sort();
    $('sbInfo').textContent=RAW.length.toLocaleString('es-MX')+' movimientos';
    $('sbSub').textContent=yrs[0]+'–'+yrs[yrs.length-1]+' · '+getTipos().length+' cuentas';
    $('loading').style.display='none';
    $('app').style.display='flex';
    setTimeout(()=>render(),50);
  }catch(e){
    $('ld-msg').textContent='Error al cargar';
    const eb=$('ld-err');eb.style.display='block';
    eb.textContent=e.message+'. Abre desde GitHub Pages (https://), no desde file://.';
  }
}

async function recargarSheets(){
  $('loading').style.display='flex';$('app').style.display='none';
  $('ld-msg').textContent='Actualizando...';
  await loadAll();
}

loadAll();
