<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesorería · Logistics Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
:root{--bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e26;--border:#252a34;--border2:#2e3545;--text:#e8eaf0;--text2:#8b92a5;--text3:#555f73;--accent:#e8c96a;--green:#4ade80;--gdim:#166534;--red:#f87171;--rdim:#7f1d1d;--blue:#60a5fa;--bdim:#1e3a5f;--amber:#fbbf24;--adim:#78350f;--r:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#000}
.hdr-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.hdr-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.hdr-r{display:flex;align-items:center;gap:10px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.sdot.loading{background:var(--amber);animation:none}
.sdot.error{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.rbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:var(--r);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
.tnav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;overflow-x:auto}
.tbtn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;margin-bottom:-1px}
.tbtn:hover{color:var(--text2)}
.tbtn.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:24px 28px;max-width:1600px}
.tp{display:none}.tp.active{display:block}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:22px}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.35}
.klbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.kval{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;line-height:1}
.kval.g{color:var(--green)}.kval.r{color:var(--red)}.kval.a{color:var(--amber)}
.ksub{font-size:11px;color:var(--text3);margin-top:4px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px}
.ph{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ptitle{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.pb{padding:16px 18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
.cw{position:relative;height:250px}
.cw.tall{height:300px}
.dt{width:100%;border-collapse:collapse;font-size:12px}
.dt th{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);padding:9px 11px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;cursor:pointer;user-select:none}
.dt th:hover{color:var(--text2)}.dt th.sorted{color:var(--accent)}
.dt td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.dt tr:hover td{background:var(--bg3);color:var(--text)}
.dt tr:last-child td{border-bottom:none}
.num{font-family:'DM Mono',monospace;text-align:right!important}
.ctr{text-align:center!important}
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.bp{background:var(--gdim);color:var(--green)}
.bn{background:var(--adim);color:var(--amber)}
.bv{background:var(--rdim);color:var(--red)}
.bpa{background:var(--bdim);color:var(--blue)}
.bx{background:var(--bg3);color:var(--text3)}
.frow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.fsel,.finp{background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:7px 11px;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;outline:none}
.fsel:focus,.finp:focus{border-color:var(--accent)}
.finp{min-width:180px}.finp::placeholder{color:var(--text3)}
.flbl{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.pgrp{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.pbtn{background:none;border:none;border-right:1px solid var(--border);color:var(--text3);padding:6px 12px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer}
.pbtn:last-child{border-right:none}
.pbtn:hover{color:var(--text2);background:var(--bg2)}
.pbtn.active{background:var(--accent);color:#000;font-weight:500}
.dbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:var(--r);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer}
.dbtn:hover{border-color:var(--green);color:var(--green)}
.pdfbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:var(--r);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer}
.pdfbtn:hover{border-color:var(--accent);color:var(--accent)}
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.pfill.g{background:var(--green)}.pfill.r{background:var(--red)}
.tw{overflow-x:auto;max-height:460px;overflow-y:auto}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:20px}
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;cursor:pointer;transition:all .2s}
.ccard:hover{border-color:var(--accent);transform:translateY(-1px)}
.ccard.active{border-color:var(--accent)}
.cname{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:9px}
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:13px;color:var(--text);z-index:9998;transition:all .3s;transform:translateY(60px);opacity:0;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}
.moverlay{display:none;position:fixed;inset:0;background:#000b;z-index:500;align-items:center;justify-content:center}
.moverlay.open{display:flex}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:26px 30px;width:420px;max-width:95vw}
.mtitle{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:18px}
.mf{margin-bottom:12px}
.ml{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.mi{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 11px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.mi:focus{border-color:var(--accent)}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.macts{display:flex;gap:8px;margin-top:18px}
.mbtn{flex:1;background:var(--accent);border:none;color:#000;padding:10px;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.msec{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:10px 16px;border-radius:6px;font-size:13px;cursor:pointer}
.ctbl{width:100%;border-collapse:collapse;font-size:12px}
.ctbl th{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);padding:9px 11px;text-align:right;border-bottom:1px solid var(--border);background:var(--bg)}
.ctbl th:first-child{text-align:left}
.ctbl td{padding:8px 11px;border-bottom:1px solid var(--border);color:var(--text2);text-align:right;font-family:'DM Mono',monospace;font-size:11px}
.ctbl td:first-child{text-align:left;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);font-weight:500}
.ctbl tr:hover td{background:var(--bg3)}
.dp{color:var(--green)}.dn{color:var(--red)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<div id="lov" style="position:fixed;inset:0;background:#0d0f12;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="width:48px;height:48px;background:#e8c96a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:17px;color:#000">LU</div>
    <div><div style="font-family:Syne,sans-serif;font-size:18px;font-weight:700;color:#e8eaf0">Tesorería · Logistics Ultra</div>
    <div style="font-family:DM Mono,monospace;font-size:11px;color:#555f73;letter-spacing:1px">REPORTE DE COBRANZA</div></div>
  </div>
  <div style="width:260px;height:3px;background:#252a34;border-radius:2px;overflow:hidden">
    <div id="lovfill" style="height:100%;width:0%;background:#e8c96a;border-radius:2px;transition:width .4s"></div>
  </div>
  <div id="lovmsg" style="font-family:DM Mono,monospace;font-size:12px;color:#555f73">Iniciando...</div>
</div>

<div class="hdr">
  <div class="hdr-brand">
    <div class="logo">LU</div>
    <div><div class="hdr-title">Tesorería · Cobranza</div><div class="hdr-sub">LOGISTICS ULTRA</div></div>
  </div>
  <div class="hdr-r">
    <div id="sdot" class="sdot loading"></div>
    <span id="stxt" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">Cargando...</span>
    <button class="rbtn" onclick="init()">&#8635; Actualizar</button>
  </div>
</div>

<div class="tnav">
  <button class="tbtn active" onclick="tab('resumen',this)">Resumen</button>
  <button class="tbtn" onclick="tab('comp',this)">Comparativo AA</button>
  <button class="tbtn" onclick="tab('ing',this)">Ingresos</button>
  <button class="tbtn" onclick="tab('cart',this)">Cartera Viva</button>
  <button class="tbtn" onclick="tab('cli',this)">Por Cliente</button>
  <button class="tbtn" onclick="tab('edo',this)">Estados de Cuenta</button>
</div>

<div class="main">

<div id="tp-resumen" class="tp active">
  <div id="kr" class="kgrid"></div>
  <div class="g2">
    <div class="panel">
      <div class="ph"><span class="ptitle">Cobrado por Período</span>
        <div class="pgrp" id="pgR">
          <button class="pbtn" onclick="sp('dia','pgR',this)">Día</button>
          <button class="pbtn" onclick="sp('semana','pgR',this)">Sem</button>
          <button class="pbtn active" onclick="sp('mes','pgR',this)">Mes</button>
          <button class="pbtn" onclick="sp('quincena','pgR',this)">Qnc</button>
          <button class="pbtn" onclick="sp('anio','pgR',this)">Año</button>
        </div>
      </div>
      <div class="pb"><div class="cw"><canvas id="cPer"></canvas></div></div>
    </div>
    <div class="panel">
      <div class="ph"><span class="ptitle">Distribución por Cliente</span></div>
      <div class="pb"><div class="cw"><canvas id="cDon"></canvas></div></div>
    </div>
  </div>
  <div class="g3">
    <div class="panel">
      <div class="ph"><span class="ptitle">Estatus de Cartera</span></div>
      <div class="pb">
        <div style="margin-bottom:12px"><div class="klbl">Cobrado</div><div id="kPag" class="kval g" style="font-size:16px">—</div><div class="pbar"><div id="bPag" class="pfill g" style="width:0%"></div></div></div>
        <div style="margin-bottom:12px"><div class="klbl">Pendiente</div><div id="kPen" class="kval a" style="font-size:16px">—</div><div class="pbar"><div id="bPen" class="pfill" style="width:0%;background:var(--amber)"></div></div></div>
        <div><div class="klbl">Vencido</div><div id="kVen" class="kval r" style="font-size:16px">—</div><div class="pbar"><div id="bVen" class="pfill r" style="width:0%"></div></div></div>
      </div>
    </div>
    <div class="panel"><div class="ph"><span class="ptitle">Top Clientes — Facturado</span></div><div class="pb"><div class="cw"><canvas id="cTop"></canvas></div></div></div>
    <div class="panel"><div class="ph"><span class="ptitle">Antigüedad de Saldo</span></div><div class="pb"><div class="cw"><canvas id="cAnt"></canvas></div></div></div>
  </div>
</div>

<div id="tp-comp" class="tp">
  <div class="frow">
    <span class="flbl">PERÍODO:</span>
    <div class="pgrp" id="pgC">
      <button class="pbtn active" onclick="sp('mes','pgC',this)">Mes</button>
      <button class="pbtn" onclick="sp('anio','pgC',this)">Año</button>
    </div>
    <span class="flbl">CLIENTE:</span>
    <select class="fsel" id="fCC" onchange="rComp()"><option value="">Todos</option></select>
  </div>
  <div id="kc" class="kgrid"></div>
  <div class="g2">
    <div class="panel"><div class="ph"><span class="ptitle">Facturado AA vs AA-1</span></div><div class="pb"><div class="cw tall"><canvas id="cCF"></canvas></div></div></div>
    <div class="panel"><div class="ph"><span class="ptitle">Cobrado AA vs AA-1</span></div><div class="pb"><div class="cw tall"><canvas id="cCC"></canvas></div></div></div>
  </div>
  <div class="panel">
    <div class="ph"><span class="ptitle">Resumen por Cliente</span></div>
    <div class="tw"><table class="ctbl"><thead><tr>
      <th style="text-align:left">Cliente</th>
      <th>Fact. AA</th><th>Fact. AA-1</th><th>Fact. AA-2</th><th>Var%</th>
      <th>Cobrado</th><th>Pendiente</th><th>Vencido</th><th>%Cobro</th>
    </tr></thead><tbody id="tbC"></tbody></table></div>
  </div>
</div>

<div id="tp-ing" class="tp">
  <div class="frow">
    <span class="flbl">PERÍODO:</span>
    <div class="pgrp" id="pgI">
      <button class="pbtn" onclick="sp('dia','pgI',this)">Día</button>
      <button class="pbtn" onclick="sp('semana','pgI',this)">Sem</button>
      <button class="pbtn active" onclick="sp('mes','pgI',this)">Mes</button>
      <button class="pbtn" onclick="sp('quincena','pgI',this)">Qnc</button>
      <button class="pbtn" onclick="sp('anio','pgI',this)">Año</button>
    </div>
    <select class="fsel" id="fIC" onchange="rIng()"><option value="">Todos los clientes</option></select>
    <select class="fsel" id="fIM" onchange="rIng()"><option value="">Todas las monedas</option><option>MXN</option><option>USD</option></select>
  </div>
  <div id="ki" class="kgrid"></div>
  <div class="panel"><div class="ph"><span class="ptitle">Cobros por Período</span><button class="dbtn" onclick="xCSV('ing')">&#8595; CSV</button></div>
    <div class="pb"><div class="cw" style="height:280px"><canvas id="cIng"></canvas></div></div>
  </div>
  <div class="panel"><div class="tw"><table class="dt" id="tIng">
    <thead><tr>
      <th onclick="srt('tIng',0)">Fecha Pago</th><th onclick="srt('tIng',1)">Cliente</th>
      <th onclick="srt('tIng',2)">Factura</th><th onclick="srt('tIng',3)">Concepto/Ruta</th>
      <th onclick="srt('tIng',4)" class="num">Monto</th><th onclick="srt('tIng',5)" class="num">Cobrado</th>
      <th>Moneda</th><th>Período</th>
    </tr></thead><tbody id="tbI"></tbody>
  </table></div></div>
</div>

<div id="tp-cart" class="tp">
  <div class="frow">
    <select class="fsel" id="fCartC" onchange="rCart()"><option value="">Todos los clientes</option></select>
    <select class="fsel" id="fCartE" onchange="rCart()">
      <option value="">Todos los estatus</option><option>VENCIDO</option><option>PENDIENTE</option><option>PARCIAL</option>
    </select>
    <input class="finp" id="fCartS" placeholder="Buscar factura, ruta..." oninput="rCart()">
  </div>
  <div id="kca" class="kgrid"></div>
  <div class="g2">
    <div class="panel"><div class="ph"><span class="ptitle">Antigüedad de Saldo</span></div><div class="pb"><div class="cw"><canvas id="cCAnt"></canvas></div></div></div>
    <div class="panel"><div class="ph"><span class="ptitle">Vencido por Cliente</span></div><div class="pb"><div class="cw"><canvas id="cCVen"></canvas></div></div></div>
  </div>
  <div class="panel"><div class="ph"><span class="ptitle">Facturas Pendientes / Vencidas</span><button class="dbtn" onclick="xCSV('cart')">&#8595; CSV</button></div>
    <div class="tw"><table class="dt" id="tCart">
      <thead><tr>
        <th onclick="srt('tCart',0)">Fecha Fact.</th><th onclick="srt('tCart',1)">Cliente</th>
        <th onclick="srt('tCart',2)">Factura</th><th onclick="srt('tCart',3)">Ruta</th>
        <th onclick="srt('tCart',4)" class="num">Monto</th><th>Moneda</th>
        <th onclick="srt('tCart',6)" class="num">Días Cred.</th>
        <th onclick="srt('tCart',7)" class="num">Días Trans.</th>
        <th onclick="srt('tCart',8)" class="num">Adeudo</th>
        <th class="ctr">Estatus</th>
      </tr></thead><tbody id="tbCart"></tbody>
    </table></div>
  </div>
</div>

<div id="tp-cli" class="tp">
  <div class="frow">
    <div class="pgrp" id="pgCL">
      <button class="pbtn" onclick="sp('dia','pgCL',this)">Día</button>
      <button class="pbtn" onclick="sp('semana','pgCL',this)">Sem</button>
      <button class="pbtn active" onclick="sp('mes','pgCL',this)">Mes</button>
      <button class="pbtn" onclick="sp('quincena','pgCL',this)">Qnc</button>
      <button class="pbtn" onclick="sp('anio','pgCL',this)">Año</button>
    </div>
  </div>
  <div class="cgrid" id="cliCards"></div>
  <div class="panel" id="pCliDet" style="display:none">
    <div class="ph">
      <span class="ptitle" id="cliDetTitle">—</span>
      <div style="display:flex;gap:6px">
        <button class="pdfbtn" id="btnPDF">&#128196; PDF</button>
        <button class="dbtn" onclick="xCSV('cli')">&#8595; CSV</button>
      </div>
    </div>
    <div class="pb"><div class="g2"><div><div class="cw"><canvas id="cCliP"></canvas></div></div><div><div class="cw"><canvas id="cCliE"></canvas></div></div></div></div>
    <div class="tw"><table class="dt" id="tCli">
      <thead><tr>
        <th>Fecha</th><th>Factura</th><th>Ruta</th>
        <th class="num">Monto</th><th>Moneda</th>
        <th class="num">Días Cr.</th><th class="num">Días Tr.</th>
        <th class="num">Adeudo</th><th class="ctr">Estatus</th><th>F.Pago</th>
      </tr></thead><tbody id="tbCli"></tbody>
    </table></div>
  </div>
</div>

<div id="tp-edo" class="tp">
  <p style="color:var(--text2);font-size:13px;margin-bottom:18px">PDF ejecutivo o CSV por cliente.</p>
  <div class="cgrid" id="edoGrid"></div>
</div>

</div>

<div class="moverlay" id="pdfMod">
  <div class="mbox">
    <div class="mtitle">&#128196; Estado de Cuenta PDF</div>
    <div class="mf"><div class="ml">Razón Social</div><input class="mi" id="mRaz" type="text" placeholder="Nombre fiscal"></div>
    <div class="mf"><div class="ml">RFC</div><input class="mi" id="mRFC" type="text" placeholder="XAXX010101000"></div>
    <div class="mg2">
      <div class="mf"><div class="ml">Desde</div><input class="mi" id="mDes" type="date"></div>
      <div class="mf"><div class="ml">Hasta</div><input class="mi" id="mHas" type="date"></div>
    </div>
    <div class="mf"><div class="ml">Observaciones</div><textarea class="mi" id="mNot" rows="2" style="resize:none" placeholder="Notas opcionales..."></textarea></div>
    <div class="macts">
      <button class="mbtn" onclick="genPDF()">Generar PDF</button>
      <button class="msec" onclick="closePDF()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const PROXY = 'https://script.google.com/macros/s/AKfycbzGHGZ69Qp40sH7eV10J0Bv2xkrFueMYEzjAJ5KP7wL4s6Vah15_OoUeTLzBxOX9_6S5A/exec';
const TC = 19; // USD → MXN

const CLIENTES = [
  {n:'ALEN',          gid:'1702462645', creditoEsHoras:true },
  {n:'SORIANA',       gid:'923045851',  creditoEsHoras:false},
  {n:'TML',           gid:'1040786378', creditoEsHoras:false},
  {n:'TYT',           gid:'863648102',  creditoEsHoras:false},
  {n:'DPG',           gid:'1576319830', creditoEsHoras:false},
  {n:'AMA',           gid:'612210011',  creditoEsHoras:false},
  {n:'LOYALTY',       gid:'988631002',  creditoEsHoras:false},
  {n:'MAGUVA',        gid:'102817706',  creditoEsHoras:false},
  {n:'CRYOGENICS FNG',gid:'793015764',  creditoEsHoras:false},
  {n:'PADILLA',       gid:'852643806',  creditoEsHoras:false},
  {n:'AC TRADE',      gid:'673133141',  creditoEsHoras:false},
  {n:'EVERTIS',       gid:'619318978',  creditoEsHoras:false},
  {n:'DG TRUKING',    gid:'76574814',   creditoEsHoras:false},
  {n:'MEGA',          gid:'1050871788', creditoEsHoras:false},
  {n:'TRANSP. HG',    gid:'1164973928', creditoEsHoras:false},
];

// ============================================================
//  ESTADO
// ============================================================
let DATA = [];
let PER = {pgR:'mes', pgI:'mes', pgCL:'mes', pgC:'mes'};
let ACT_CLI = null;
let CH = {};
let SS = {};
let PDF_CLI = null;

// ============================================================
//  UTILIDADES
// ============================================================
function $n(s) {
  if (!s) return 0;
  const v = parseFloat(s.toString().replace(/[$,\s]/g,'').replace(/[^\d.\-]/g,''));
  return isNaN(v) ? 0 : v;
}

function $d(s) {
  if (!s || s === '-' || s.toString().toLowerCase() === 'n/a') return null;
  s = s.toString().trim();
  // DD/MM/YYYY o DD/MM/YY
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) { let y = +m[3]; if (y < 100) y += 2000; return new Date(y, +m[2]-1, +m[1]); }
  // YYYY-MM-DD
  m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // Texto tipo "8-nov-24" o "27-feb-26"
  const meses = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11};
  m = s.toLowerCase().match(/^(\d{1,2})[\/\-]([a-z]{3})[\/\-](\d{2,4})$/);
  if (m && meses[m[2]] !== undefined) {
    let y = +m[3]; if (y < 100) y += 2000;
    return new Date(y, meses[m[2]], +m[1]);
  }
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function fmtD(d) {
  if (!d) return '—';
  return d.toLocaleDateString('es-MX', {day:'2-digit', month:'short', year:'numeric'});
}

function fmtM(n, mon) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (mon === 'USD' ? 'USD $' : '$') + Number(n).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function toEst(s) {
  if (!s) return 'PENDIENTE';
  const u = s.toString().toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .trim();
  if (u.includes('PAG') || u === 'COBRADO' || u === 'LIQUIDADO') return 'PAGADO';
  if (u.includes('VENC')) return 'VENCIDO';
  if (u.includes('PARC')) return 'PARCIAL';
  if (u.includes('VENCER') || u.includes('POR VENCER')) return 'PENDIENTE';
  if (u.includes('CANCEL')) return 'CANCELADO';
  return 'PENDIENTE';
}

function toMon(s) {
  if (!s) return 'MXN';
  const u = s.toString().toUpperCase();
  return (u.includes('DOL') || u.includes('USD') || u.includes('DLS')) ? 'USD' : 'MXN';
}

function diasDesde(d) {
  if (!d) return 0;
  return Math.max(0, Math.floor((new Date() - d) / 86400000));
}

function toMXN(r, campo) {
  let v = 0;
  if (campo === 'monto')  v = r.monto;
  else if (campo === 'cobrado') v = r.montoPagado;
  else if (campo === 'saldo')   v = r.saldo || 0;
  return r.moneda === 'USD' ? v * TC : v;
}

// ============================================================
//  PARSER CSV
// ============================================================
function csvSplit(line) {
  const r = []; let c = ''; let q = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { q = !q; continue; }
    if (line[i] === ',' && !q) { r.push(c); c = ''; continue; }
    c += line[i];
  }
  r.push(c);
  return r.map(s => s.trim());
}

function findHeaderRow(lines) {
  // Busca la fila que contenga al menos 3 de estos campos clave
  const claves = ['fecha contable', 'no. de fact', 'fecha factura', 'monto pago', 'concepto', 'estatus', 'moneda'];
  for (let i = 0; i < Math.min(20, lines.length); i++) {
    const low = lines[i].toLowerCase();
    const hits = claves.filter(k => low.includes(k));
    if (hits.length >= 2) return i;
  }
  return -1;
}

function parseSheet(text, clienteNombre, cfg) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const hi = findHeaderRow(lines);
  if (hi < 0) {
    console.warn('[' + clienteNombre + '] No se encontró fila de headers');
    return [];
  }

  const headers = csvSplit(lines[hi]).map(h => h.toLowerCase());
  console.log('[' + clienteNombre + '] Headers (fila ' + hi + '):', headers.slice(0,10).join(' | '));

  // Función helper para obtener valor por nombre parcial de columna
  function get(row, ...keys) {
    for (const k of keys) {
      const idx = headers.findIndex(h => h.includes(k.toLowerCase()));
      if (idx >= 0 && row[idx] !== undefined) return row[idx] || '';
    }
    return '';
  }

  const rows = [];
  for (let i = hi + 1; i < lines.length; i++) {
    const vals = csvSplit(lines[i]);
    if (!vals.some(v => v.trim())) continue;

    const fechaFact  = $d(get(vals, 'fecha contable', 'fecha factura'));
    const noFact     = get(vals, 'no. de fact', 'no. de factura', 'num. factura', 'factura', 'folio');
    const ruta       = get(vals, 'concepto / ruta', 'concepto/ruta', 'concepto ruta', 'concepto', 'ruta');
    const moneda     = toMon(get(vals, 'moneda', 'tipo de moneda'));

    // ---- MONTO PAGO / MONTO FACTURA / SALDO según cliente ----
    let monto = 0, montoPagado = 0, saldo = 0;

    if (clienteNombre === 'LOYALTY') {
      // LOYALTY: total factura=monto, monto pago=cobrado, saldo=adeudo
      monto      = $n(get(vals, 'total factura'));
      montoPagado= $n(get(vals, 'monto pago'));
      saldo      = $n(get(vals, 'saldo'));
    } else if (['MAGUVA','DPG','SORIANA'].includes(clienteNombre)) {
      // Tienen monto factura + monto pago separados
      const mFact = $n(get(vals, 'monto factura'));
      const mPago = $n(get(vals, 'monto pago'));
      monto       = mFact > 0 ? mFact : mPago;
      montoPagado = mPago > 0 ? mPago : monto;
      saldo       = $n(get(vals, 'saldo'));
      if (!saldo && monto > montoPagado && montoPagado > 0) saldo = monto - montoPagado;
    } else {
      // Resto: solo monto pago
      monto       = $n(get(vals, 'monto pago', 'monto factura', 'monto', 'importe', 'total'));
      montoPagado = monto;
      saldo       = $n(get(vals, 'saldo', 'adeudo'));
    }

    // ---- DÍAS TRANSCURRIDOS ----
    let diasT = parseInt(get(vals, 'dias transcurridos', 'días transcurridos')) || 0;
    if (!diasT && fechaFact) diasT = diasDesde(fechaFact);

    // ---- CRÉDITO ----
    let cred = parseFloat(
      get(vals, 'horas de pago', 'horas de credito', 'dias de credito', 'días de crédito', 'dias credito', 'credito')
    ) || 0;
    if (cfg.creditoEsHoras && cred > 0) cred = Math.round(cred / 8);
    else cred = Math.round(cred);

    const estatus    = toEst(get(vals, 'estatus', 'status', 'estado'));
    const fechaPago  = $d(get(vals, 'fecha pago', 'fecha real de pago', 'fecha cobro'));
    const fechaProg  = $d(get(vals, 'fecha prog', 'fecha estimada', 'fecha vencimiento', 'fecha programada'));

    // Saltar cancelados y filas sin datos útiles
    if (estatus === 'CANCELADO') continue;
    if (!fechaFact && !noFact && monto === 0) continue;

    rows.push({ cliente: clienteNombre, fechaFact, noFact, ruta, monto, montoPagado, saldo, moneda, diasT, credito: cred, estatus, fechaPago, fechaProg });
  }

  console.log('[' + clienteNombre + '] Registros: ' + rows.length +
    (rows[0] ? ' | ej: ' + rows[0].noFact + ' $' + rows[0].monto + ' ' + rows[0].estatus : ''));
  return rows;
}

// ============================================================
//  FETCH
// ============================================================
async function fetchCliente(cfg) {
  const url = PROXY + '?gid=' + cfg.gid;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (!text || text.trim().startsWith('<!')) throw new Error('No CSV');
    const rows = parseSheet(text, cfg.n, cfg);
    return { n: cfg.n, rows, err: null };
  } catch(e) {
    console.error('[' + cfg.n + ']', e.message);
    return { n: cfg.n, rows: [], err: e.message };
  }
}

async function init() {
  setSt('loading', 'Cargando ' + CLIENTES.length + ' clientes...');
  DATA = CLIENTES.map(c => ({ n: c.n, rows: [], err: null }));
  fillFilters(); rCards(); rEdos();

  const results = await Promise.all(CLIENTES.map(c => fetchCliente(c)));
  DATA = results;

  fillFilters(); rAll();

  const tot  = DATA.reduce((s, c) => s + c.rows.length, 0);
  const errs = DATA.filter(c => c.err).length;
  if (tot === 0) {
    setSt('error', 'Sin datos');
    toast('Sin datos cargados', 'error');
  } else {
    setSt('ok', tot + ' registros · ' + DATA.filter(c => c.rows.length > 0).length + ' clientes' + (errs ? ' · ' + errs + ' errores' : ''));
    toast('\u2713 ' + tot + ' registros' + (errs ? ' · \u26a0 ' + errs + ' errores' : ''), 'success');
  }
}

function rAll() { rRes(); rComp(); rIng(); rCart(); rCards(); rEdos(); }

// ============================================================
//  HELPERS DE RENDER
// ============================================================
function allR()       { return DATA.flatMap(c => c.rows); }
function cobrados(rs) { return rs.filter(r => r.estatus === 'PAGADO' && r.fechaPago); }

function bdg(e) {
  const m = { PAGADO:'bdg bp', PENDIENTE:'bdg bn', VENCIDO:'bdg bv', PARCIAL:'bdg bpa' };
  return '<span class="' + (m[e] || 'bdg bx') + '">' + e + '</span>';
}

function pk(d, p) {
  if (!d) return null;
  const y = d.getFullYear(), mo = d.getMonth()+1, dy = d.getDate();
  const z = n => String(n).padStart(2,'0');
  if (p === 'dia')      return y + '-' + z(mo) + '-' + z(dy);
  if (p === 'semana')   { const w = Math.ceil(((d - new Date(y,0,1))/86400000 + new Date(y,0,1).getDay()+1)/7); return y + '-S' + z(w); }
  if (p === 'mes')      return y + '-' + z(mo);
  if (p === 'quincena') return y + '-' + z(mo) + '-Q' + (dy <= 15 ? '1' : '2');
  if (p === 'anio')     return '' + y;
  return y + '-' + z(mo);
}

function pl(k, p) {
  if (!k) return k;
  const MN = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  if (p === 'mes')      { const [y,m] = k.split('-'); return MN[+m-1] + ' ' + y; }
  if (p === 'quincena') { const pts = k.split('-'); return MN[+pts[1]-1] + ' Q' + pts[2].replace('Q','') + ' ' + pts[0]; }
  return k;
}

function dc(id) { if (CH[id]) { CH[id].destroy(); delete CH[id]; } }

function co(dollar) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1e26', borderColor: '#2e3545', borderWidth: 1,
        titleColor: '#e8eaf0', bodyColor: '#8b92a5',
        titleFont: {family:'Syne',size:12}, bodyFont: {family:'DM Mono',size:11},
        callbacks: { label: ctx => dollar ? ' $' + ctx.raw.toLocaleString('es-MX',{minimumFractionDigits:2}) : ' ' + ctx.raw }
      }
    },
    scales: {
      x: { grid:{color:'#252a34'}, ticks:{color:'#555f73',font:{family:'DM Mono',size:10}} },
      y: { grid:{color:'#252a34'}, ticks:{color:'#555f73',font:{family:'DM Mono',size:10},
           callback: v => dollar ? '$' + v.toLocaleString('es-MX') : v } }
    }
  };
}

const CLR = ['#e8c96a','#4ade80','#60a5fa','#f87171','#c084fc','#fb923c','#34d399','#a78bfa','#f472b6','#38bdf8','#facc15','#86efac','#93c5fd','#fca5a5','#d8b4fe'];

function kc(l, v, cls, s) {
  return '<div class="kcard"><div class="klbl">' + l + '</div>' +
    '<div class="kval ' + (cls||'') + '">' + v + '</div>' +
    (s ? '<div class="ksub">' + s + '</div>' : '') + '</div>';
}

function fillFilters() {
  ['fCC','fIC','fCartC'].forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    const cur = el.value, first = el.options[0].text;
    el.innerHTML = '<option value="">' + first + '</option>';
    DATA.forEach(c => { const o = document.createElement('option'); o.value = c.n; o.textContent = c.n; el.appendChild(o); });
    el.value = cur;
  });
}

function sp(p, gid, btn) {
  PER[gid] = p;
  document.querySelectorAll('#' + gid + ' .pbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (gid === 'pgR')  rRes();
  if (gid === 'pgI')  rIng();
  if (gid === 'pgCL') { rCards(); if (ACT_CLI) rCliDet(ACT_CLI); }
  if (gid === 'pgC')  rComp();
}

function setSt(s, msg) {
  const dot = document.getElementById('sdot'), txt = document.getElementById('stxt');
  dot.className = 'sdot' + (s==='loading'?' loading':s==='error'?' error':'');
  txt.textContent = msg;
  const ov = document.getElementById('lov'), fl = document.getElementById('lovfill'), om = document.getElementById('lovmsg');
  if (!ov || ov.style.display === 'none') return;
  if (s === 'loading') {
    om.textContent = msg;
    const m = msg.match(/(\d+)\/(\d+)/);
    fl.style.width = m ? (+m[1]/+m[2]*100) + '%' : '8%';
  } else {
    fl.style.width = '100%';
    om.textContent = (s === 'error' ? '\u26a0 ' : '\u2713 ') + msg;
    setTimeout(() => { ov.style.opacity='0'; ov.style.transition='opacity .5s'; setTimeout(() => ov.style.display='none', 500); }, 700);
  }
}

function toast(msg, t) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (t ? ' ' + t : '');
  clearTimeout(window._tt); window._tt = setTimeout(() => el.classList.remove('show'), 3200);
}

function tab(id, btn) {
  document.querySelectorAll('.tp').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('tp-' + id).classList.add('active');
  btn.classList.add('active');
}

// ============================================================
//  RESUMEN GENERAL
// ============================================================
function rRes() {
  const rows = allR(), p = PER['pgR'];
  const tF = rows.reduce((s,r) => s + toMXN(r,'monto'), 0);
  const tC = cobrados(rows).reduce((s,r) => s + toMXN(r,'cobrado'), 0);
  const tP = rows.filter(r => r.estatus !== 'PAGADO').reduce((s,r) => s + toMXN(r,'saldo'), 0);
  const tV = rows.filter(r => r.estatus === 'VENCIDO').reduce((s,r) => s + toMXN(r,'saldo'), 0);
  const nP = rows.filter(r => r.estatus !== 'PAGADO').length;
  const nV = rows.filter(r => r.estatus === 'VENCIDO').length;

  document.getElementById('kr').innerHTML =
    kc('Total Facturado', fmtM(tF), '', rows.length + ' facturas') +
    kc('Total Cobrado',   fmtM(tC), 'g', cobrados(rows).length + ' pagos') +
    kc('Cartera Pendiente', fmtM(tP), 'a', nP + ' facturas') +
    kc('Cartera Vencida',   fmtM(tV), 'r', nV + ' facturas') +
    kc('Clientes Activos',  DATA.filter(c=>c.rows.length>0).length, '', CLIENTES.length + ' configurados');

  const tot = tC + tP || 1;
  document.getElementById('kPag').textContent = fmtM(tC);
  document.getElementById('kPen').textContent = fmtM(tP);
  document.getElementById('kVen').textContent = fmtM(tV);
  document.getElementById('bPag').style.width = (tC/tot*100) + '%';
  document.getElementById('bPen').style.width = (tP/tot*100) + '%';
  document.getElementById('bVen').style.width = (tV/tot*100) + '%';

  // Cobrado por período
  const byP = {};
  cobrados(rows).forEach(r => { const k = pk(r.fechaPago, p); if (k) byP[k] = (byP[k]||0) + toMXN(r,'cobrado'); });
  const ks = Object.keys(byP).sort();
  dc('cPer');
  CH['cPer'] = new Chart(document.getElementById('cPer'), {
    type: 'bar',
    data: { labels: ks.map(k => pl(k,p)), datasets: [{ label:'Cobrado', data: ks.map(k=>byP[k]), backgroundColor:'#e8c96a33', borderColor:'#e8c96a', borderWidth:2, borderRadius:4 }] },
    options: co(true)
  });

  // Donut por cliente
  const byC = {};
  cobrados(rows).forEach(r => { byC[r.cliente] = (byC[r.cliente]||0) + toMXN(r,'cobrado'); });
  const ck = Object.keys(byC).sort((a,b) => byC[b]-byC[a]);
  dc('cDon');
  CH['cDon'] = new Chart(document.getElementById('cDon'), {
    type: 'doughnut',
    data: { labels: ck, datasets: [{ data: ck.map(k=>byC[k]), backgroundColor: CLR, borderWidth:0 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{color:'#8b92a5',font:{family:'DM Mono',size:10},boxWidth:10} } } }
  });

  // Top facturado
  const byF = {};
  rows.forEach(r => { byF[r.cliente] = (byF[r.cliente]||0) + toMXN(r,'monto'); });
  const fk = Object.keys(byF).sort((a,b) => byF[b]-byF[a]).slice(0,8);
  dc('cTop');
  CH['cTop'] = new Chart(document.getElementById('cTop'), {
    type: 'bar',
    data: { labels: fk, datasets: [{ data: fk.map(k=>byF[k]), backgroundColor:'#60a5fa33', borderColor:'#60a5fa', borderWidth:2, borderRadius:4 }] },
    options: { ...co(true), indexAxis:'y' }
  });

  // Antigüedad
  const bk = {'0-30':0,'31-60':0,'61-90':0,'91-120':0,'>120':0};
  rows.filter(r => r.estatus !== 'PAGADO').forEach(r => {
    const d = r.diasT, v = toMXN(r,'saldo');
    if (d<=30) bk['0-30']+=v; else if (d<=60) bk['31-60']+=v; else if (d<=90) bk['61-90']+=v; else if (d<=120) bk['91-120']+=v; else bk['>120']+=v;
  });
  dc('cAnt');
  CH['cAnt'] = new Chart(document.getElementById('cAnt'), {
    type: 'bar',
    data: { labels: Object.keys(bk).map(k=>k+' d'), datasets:[{ data: Object.values(bk), backgroundColor:['#4ade8044','#e8c96a44','#fb923c44','#f8717144','#dc262644'], borderColor:['#4ade80','#e8c96a','#fb923c','#f87171','#dc2626'], borderWidth:2, borderRadius:4 }] },
    options: co(true)
  });
}

// ============================================================
//  COMPARATIVO AA
// ============================================================
function rComp() {
  const rows = allR();
  const cli  = document.getElementById('fCC') ? document.getElementById('fCC').value : '';
  const src  = cli ? rows.filter(r => r.cliente === cli) : rows;
  const y    = new Date().getFullYear();
  const aa   = src.filter(r => r.fechaFact && r.fechaFact.getFullYear() === y);
  const a1   = src.filter(r => r.fechaFact && r.fechaFact.getFullYear() === y-1);
  const a2   = src.filter(r => r.fechaFact && r.fechaFact.getFullYear() === y-2);

  const fA  = aa.reduce((s,r) => s + toMXN(r,'monto'), 0);
  const f1  = a1.reduce((s,r) => s + toMXN(r,'monto'), 0);
  const f2  = a2.reduce((s,r) => s + toMXN(r,'monto'), 0);
  const cA  = cobrados(aa).reduce((s,r) => s + toMXN(r,'cobrado'), 0);
  const c1  = cobrados(a1).reduce((s,r) => s + toMXN(r,'cobrado'), 0);
  const vf  = f1 ? ((fA-f1)/f1*100) : 0;
  const vc  = c1 ? ((cA-c1)/c1*100) : 0;

  document.getElementById('kc').innerHTML =
    kc('Facturado ' + y,     fmtM(fA), '',  aa.length + ' facts') +
    kc('Facturado ' + (y-1), fmtM(f1), '',  a1.length + ' facts') +
    kc('Facturado ' + (y-2), fmtM(f2), '',  a2.length + ' facts') +
    kc('Var. Facturado',  (vf>=0?'+':'') + vf.toFixed(1)+'%', vf>=0?'g':'r', 'vs ' + (y-1)) +
    kc('Cobrado ' + y, fmtM(cA), 'g', '') +
    kc('Var. Cobrado', (vc>=0?'+':'') + vc.toFixed(1)+'%', vc>=0?'g':'r', 'vs ' + (y-1));

  const MN = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const faA=Array(12).fill(0), fa1=Array(12).fill(0), fa2=Array(12).fill(0);
  const caA=Array(12).fill(0), ca1=Array(12).fill(0);
  aa.forEach(r  => { if(r.fechaFact) faA[r.fechaFact.getMonth()] += toMXN(r,'monto'); });
  a1.forEach(r  => { if(r.fechaFact) fa1[r.fechaFact.getMonth()] += toMXN(r,'monto'); });
  a2.forEach(r  => { if(r.fechaFact) fa2[r.fechaFact.getMonth()] += toMXN(r,'monto'); });
  cobrados(aa).forEach(r => { if(r.fechaPago) caA[r.fechaPago.getMonth()] += toMXN(r,'cobrado'); });
  cobrados(a1).forEach(r => { if(r.fechaPago) ca1[r.fechaPago.getMonth()] += toMXN(r,'cobrado'); });

  const lo = { ...co(true), plugins: { ...co(true).plugins, legend:{ display:true, labels:{color:'#8b92a5',font:{family:'DM Mono',size:10}} } } };
  dc('cCF');
  CH['cCF'] = new Chart(document.getElementById('cCF'), { type:'bar', data:{ labels:MN, datasets:[
    { label:''+y,     data:faA, backgroundColor:'#e8c96a44', borderColor:'#e8c96a', borderWidth:2, borderRadius:3 },
    { label:''+(y-1), data:fa1, backgroundColor:'#60a5fa33', borderColor:'#60a5fa', borderWidth:2, borderRadius:3 },
    { label:''+(y-2), data:fa2, backgroundColor:'#a78bfa22', borderColor:'#a78bfa', borderWidth:1, borderRadius:3 }
  ]}, options:lo });
  dc('cCC');
  CH['cCC'] = new Chart(document.getElementById('cCC'), { type:'bar', data:{ labels:MN, datasets:[
    { label:''+y,     data:caA, backgroundColor:'#4ade8033', borderColor:'#4ade80', borderWidth:2, borderRadius:3 },
    { label:''+(y-1), data:ca1, backgroundColor:'#a78bfa33', borderColor:'#a78bfa', borderWidth:2, borderRadius:3 }
  ]}, options:lo });

  // Tabla resumen por cliente
  const tb = document.getElementById('tbC'); tb.innerHTML = '';
  DATA.filter(c => c.rows.length > 0).forEach(c => {
    const ca = c.rows.filter(r => r.fechaFact && r.fechaFact.getFullYear() === y);
    const c1 = c.rows.filter(r => r.fechaFact && r.fechaFact.getFullYear() === y-1);
    const c2 = c.rows.filter(r => r.fechaFact && r.fechaFact.getFullYear() === y-2);
    const f  = ca.reduce((s,r) => s+toMXN(r,'monto'), 0);
    const f1 = c1.reduce((s,r) => s+toMXN(r,'monto'), 0);
    const f2 = c2.reduce((s,r) => s+toMXN(r,'monto'), 0);
    const co2= cobrados(ca).reduce((s,r) => s+toMXN(r,'cobrado'), 0);
    const pe = ca.filter(r=>r.estatus!=='PAGADO').reduce((s,r) => s+toMXN(r,'saldo'), 0);
    const ve = ca.filter(r=>r.estatus==='VENCIDO').reduce((s,r) => s+toMXN(r,'saldo'), 0);
    const vr = f1 ? ((f-f1)/f1*100) : 0;
    const pc = f  ? (co2/f*100)     : 0;
    tb.innerHTML +=
      '<tr><td>' + c.n + '</td>' +
      '<td>' + fmtM(f)  + '</td>' +
      '<td>' + fmtM(f1) + '</td>' +
      '<td>' + fmtM(f2) + '</td>' +
      '<td class="' + (vr>=0?'dp':'dn') + '">' + (vr>=0?'+':'') + vr.toFixed(1) + '%</td>' +
      '<td style="color:var(--green)">' + fmtM(co2) + '</td>' +
      '<td style="color:var(--amber)">' + fmtM(pe)  + '</td>' +
      '<td style="color:' + (ve>0?'var(--red)':'var(--text3)') + '">' + fmtM(ve) + '</td>' +
      '<td style="color:' + (pc>=80?'var(--green)':pc>=50?'var(--amber)':'var(--red)') + '">' + pc.toFixed(1) + '%</td></tr>';
  });
}

function rIng() {
  const p   = PER['pgI'];
  const cli = document.getElementById('fIC').value;
  const mon = document.getElementById('fIM').value;
  let rows  = cobrados(allR());
  if (cli) rows = rows.filter(r => r.cliente === cli);
  if (mon) rows = rows.filter(r => r.moneda  === mon);

  const tC   = rows.reduce((s,r) => s + r.montoPagado, 0);
  const prom = rows.length ? tC/rows.length : 0;
  const maxP = rows.reduce((mx,r) => Math.max(mx, r.montoPagado), 0);

  document.getElementById('ki').innerHTML =
    kc('Total Cobrado',   fmtM(tC,  mon||'MXN'), 'g', rows.length + ' pagos') +
    kc('Ticket Promedio', fmtM(prom,mon||'MXN'), '',  '') +
    kc('Pago Mayor',      fmtM(maxP,mon||'MXN'), '',  '');

  const byP = {};
  rows.forEach(r => { const k = pk(r.fechaPago, p); if (k) byP[k] = (byP[k]||0) + r.montoPagado; });
  const ks = Object.keys(byP).sort();
  dc('cIng');
  CH['cIng'] = new Chart(document.getElementById('cIng'), {
    type: 'bar',
    data: { labels: ks.map(k=>pl(k,p)), datasets:[{ label:'Cobrado', data:ks.map(k=>byP[k]), backgroundColor:'#4ade8033', borderColor:'#4ade80', borderWidth:2, borderRadius:4 }] },
    options: co(true)
  });

  const tb = document.getElementById('tbI'); tb.innerHTML = '';
  rows.sort((a,b) => (b.fechaPago||0) - (a.fechaPago||0)).forEach(r => {
    tb.innerHTML +=
      '<tr><td>' + fmtD(r.fechaPago) + '</td>' +
      '<td>' + r.cliente + '</td>' +
      '<td style="font-family:monospace;font-size:11px">' + (r.noFact||'—') + '</td>' +
      '<td>' + (r.ruta||'—') + '</td>' +
      '<td class="num">' + fmtM(r.monto, r.moneda) + '</td>' +
      '<td class="num" style="color:var(--green)">' + fmtM(r.montoPagado, r.moneda) + '</td>' +
      '<td><span class="bdg ' + (r.moneda==='USD'?'bpa':'bx') + '">' + r.moneda + '</span></td>' +
      '<td style="font-size:10px;font-family:DM Mono,monospace">' + (pl(pk(r.fechaPago,p),p)||'—') + '</td></tr>';
  });
  if (!rows.length) tb.innerHTML = '<tr><td colspan="8"><div class="empty"><h3>Sin cobros</h3></div></td></tr>';
}

function rCart() {
  const cli  = document.getElementById('fCartC').value;
  const est  = document.getElementById('fCartE').value;
  const srch = (document.getElementById('fCartS').value||'').toLowerCase();
  let rows   = allR().filter(r => r.estatus !== 'PAGADO');
  if (cli)  rows = rows.filter(r => r.cliente === cli);
  if (est)  rows = rows.filter(r => r.estatus === est);
  if (srch) rows = rows.filter(r => (r.noFact||'').toLowerCase().includes(srch) || (r.ruta||'').toLowerCase().includes(srch));

  const tP = rows.reduce((s,r) => s + toMXN(r,'saldo'), 0);
  const tV = rows.filter(r=>r.estatus==='VENCIDO').reduce((s,r) => s + toMXN(r,'saldo'), 0);

  document.getElementById('kca').innerHTML =
    kc('Cartera Viva',    fmtM(tP), 'a', rows.length + ' facturas') +
    kc('Cartera Vencida', fmtM(tV), 'r', rows.filter(r=>r.estatus==='VENCIDO').length + ' facturas') +
    kc('Parciales', rows.filter(r=>r.estatus==='PARCIAL').length, '', '');

  const bk = {'0-30':0,'31-60':0,'61-90':0,'91-120':0,'>120':0};
  rows.forEach(r => {
    const d = r.diasT, v = toMXN(r,'saldo');
    if(d<=30) bk['0-30']+=v; else if(d<=60) bk['31-60']+=v; else if(d<=90) bk['61-90']+=v; else if(d<=120) bk['91-120']+=v; else bk['>120']+=v;
  });
  dc('cCAnt');
  CH['cCAnt'] = new Chart(document.getElementById('cCAnt'), {
    type:'bar', data:{ labels:Object.keys(bk).map(k=>k+' d'), datasets:[{ data:Object.values(bk),
      backgroundColor:['#4ade8044','#e8c96a44','#fb923c44','#f8717144','#dc262644'],
      borderColor:['#4ade80','#e8c96a','#fb923c','#f87171','#dc2626'], borderWidth:2, borderRadius:4 }] },
    options: co(true)
  });

  const byC = {};
  rows.filter(r=>r.estatus==='VENCIDO').forEach(r => { byC[r.cliente] = (byC[r.cliente]||0) + toMXN(r,'saldo'); });
  const ck = Object.keys(byC).sort((a,b) => byC[b]-byC[a]);
  dc('cCVen');
  CH['cCVen'] = new Chart(document.getElementById('cCVen'), {
    type:'bar', data:{ labels:ck, datasets:[{ data:ck.map(k=>byC[k]), backgroundColor:'#f8717133', borderColor:'#f87171', borderWidth:2, borderRadius:4 }] },
    options: { ...co(true), indexAxis:'y' }
  });

  const tb = document.getElementById('tbCart'); tb.innerHTML = '';
  rows.sort((a,b) => b.diasT - a.diasT).forEach(r => {
    tb.innerHTML +=
      '<tr><td>' + fmtD(r.fechaFact) + '</td>' +
      '<td>' + r.cliente + '</td>' +
      '<td style="font-family:monospace;font-size:11px">' + (r.noFact||'—') + '</td>' +
      '<td>' + (r.ruta||'—') + '</td>' +
      '<td class="num">' + fmtM(r.monto, r.moneda) + '</td>' +
      '<td><span class="bdg ' + (r.moneda==='USD'?'bpa':'bx') + '">' + r.moneda + '</span></td>' +
      '<td class="num">' + (r.credito||'—') + '</td>' +
      '<td class="num" style="color:' + (r.diasT>r.credito&&r.credito>0?'var(--red)':'inherit') + '">' + (r.diasT||'—') + '</td>' +
      '<td class="num" style="color:var(--red)">' + (r.saldo ? fmtM(r.saldo,r.moneda) : '—') + '</td>' +
      '<td class="ctr">' + bdg(r.estatus) + '</td></tr>';
  });
  if (!rows.length) tb.innerHTML = '<tr><td colspan="10"><div class="empty"><h3>\u2705 Sin cartera pendiente</h3></div></td></tr>';
}

function openPDF(n) {
  PDF_CLI = n;
  document.getElementById('mRaz').value = n;
  document.getElementById('mRFC').value = '';
  document.getElementById('mNot').value = 'Favor de liquidar los saldos vencidos a la brevedad.';
  const hoy = new Date();
  document.getElementById('mDes').value = new Date(hoy.getFullYear(), hoy.getMonth()-1, 1).toISOString().slice(0,10);
  document.getElementById('mHas').value = hoy.toISOString().slice(0,10);
  document.getElementById('pdfMod').classList.add('open');
}

function closePDF() { document.getElementById('pdfMod').classList.remove('open'); PDF_CLI = null; }

function genPDF() {
  const n = PDF_CLI, c = DATA.find(x => x.n === n);
  if (!c || !c.rows.length) { toast('Sin datos', 'error'); return; }
  const rfc   = document.getElementById('mRFC').value.trim() || '—';
  const razon = document.getElementById('mRaz').value.trim() || n;
  const desde = document.getElementById('mDes').value;
  const hasta = document.getElementById('mHas').value;
  const notas = document.getElementById('mNot').value.trim();
  let rows = c.rows.slice();
  if (desde) rows = rows.filter(r => r.fechaFact && r.fechaFact >= new Date(desde));
  if (hasta) rows = rows.filter(r => r.fechaFact && r.fechaFact <= new Date(hasta+'T23:59:59'));
  rows.sort((a,b) => (a.fechaFact||0) - (b.fechaFact||0));

  const tF = rows.reduce((s,r) => s + toMXN(r,'monto'), 0);
  const tC = cobrados(rows).reduce((s,r) => s + toMXN(r,'cobrado'), 0);
  const tP = rows.filter(r=>r.estatus!=='PAGADO').reduce((s,r) => s + toMXN(r,'saldo'), 0);
  const tV = rows.filter(r=>r.estatus==='VENCIDO').reduce((s,r) => s + toMXN(r,'saldo'), 0);
  const fc  = new Date().toLocaleDateString('es-MX', {day:'2-digit', month:'long', year:'numeric'});
  const per = desde||hasta ? (
    (desde ? new Date(desde).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) : '—') +
    ' al ' +
    (hasta ? new Date(hasta).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) : '—')
  ) : 'Historial completo';

  const sc = { PAGADO:'background:#d1fae5;color:#065f46', VENCIDO:'background:#fee2e2;color:#991b1b', PENDIENTE:'background:#fef3c7;color:#92400e', PARCIAL:'background:#dbeafe;color:#1e40af' };
  const filas = rows.map(r =>
    '<tr><td>' + fmtD(r.fechaFact) + '</td>' +
    '<td style="font-family:monospace;font-size:11px">' + (r.noFact||'—') + '</td>' +
    '<td>' + (r.ruta||'—') + '</td>' +
    '<td style="text-align:right">' + fmtM(r.monto, r.moneda) + '</td>' +
    '<td style="text-align:center">' + r.moneda + '</td>' +
    '<td style="text-align:center">' + (r.credito||'—') + '</td>' +
    '<td style="text-align:center;color:' + (r.diasT>r.credito&&r.estatus!=='PAGADO'?'#dc2626':'inherit') + '">' + (r.diasT||'—') + '</td>' +
    '<td style="text-align:right;color:#dc2626;font-weight:600">' + (r.saldo ? fmtM(r.saldo,r.moneda) : '—') + '</td>' +
    '<td style="text-align:center"><span style="' + (sc[r.estatus]||'background:#f3f4f6;color:#374151') + ';padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600">' + r.estatus + '</span></td>' +
    '<td>' + fmtD(r.fechaPago) + '</td></tr>'
  ).join('');

  const w = window.open('', '_blank');
  if (!w) { toast('Permite ventanas emergentes', 'error'); return; }
  w.document.write('<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>EC-' + n + '</title>' +
    '<style>@import url(\'https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap\');' +
    '*{box-sizing:border-box;margin:0;padding:0}body{font-family:DM Sans,sans-serif;background:#fff;color:#1a1a2e;font-size:12px}.page{max-width:900px;margin:0 auto;padding:36px 40px}' +
    '.hb{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:3px solid #1a1a2e}' +

// ============================================================
//  CSV
// ============================================================
function csvCliente(n) {
  const c = DATA.find(x => x.n === n);
  if (!c || !c.rows.length) { toast('Sin datos', 'error'); return; }
  mkCSV(c.rows, 'EC_' + n);
}

function xCSV(t) {
  if (t === 'ing')  mkCSV(cobrados(allR()), 'Ingresos_LU');
  else if (t === 'cart') mkCSV(allR().filter(r=>r.estatus!=='PAGADO'), 'CarteraViva_LU');
  else if (t === 'cli' && ACT_CLI) mkCSV((DATA.find(c=>c.n===ACT_CLI)||{rows:[]}).rows, 'EC_'+ACT_CLI);
}

function mkCSV(rows, fn) {
  const h = ['Cliente','Fecha Factura','No. Factura','Ruta','Monto','Moneda','Días Créd.','Días Trans.','Estatus','Fecha Pago','Monto Pagado','Saldo'];
  const d = rows.map(r => [r.cliente, fmtD(r.fechaFact), r.noFact, r.ruta, r.monto, r.moneda, r.credito, r.diasT, r.estatus, fmtD(r.fechaPago), r.montoPagado||'', r.saldo||'']);
  const csv = [h,...d].map(r => r.map(v => '"' + (v||'') + '"').join(',')).join('\n');
  const b = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const u = URL.createObjectURL(b); const a = document.createElement('a');
  a.href = u; a.download = fn + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(u); toast('CSV descargado', 'success');
}

// ============================================================
//  SORT
// ============================================================
function srt(tid, col) {
  const tb = document.getElementById(tid).querySelector('tbody');
  const rows = Array.from(tb.querySelectorAll('tr'));
  if (!SS[tid]) SS[tid] = {}; const asc = !SS[tid][col]; SS[tid] = {[col]:asc};
  rows.sort((a,b) => {
    const av = (a.cells[col] && a.cells[col].textContent.trim()) || '';
    const bv = (b.cells[col] && b.cells[col].textContent.trim()) || '';
    const an = parseFloat(av.replace(/[^0-9.\-]/g,'')), bn = parseFloat(bv.replace(/[^0-9.\-]/g,''));
    if (!isNaN(an) && !isNaN(bn)) return asc ? an-bn : bn-an;
    return asc ? av.localeCompare(bv,'es') : bv.localeCompare(av,'es');
  });
  rows.forEach(r => tb.appendChild(r));
  document.getElementById(tid).querySelectorAll('th').forEach((th,i) => th.classList.toggle('sorted', i===col));
}
