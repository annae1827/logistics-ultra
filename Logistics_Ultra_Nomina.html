<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alen IP - Dashboard Operacional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        .header { background: #1a1a1a; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .filtros { display: flex; gap: 15px; flex-wrap: wrap; background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: center; }
        .filtros > div { display: flex; flex-direction: column; gap: 5px; }
        .filtros label { font-weight: 600; font-size: 12px; color: #666; }
        .filtros select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .filtros button { padding: 8px 12px; background: #999; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 20px; background: #ddd; border: none; border-radius: 4px 4px 0 0; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: white; border-bottom: 3px solid #1976d2; }
        .tab-content { background: white; padding: 20px; border-radius: 0 8px 8px 8px; display: none; }
        .tab-content.active { display: block; }
        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat { background: #f9f9f9; padding: 15px; border-radius: 8px; flex: 1; text-align: center; border-left: 4px solid #1976d2; }
        .stat-label { font-size: 12px; color: #999; font-weight: 600; }
        .stat-value { font-size: 28px; font-weight: bold; color: #1976d2; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        table thead { background: #f0f0f0; }
        table th { padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
        table td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        table tr:hover { background: #f9f9f9; }
        .verde { color: #27ae60; font-weight: 600; }
        .btn-rec { padding: 6px 12px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal.active { display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 900px; max-height: 90vh; overflow: auto; }
        .modal-header { font-size: 18px; font-weight: bold; color: #1a1a1a; margin-bottom: 20px; }
        .close-modal { float: right; background: #ddd; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .nom-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .nom-buttons button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; color: white; }
        .btn-pdf { background: #d32f2f; }
        .btn-excel { background: #1976d2; }
        .btn-print { background: #2d5a3d; }
        .nom-table { overflow-x: auto; border-radius: 8px; margin-top: 15px; }
        .nom-table table { font-size: 11px; }
        .nom-table thead { background: #1a1a1a; color: white; }
        .nom-table th { color: white; font-weight: bold; padding: 12px 6px; font-size: 11px; border: 1px solid #333; }
        .nom-table td { padding: 8px 6px; border: 1px solid #ddd; }
        .nom-table input { width: 60px; padding: 4px; border: 1px solid #ddd; border-radius: 3px; text-align: center; }
        input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚚 Alen IP - Dashboard Operacional</h1>
            <p>Gestión de nómina, viajes y operadores</p>
        </div>

        <div class="filtros">
            <div><label>AÑO</label><select id="ano" onchange="aplicar()"><option value="">Todos</option></select></div>
            <div><label>MES</label><select id="mes" onchange="aplicar()"><option value="">Todos</option></select></div>
            <div><label>DÍA</label><select id="dia" onchange="aplicar()"><option value="">Todos</option></select></div>
            <div><label>TURNO</label><select id="turno" onchange="aplicar()"><option value="">Todos</option></select></div>
            <div><label>COORDINADOR</label><select id="coord" onchange="aplicar()"><option value="">Todos</option></select></div>
            <div><label>OPERADOR</label><select id="op" onchange="aplicar()"><option value="">Todos</option></select></div>
            <button onclick="limpiar()">🔄 Limpiar</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="tab('res')">📈 RESUMEN</button>
            <button class="tab-btn" onclick="tab('nom')">💼 NÓMINA</button>
            <button class="tab-btn" onclick="tab('rec')">📋 RECIBOS</button>
        </div>

        <div id="res" class="tab-content active">
            <div class="stats">
                <div class="stat"><div class="stat-label">📦 Cargados</div><div class="stat-value" id="c1">0</div></div>
                <div class="stat"><div class="stat-label">👤 Operadores</div><div class="stat-value" id="c3">0</div></div>
            </div>
            <table><thead><tr><th>Operador</th><th class="verde">Cargados</th><th>Días</th></tr></thead><tbody id="t1"></tbody></table>
        </div>

        <div id="nom" class="tab-content">
            <div class="nom-buttons">
                <label style="font-weight: 600; align-self: center;">Semana:</label>
                <select id="sel_sem_nom" onchange="generarNomina()" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;">
                    <option value="">-- Seleccionar semana --</option>
                </select>
                <button class="btn-pdf" onclick="generarPDFNomina()">📄 PDF</button>
                <button class="btn-excel" onclick="generarExcelNomina()">📊 EXCEL</button>
                <button class="btn-print" onclick="imprimirNomina()">🖨️ Imprimir</button>
            </div>
            <div id="t_nom" class="nom-table"></div>
        </div>

        <div id="rec" class="tab-content">
            <div id="t5"></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="cerrarModal()">✕</button>
            <div id="recibo"></div>
        </div>
    </div>

    <script>
        let datos = [];
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE1ZJZ8PzqGMNdj0MLHbfmcFQngQlP0PQVmK_FFTfI9Kmzk3EO8EWAAb6T4d-oCTPrEThpf-g8Roq3/pub?gid=0&single=true&output=csv';

        window.addEventListener('load', () => {
            fetch(CSV_URL)
                .then(r => r.text())
                .then(csv => {
                    Papa.parse(csv, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (r) => {
                            datos = r.data.filter(x => x.Operador && x.Fecha);
                            console.log('Datos cargados:', datos.length);
                            init();
                        }
                    });
                })
                .catch(e => console.error('Error cargando datos:', e));
        });

        function init() {
            const s1 = new Set(), s2 = new Set(), s3 = new Set(), s4 = new Set(), s5 = new Set(), s6 = new Set();
            datos.forEach(r => {
                if (r.año) s1.add(r.año);
                if (r.mes) s2.add(r.mes);
                if (r.día) s3.add(r.día);
                if (r.Turno) s4.add(r.Turno);
                if (r.Coordinador) s5.add(r.Coordinador);
                const op = r.OP || r.Operador;
                if (op) s6.add(op);
            });

            document.getElementById('ano').innerHTML = '<option value="">Todos</option>' + [...s1].sort().reverse().map(x => `<option>${x}</option>`).join('');
            document.getElementById('mes').innerHTML = '<option value="">Todos</option>' + [...s2].sort().map(x => `<option>${x}</option>`).join('');
            document.getElementById('dia').innerHTML = '<option value="">Todos</option>' + [...s3].sort().map(x => `<option>${x}</option>`).join('');
            document.getElementById('turno').innerHTML = '<option value="">Todos</option>' + [...s4].sort().map(x => `<option>${x}</option>`).join('');
            document.getElementById('coord').innerHTML = '<option value="">Todos</option>' + [...s5].sort().map(x => `<option>${x}</option>`).join('');
            document.getElementById('op').innerHTML = '<option value="">Todos</option>' + [...s6].sort().map(x => `<option>${x}</option>`).join('');

            aplicar();
        }

        function aplicar() {
            const ano = document.getElementById('ano').value;
            const mes = document.getElementById('mes').value;
            const dia = document.getElementById('dia').value;

            let f = datos.filter(r => {
                if (ano && r.año !== ano) return false;
                if (mes && r.mes !== mes) return false;
                if (dia && r.día !== dia) return false;
                return true;
            });

            render(f);
        }

        function limpiar() {
            document.getElementById('ano').value = '';
            document.getElementById('mes').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('turno').value = '';
            document.getElementById('coord').value = '';
            document.getElementById('op').value = '';
            aplicar();
        }

        function render(f) {
            let c = 0, pO = {}, sem = {};

            f.forEach(r => {
                const carg = parseInt(r['M Cargados']) || 0;
                const op = r.OP || r.Operador;
                c += carg;

                if (!pO[op]) pO[op] = {c: 0, dias: 0};
                pO[op].c += carg;
                pO[op].dias += 1;

                // Parsear fecha con validación estricta
                const fechaStr = r.Fecha ? r.Fecha.trim() : '';
                if (!fechaStr) return;
                
                const partes = fechaStr.split('/');
                if (partes.length !== 3) return;
                
                const día_num = parseInt(partes[0].trim());
                const mes_num = parseInt(partes[1].trim());
                const año = parseInt(partes[2].trim());
                
                // Validar rangos
                if (isNaN(día_num) || isNaN(mes_num) || isNaN(año)) return;
                if (día_num < 1 || día_num > 31 || mes_num < 1 || mes_num > 12 || año < 2020 || año > 2030) return;
                
                const fecha = new Date(año, mes_num - 1, día_num);
                // Verificar que la fecha es válida (no May 32, etc)
                if (fecha.getDate() !== día_num || fecha.getMonth() !== mes_num - 1) return;
                
                const dayOfWeek = fecha.getDay();
                const diff = (dayOfWeek - 5 + 7) % 7;
                const fridayDate = new Date(fecha);
                fridayDate.setDate(fridayDate.getDate() - diff);

                const fridayDay = String(fridayDate.getDate()).padStart(2, '0');
                const fridayMonth = String(fridayDate.getMonth() + 1).padStart(2, '0');
                const fridayYear = fridayDate.getFullYear();

                const key = `${fridayYear}-${fridayMonth}-${fridayDay}`;
                if (!sem[key]) sem[key] = new Set();
                sem[key].add(op);
            });

            document.getElementById('c1').textContent = c;
            document.getElementById('c3').textContent = Object.keys(pO).length;

            let html = '';
            Object.keys(pO).sort().forEach(x => {
                const d = pO[x];
                html += `<tr><td>${x}</td><td class="verde">${d.c}</td><td>${d.dias}</td></tr>`;
            });
            document.getElementById('t1').innerHTML = html || '<tr><td colspan="3">Sin datos</td></tr>';

            const semanas = Object.keys(sem).sort().reverse();
            let optionsHtml = '<option value="">-- Seleccionar semana --</option>';
            semanas.forEach(v => {
                const partes = v.split('-');
                if (partes.length !== 3) return;
                
                const year = parseInt(partes[0]);
                const month = parseInt(partes[1]);
                const day = parseInt(partes[2]);
                
                if (isNaN(year) || isNaN(month) || isNaN(day)) return;
                
                const fridayDate = new Date(year, month - 1, day);
                const thursdayDate = new Date(fridayDate);
                thursdayDate.setDate(thursdayDate.getDate() + 6);

                const thuDay = String(thursdayDate.getDate()).padStart(2, '0');
                const thuMonth = String(thursdayDate.getMonth() + 1).padStart(2, '0');

                optionsHtml += `<option value="${v}">${v} a ${thursdayDate.getFullYear()}-${thuMonth}-${thuDay}</option>`;
            });
            document.getElementById('sel_sem_nom').innerHTML = optionsHtml;

            html = semanas.map(v => {
                const [year, month, day] = v.split('-');
                const fridayDate = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
                const thursdayDate = new Date(fridayDate);
                thursdayDate.setDate(thursdayDate.getDate() + 6);

                const thuDay = String(thursdayDate.getDate()).padStart(2, '0');
                const thuMonth = String(thursdayDate.getMonth() + 1).padStart(2, '0');

                const fin = `${thursdayDate.getFullYear()}-${thuMonth}-${thuDay}`;
                
                // Agregar botones de recibos para cada operador de la semana
                const ops = Array.from(sem[v]).sort().map(o => `<button class="btn-rec" onclick="rec('${o}', '${v}')" style="margin: 5px 5px 5px 0;">${o}</button>`).join('');
                
                return `<div style="margin-bottom: 20px;"><h3 style="color: #2d5a3d; margin-bottom: 10px;">📅 ${v} a ${fin}</h3><div style="display: flex; flex-wrap: wrap;">${ops}</div></div>`;
            }).join('');
            document.getElementById('t5').innerHTML = html || '<div>Sin datos</div>';
        }

        function tab(n) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById(n).classList.add('active');
            event.target.classList.add('active');
        }

        function generarNomina() {
            const semanaSelec = document.getElementById('sel_sem_nom').value;
            if (!semanaSelec) {
                document.getElementById('t_nom').innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">Selecciona una semana</div>';
                return;
            }

            const partes = semanaSelec.split('-');
            if (partes.length !== 3) {
                document.getElementById('t_nom').innerHTML = '<div style="padding: 20px; text-align: center; color: #c62828;">Error: formato de semana inválido</div>';
                return;
            }
            
            const y = partes[0];
            const m = partes[1];
            const d = partes[2];
            
            // Validar que sean números
            if (isNaN(parseInt(y)) || isNaN(parseInt(m)) || isNaN(parseInt(d))) {
                document.getElementById('t_nom').innerHTML = '<div style="padding: 20px; text-align: center; color: #c62828;">Error: formato de semana inválido</div>';
                return;
            }
            const mDate = new Date(parseInt(y), parseInt(m), 0).getDate();
            let jd = parseInt(d) + 6;
            if (jd > mDate) jd -= mDate;

            const datosSem = datos.filter(r => {
                const [rd, rm, ry] = r.Fecha.split('/');
                return ry === y && rm === m && parseInt(rd) >= parseInt(d) && parseInt(rd) <= jd;
            });

            const datosOps = {};
            datosSem.forEach(r => {
                const op = r.OP || r.Operador;
                const carg = parseInt(r['M Cargados']) || 0;
                if (!datosOps[op]) datosOps[op] = {c: 0, dias: 0};
                datosOps[op].c += carg;
                datosOps[op].dias += 1;
            });

            if (Object.keys(datosOps).length === 0) {
                document.getElementById('t_nom').innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">Sin datos para esta semana</div>';
                return;
            }

            let html = `<table style="width: 100%; border-collapse: collapse; background: white; font-size: 11px;">
                <thead style="background: #1a1a1a; color: white; position: sticky; top: 0; z-index: 10;">
                    <tr>
                        <th style="padding: 12px 8px; text-align: left; border: 2px solid #333; min-width: 180px; font-weight: bold; font-size: 13px; color: #ffffff; background: #1a1a1a;">Operador</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; font-weight: bold; font-size: 13px; color: #ffffff; background: #1a1a1a;">Viajes</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; font-weight: bold; font-size: 13px; color: #ffffff; background: #1a1a1a;">Días</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 80px; font-weight: bold; font-size: 13px; color: #ffffff; background: #1a1a1a;">Completar</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 60px; font-weight: bold; font-size: 13px; color: #ffffff; background: #1a1a1a;">Total Viajes</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 80px; font-weight: bold; font-size: 13px; color: #ffffff; background: #1a1a1a;">Movimientos</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 80px; font-weight: bold; font-size: 13px; color: #ffffff; background: #1a1a1a;">Pago Fijo</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #fff9c4; font-weight: bold; font-size: 13px; color: #333;">Bono2</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #333333; font-weight: bold; font-size: 13px; color: #ffeb3b;">Puntualidad</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #333333; font-weight: bold; font-size: 13px; color: #ffeb3b;">Asistencia</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #fffde7; font-weight: bold; font-size: 13px; color: #333;">Bono Completar</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #fffde7; font-weight: bold; font-size: 13px; color: #333;">Bono Coord</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #fffde7; font-weight: bold; font-size: 13px; color: #333;">No Descanso</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 80px; font-weight: bold; font-size: 13px; color: #ffffff; background: #1a1a1a;">Subtotal</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #333333; font-weight: bold; font-size: 13px; color: #ffeb3b;">Préstamo</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #333333; font-weight: bold; font-size: 13px; color: #ffeb3b;">Adelanto</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; background: #333333; font-weight: bold; font-size: 13px; color: #ff6b6b;">Penalización</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 70px; font-weight: bold; font-size: 13px; color: #ff6b6b; background: #1a1a1a;">ISR (7.5%)</th>
                        <th style="padding: 12px 8px; text-align: center; border: 2px solid #333; min-width: 90px; background: #1b5e20; font-weight: bold; font-size: 13px; color: #c8e6c9;">TOTAL A PAGAR</th>
                    </tr>
                </thead>
                <tbody>`;

            Object.keys(datosOps).sort().forEach(op => {
                const d = datosOps[op];
                const viajesReales = d.c;
                const diasTrabajados = d.dias;
                
                // Completar viajes se activa automáticamente si tiene 6 o 7 asistencias
                let viajesACompletar = 0;
                if (diasTrabajados >= 6) {
                    viajesACompletar = Math.max(0, 30 - viajesReales);
                }
                const totalViajes = viajesReales + viajesACompletar;

                // NUEVA LÓGICA: Sueldo fijo NO acumulable
                const movimientos = viajesReales * 200;
                const pagoFijo = diasTrabajados * 362.50;
                const bono2 = Math.max(0, movimientos - pagoFijo);

                html += `<tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 8px; text-align: left; border: 1px solid #ddd;"><strong>${op}</strong></td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd;"><strong>${viajesReales}</strong></td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd;"><strong>${diasTrabajados}</strong></td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd; background: ${diasTrabajados >= 6 ? '#c8e6c9' : '#f0f0f0'};">
                        <span class="comp_${op.replace(/\s/g,'_')}" style="font-weight: ${diasTrabajados >= 6 ? 'bold' : 'normal'}; color: ${diasTrabajados >= 6 ? '#1b5e20' : '#999'};">${viajesACompletar}</span>
                    </td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd;"><span class="tot_viajes_${op.replace(/\s/g,'_')}">${totalViajes}</span></td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd;">$<span class="mov_${op.replace(/\s/g,'_')}">${movimientos.toLocaleString('es-MX')}</span></td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd; background: #ffcdd2;">$<span class="pf_${op.replace(/\s/g,'_')}">${pagoFijo.toLocaleString('es-MX')}</span></td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd; background: #fff9c4;">$<span class="b2_${op.replace(/\s/g,'_')}">${bono2.toLocaleString('es-MX')}</span></td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd; background: #fffde7;">
                        <input type="checkbox" class="bon_punt_${op.replace(/\s/g,'_')}" onchange="recalcNomina()"><span style="display: block; font-size: 10px;">$250</span>
                    </td>
                    <td style="padding: 8px; text-align: center; border: 1px solid #ddd; background: #fffde7;">
                        <input type="checkbox" class="bon_asis_${op.replace(/\s/g,'_')}" onchange="recalcNomina()"><span style="display: block; font-size: 10px;">$250</span>
                    </td>

        function recalcNomina() {
            const semanaSelec = document.getElementById('sel_sem_nom').value;
            if (!semanaSelec) return;

            const [y, m, d] = semanaSelec.split('-');
            const mDate = new Date(parseInt(y), parseInt(m), 0).getDate();
            let jd = parseInt(d) + 6;
            if (jd > mDate) jd -= mDate;

            const datosSem = datos.filter(r => {
                const [rd, rm, ry] = r.Fecha.split('/');
                return ry === y && rm === m && parseInt(rd) >= parseInt(d) && parseInt(rd) <= jd;
            });

            const datosOps = {};
            datosSem.forEach(r => {
                const op = r.OP || r.Operador;
                const carg = parseInt(r['M Cargados']) || 0;
                if (!datosOps[op]) datosOps[op] = {c: 0, dias: 0};
                datosOps[op].c += carg;
                datosOps[op].dias += 1;
            });

            Object.keys(datosOps).forEach(op => {
                const d = datosOps[op];
                const viajesReales = d.c;
                const diasTrabajados = d.dias;

                // Completar viajes se calcula automáticamente si tiene 6 o 7 asistencias
                let viajesACompletar = 0;
                if (diasTrabajados >= 6) {
                    viajesACompletar = Math.max(0, 30 - viajesReales);
                }
                const totalViajes = viajesReales + viajesACompletar;

                // NUEVA LÓGICA: Sueldo fijo NO acumulable
                const movimientos = totalViajes * 200;
                const pagoFijo = diasTrabajados * 362.50;
                const bono2 = Math.max(0, movimientos - pagoFijo);

                const bonoPunt = document.querySelector('.bon_punt_' + op.replace(/\s/g,'_')).checked ? 250 : 0;
                const bonoAsis = document.querySelector('.bon_asis_' + op.replace(/\s/g,'_')).checked ? 250 : 0;
                const bonoComp = parseInt(document.querySelector('.bon_comp_' + op.replace(/\s/g,'_')).value) || 0;
                const bonoCoord = parseInt(document.querySelector('.bon_coord_' + op.replace(/\s/g,'_')).value) || 0;
                
                // Bono no descanso solo si trabajó 7 días
                let bonoDesc = 0;
                if (diasTrabajados === 7) {
                    const checkDesc = document.querySelector('.bon_desc_' + op.replace(/\s/g,'_'));
                    if (checkDesc) {
                        bonoDesc = checkDesc.checked ? 500 : 0;
                    }
                }

                const subtotal = pagoFijo + bono2 + bonoPunt + bonoAsis + bonoComp + bonoCoord + bonoDesc;

                const prefil = parseInt(document.querySelector('.prf_' + op.replace(/\s/g,'_')).value) || 0;
                const adelanto = parseInt(document.querySelector('.adl_' + op.replace(/\s/g,'_')).value) || 0;
                const penalizacion = parseInt(document.querySelector('.pen_' + op.replace(/\s/g,'_')).value) || 0;

                const isr = subtotal * 0.075;
                const total = subtotal - prefil - adelanto - penalizacion - isr;

                document.querySelector('.tot_viajes_' + op.replace(/\s/g,'_')).textContent = totalViajes;
                document.querySelector('.mov_' + op.replace(/\s/g,'_')).textContent = movimientos.toLocaleString('es-MX');
                document.querySelector('.pf_' + op.replace(/\s/g,'_')).textContent = pagoFijo.toLocaleString('es-MX');
                document.querySelector('.b2_' + op.replace(/\s/g,'_')).textContent = bono2.toLocaleString('es-MX');
                document.querySelector('.sub_' + op.replace(/\s/g,'_')).textContent = subtotal.toLocaleString('es-MX');
                document.querySelector('.isr_' + op.replace(/\s/g,'_')).textContent = isr.toLocaleString('es-MX');
                document.querySelector('.tot_' + op.replace(/\s/g,'_')).textContent = total.toLocaleString('es-MX');
            });
        }

        function rec(op, sem) {
            // Obtener datos de la semana para este operador
            const [y, m, d] = sem.split('-');
            const mDate = new Date(parseInt(y), parseInt(m), 0).getDate();
            let jd = parseInt(d) + 6;
            if (jd > mDate) jd -= mDate;

            const datosSem = datos.filter(r => {
                const [rd, rm, ry] = r.Fecha.split('/');
                return ry === y && rm === m && parseInt(rd) >= parseInt(d) && parseInt(rd) <= jd && (r.OP || r.Operador) === op;
            });

            // Construir tabla de recibo
            let html = `<div class="modal-header">📋 Recibo - ${op}</div>
            <table style="width: 100%; margin: 20px 0; border-collapse: collapse;">
                <thead style="background: #f0f0f0;">
                    <tr>
                        <th style="padding: 10px; text-align: left; border: 1px solid #ddd;">Fecha</th>
                        <th style="padding: 10px; text-align: center; border: 1px solid #ddd;">Viajes</th>
                        <th style="padding: 10px; text-align: center; border: 1px solid #ddd;">Pago</th>
                    </tr>
                </thead>
                <tbody>`;

            let totalPago = 0;
            datosSem.forEach(r => {
                const viajes = parseInt(r['M Cargados']) || 0;
                const pago = viajes * 200;
                totalPago += pago;
                html += `<tr>
                    <td style="padding: 10px; border: 1px solid #ddd;">${r.Fecha}</td>
                    <td style="padding: 10px; text-align: center; border: 1px solid #ddd;">${viajes}</td>
                    <td style="padding: 10px; text-align: right; border: 1px solid #ddd;">$${pago.toLocaleString('es-MX')}</td>
                </tr>`;
            });

            html += `</tbody></table>
            <div style="text-align: right; padding: 20px; border-top: 2px solid #2d5a3d;">
                <strong>TOTAL VIAJES: $${totalPago.toLocaleString('es-MX')}</strong>
            </div>`;

            document.getElementById('recibo').innerHTML = html;
            document.getElementById('modal').classList.add('active');
