<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚛 Alen IP - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: #f5f5f5; color: #333; }
        .header { background: linear-gradient(135deg, #2d5a3d 0%, #1a3a2a 100%); color: white; padding: 25px 30px; }
        .header h1 { font-size: 32px; margin-bottom: 5px; }
        .container { max-width: 1800px; margin: 20px auto; padding: 0 20px; }
        .filtros { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        .filtros select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .tabs { display: flex; gap: 0; margin-bottom: 20px; background: white; border-radius: 8px; overflow: hidden; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 100px; padding: 12px; background: #f5f5f5; border: none; cursor: pointer; font-weight: 600; font-size: 12px; }
        .tab-btn.active { background: #2d5a3d; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .stat { background: white; padding: 15px; border-radius: 8px; border-left: 4px solid #2d5a3d; text-align: center; }
        .stat-label { font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #2d5a3d; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        th { padding: 10px; background: #f5f5f5; font-weight: 600; text-align: center; border-bottom: 2px solid #2d5a3d; font-size: 12px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; font-size: 12px; }
        td:first-child { text-align: left; }
        tbody tr:hover { background: #f9f9f9; }
        .verde { color: #2e7d32; font-weight: 600; }
        .rojo { color: #c62828; font-weight: 600; }
        .recibo-btn { padding: 6px 12px; background: #2d5a3d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; margin: 3px; }
        .recibo-btn:hover { background: #1a3a2a; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 8px; padding: 30px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .recibo-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #2d5a3d; }
        .recibo-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
        .recibo-row.total { font-weight: bold; font-size: 14px; color: #2d5a3d; border-top: 2px solid #2d5a3d; padding-top: 10px; }
        .no-data { text-align: center; padding: 30px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚛 ALEN IP - DASHBOARD</h1>
        <div>📊 Movimientos, Turnos y Operadores</div>
    </div>
    
    <div class="container">
        <div class="filtros">
            <div><label style="font-weight: 600; font-size: 11px;">AÑO</label><select id="filtroAno" onchange="aplicarFiltros()"><option value="">Todos</option></select></div>
            <div><label style="font-weight: 600; font-size: 11px;">MES</label><select id="filtroMes" onchange="aplicarFiltros()"><option value="">Todos</option></select></div>
            <div><label style="font-weight: 600; font-size: 11px;">DÍA</label><select id="filtroDia" onchange="aplicarFiltros()"><option value="">Todos</option></select></div>
            <div><label style="font-weight: 600; font-size: 11px;">TURNO</label><select id="filtroTurno" onchange="aplicarFiltros()"><option value="">Todos</option></select></div>
            <div><label style="font-weight: 600; font-size: 11px;">COORDINADOR</label><select id="filtroCoordinador" onchange="aplicarFiltros()"><option value="">Todos</option></select></div>
            <div><label style="font-weight: 600; font-size: 11px;">OPERADOR</label><select id="filtroOperador" onchange="aplicarFiltros()"><option value="">Todos</option></select></div>
            <button onclick="limpiarFiltros()" style="padding: 8px 12px; background: #999; color: white; border: none; border-radius: 4px; cursor: pointer;">🔄 Limpiar</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTab('res')">📈 RESUMEN</button>
            <button class="tab-btn" onclick="cambiarTab('coord')">👨‍💼 COORDINADORES</button>
            <button class="tab-btn" onclick="cambiarTab('ops')">👥 OPERADORES</button>
            <button class="tab-btn" onclick="cambiarTab('turn')">🕐 TURNOS</button>
            <button class="tab-btn" onclick="cambiarTab('rec')">💼 RECIBOS</button>
        </div>
        
        <div id="res" class="tab-content active">
            <div class="stats">
                <div class="stat"><div class="stat-label">📦 Cargados</div><div class="stat-value" id="c1">0</div></div>
                <div class="stat"><div class="stat-label">🚫 Vacíos</div><div class="stat-value" id="c2">0</div></div>
                <div class="stat"><div class="stat-label">👤 Operadores</div><div class="stat-value" id="c3">0</div></div>
                <div class="stat"><div class="stat-label">✓ Asistencias</div><div class="stat-value verde" id="c4">0</div></div>
                <div class="stat"><div class="stat-label">✗ Faltas</div><div class="stat-value rojo" id="c5">0</div></div>
            </div>
            <table><thead><tr><th>Fecha</th><th>Turno</th><th class="verde">Cargados</th><th class="rojo">Vacíos</th><th>✓</th><th>✗</th></tr></thead><tbody id="t1"></tbody></table>
        </div>
        
        <div id="coord" class="tab-content">
            <table><thead><tr><th>Coordinador</th><th class="verde">Cargados</th><th class="rojo">Vacíos</th><th>Asist</th><th>Faltas</th><th>Operadores</th></tr></thead><tbody id="t2"></tbody></table>
        </div>
        
        <div id="ops" class="tab-content">
            <table><thead><tr><th>Operador</th><th class="verde">Cargados</th><th class="rojo">Vacíos</th><th>Asist</th><th>Faltas</th><th>Turnos</th><th>Acción</th></tr></thead><tbody id="t3"></tbody></table>
        </div>
        
        <div id="turn" class="tab-content">
            <table><thead><tr><th>Turno</th><th class="verde">Cargados</th><th class="rojo">Vacíos</th><th>Asist</th><th>Faltas</th><th>Operadores</th></tr></thead><tbody id="t4"></tbody></table>
        </div>
        
        <div id="rec" class="tab-content">
            <div id="t5" style="padding: 20px; background: white; border-radius: 8px;"></div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <button onclick="cerrarModal()" style="float: right; background: #ddd; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer;">✕</button>
            <div id="recibo_html"></div>
        </div>
    </div>
    
    <script>
        let datos = [];
        let datosFiltrados = [];
        
        // URL CSV - Google Sheet Alen IP
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE1ZJZ8PzqGMNdj0MLHbfmcFQngQlP0PQVmK_FFTfI9Kmzk3EO8EWAAb6T4d-oCTPrEThpf-g8Roq3/pub?gid=0&single=true&output=csv';
        
        window.addEventListener('load', () => {
            fetch(URL_CSV)
                .then(r => r.text())
                .then(csv => {
                    Papa.parse(csv, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            // Normalizar nombres de columnas
                            datos = results.data.map(r => {
                                const row = {};
                                Object.keys(r).forEach(key => {
                                    const normalized = key.trim().toLowerCase();
                                    row[key] = r[key];
                                });
                                return r;
                            }).filter(r => {
                                // Usar OP si existe, sino Operador
                                const op = r.OP || r.Operador;
                                return op && r.Fecha;
                            });
                            
                            datosFiltrados = [...datos];
                            init();
                        },
                        error: (e) => console.error('Error CSV:', e)
                    });
                })
                .catch(e => console.error('Error fetch:', e));
        });
        
        function init() {
            cargarFiltros();
            aplicarFiltros();
        }
        
        function cargarFiltros() {
            const anos = new Set(), meses = new Set(), dias = new Set(), turnos = new Set(), coords = new Set(), ops = new Set();
            datos.forEach(r => {
                // Buscar columnas con encoding flexible
                const año = r.año || r['año'] || r.Año || r['Año'];
                const mes = r.mes || r['mes'] || r.Mes || r['Mes'];
                const día = r.día || r['día'] || r.Día || r['Día'];
                const op = r.OP || r.Operador;
                
                if (año) anos.add(año.trim());
                if (mes) meses.add(mes.trim());
                if (día) dias.add(día.trim());
                if (r.Turno) turnos.add(r.Turno.trim());
                if (r.Coordinador) coords.add(r.Coordinador.trim());
                if (op) ops.add(op.trim());
            });
            
            document.getElementById('filtroAno').innerHTML = '<option value="">Todos</option>' + [...anos].sort().reverse().map(a => `<option>${a}</option>`).join('');
            document.getElementById('filtroMes').innerHTML = '<option value="">Todos</option>' + [...meses].sort().map(m => `<option>${m}</option>`).join('');
            document.getElementById('filtroDia').innerHTML = '<option value="">Todos</option>' + [...dias].sort().map(d => `<option>${d}</option>`).join('');
            document.getElementById('filtroTurno').innerHTML = '<option value="">Todos</option>' + [...turnos].sort().map(t => `<option>${t}</option>`).join('');
            document.getElementById('filtroCoordinador').innerHTML = '<option value="">Todos</option>' + [...coords].sort().map(c => `<option>${c}</option>`).join('');
            document.getElementById('filtroOperador').innerHTML = '<option value="">Todos</option>' + [...ops].sort().map(o => `<option>${o}</option>`).join('');
        }
        
        function aplicarFiltros() {
            const ano = document.getElementById('filtroAno').value;
            const mes = document.getElementById('filtroMes').value;
            const dia = document.getElementById('filtroDia').value;
            const turno = document.getElementById('filtroTurno').value;
            const coord = document.getElementById('filtroCoordinador').value;
            const op = document.getElementById('filtroOperador').value;
            
            datosFiltrados = datos.filter(r => {
                const año = r.año || r['año'] || r.Año || r['Año'];
                const mes_col = r.mes || r['mes'] || r.Mes || r['Mes'];
                const día_col = r.día || r['día'] || r.Día || r['Día'];
                const op_col = r.OP || r.Operador;
                
                if (ano && año !== ano) return false;
                if (mes && mes_col !== mes) return false;
                if (dia && día_col !== dia) return false;
                if (turno && r.Turno !== turno) return false;
                if (coord && r.Coordinador !== coord) return false;
                if (op && op_col !== op) return false;
                return true;
            });
            
            actualizar();
        }
        
        function actualizar() {
            let c = 0, v = 0, a = 0, fa = 0, pF = {}, pC = {}, pO = {}, pT = {}, sem = {};
            const diasSemana = ['lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado', 'domingo'];
            
            datosFiltrados.forEach(r => {
                const carg = parseInt(r['M Cargados']) || 0;
                const vac = parseInt(r['M Vacíos']) || 0;
                const asist = r.Estatus.toLowerCase().includes('asist') || r.Estatus.toLowerCase().includes('si') ? 1 : 0;
                const falt = r.Estatus.toLowerCase().includes('falta') ? 1 : 0;
                const op_col = r.OP || r.Operador;
                
                // Leer año/mes/día flexiblemente
                const año = r.año || r['año'] || r.Año || r['Año'];
                const mes_col = r.mes || r['mes'] || r.Mes || r['Mes'];
                const día_col = r.día || r['día'] || r.Día || r['Día'];
                
                c += carg; v += vac; a += asist; fa += falt;
                
                const k = r.Fecha + '|' + r.Turno;
                if (!pF[k]) pF[k] = { c: 0, v: 0, a: 0, f: 0 };
                pF[k].c += carg; pF[k].v += vac; pF[k].a += asist; pF[k].f += falt;
                
                if (!pC[r.Coordinador]) pC[r.Coordinador] = { c: 0, v: 0, a: 0, f: 0, ops: new Set() };
                pC[r.Coordinador].c += carg; pC[r.Coordinador].v += vac; pC[r.Coordinador].a += asist; pC[r.Coordinador].f += falt;
                pC[r.Coordinador].ops.add(op_col);
                
                if (!pO[op_col]) pO[op_col] = { c: 0, v: 0, a: 0, f: 0, t: new Set() };
                pO[op_col].c += carg; pO[op_col].v += vac; pO[op_col].a += asist; pO[op_col].f += falt;
                pO[op_col].t.add(r.Turno);
                
                if (!pT[r.Turno]) pT[r.Turno] = { c: 0, v: 0, a: 0, f: 0, ops: new Set() };
                pT[r.Turno].c += carg; pT[r.Turno].v += vac; pT[r.Turno].a += asist; pT[r.Turno].f += falt;
                pT[r.Turno].ops.add(op_col);
                
                // Semana viernes a jueves usando columna día
                if (año && mes_col && día_col) {
                    const diaIdx = diasSemana.indexOf(día_col.toLowerCase().trim());
                    let viernesD = parseInt(r.Fecha.split('/')[0]);
                    
                    if (diaIdx >= 0) {
                        if (diaIdx <= 3) viernesD -= (diaIdx + 1);
                        else if (diaIdx === 4) viernesD = parseInt(r.Fecha.split('/')[0]);
                        else viernesD += (5 - diaIdx);
                    }
                    
                    const keySem = `${año}-${mes_col}-${String(viernesD).padStart(2, '0')}`;
                    if (!sem[keySem]) sem[keySem] = new Set();
                    sem[keySem].add(op_col);
                }
            });
            
            document.getElementById('c1').textContent = c;
            document.getElementById('c2').textContent = v;
            document.getElementById('c3').textContent = Object.keys(pO).length;
            document.getElementById('c4').textContent = a;
            document.getElementById('c5').textContent = fa;
            
            // Tab Resumen
            let html = '';
            Object.keys(pF).sort().forEach(k => {
                const [fecha, turno] = k.split('|');
                const d = pF[k];
                html += `<tr><td>${fecha}</td><td>${turno}</td><td class="verde">${d.c}</td><td class="rojo">${d.v}</td><td>${d.a}</td><td>${d.f}</td></tr>`;
            });
            document.getElementById('t1').innerHTML = html || '<tr><td colspan="6" class="no-data">Sin datos</td></tr>';
            
            // Tab Coordinadores
            html = '';
            Object.keys(pC).sort().forEach(x => {
                const d = pC[x];
                html += `<tr><td>${x}</td><td class="verde">${d.c}</td><td class="rojo">${d.v}</td><td>${d.a}</td><td>${d.f}</td><td>${d.ops.size}</td></tr>`;
            });
            document.getElementById('t2').innerHTML = html || '<tr><td colspan="6" class="no-data">Sin datos</td></tr>';
            
            // Tab Operadores
            html = '';
            Object.keys(pO).sort().forEach(x => {
                const d = pO[x];
                html += `<tr><td>${x}</td><td class="verde">${d.c}</td><td class="rojo">${d.v}</td><td>${d.a}</td><td>${d.f}</td><td>${d.t.size}</td><td><button class="recibo-btn" onclick="verRecibo('${x}')">📄</button></td></tr>`;
            });
            document.getElementById('t3').innerHTML = html || '<tr><td colspan="7" class="no-data">Sin datos</td></tr>';
            
            // Tab Turnos
            html = '';
            Object.keys(pT).sort().forEach(x => {
                const d = pT[x];
                html += `<tr><td>${x}</td><td class="verde">${d.c}</td><td class="rojo">${d.v}</td><td>${d.a}</td><td>${d.f}</td><td>${d.ops.size}</td></tr>`;
            });
            document.getElementById('t4').innerHTML = html || '<tr><td colspan="6" class="no-data">Sin datos</td></tr>';
            
            // Tab Recibos - Semanas
            html = Object.keys(sem).sort().reverse().map(v => {
                const [year, month, day] = v.split('-');
                // Calcular último día del mes actual
                const monthNum = parseInt(month);
                const yearNum = parseInt(year);
                const diasMes = new Date(yearNum, monthNum, 0).getDate();
                
                let jDay = parseInt(day) + 6;
                let jMonth = monthNum;
                let jYear = yearNum;
                
                // Si el jueves se pasa del mes, ajustar al siguiente mes
                if (jDay > diasMes) {
                    jDay = jDay - diasMes;
                    jMonth = jMonth + 1;
                    if (jMonth > 12) {
                        jMonth = 1;
                        jYear = jYear + 1;
                    }
                }
                
                const ops = Array.from(sem[v]).sort().map(op => `<button class="recibo-btn" onclick="verRecibo('${op}', '${v}')">${op}</button>`).join('');
                const fechaFin = `${jYear}-${String(jMonth).padStart(2, '0')}-${String(jDay).padStart(2, '0')}`;
                return `<div style="margin-bottom: 25px;"><h3 style="margin-bottom: 15px; color: #2d5a3d;">📅 ${v} a ${fechaFin}</h3><div>${ops}</div></div>`;
            }).join('');
            document.getElementById('t5').innerHTML = html || '<div class="no-data">Sin datos</div>';
        }
        
        function verRecibo(operador, viernesParam = null) {
            let datosRecibo = datos.filter(r => (r.OP || r.Operador) === operador);
            
            if (viernesParam) {
                const [year, month, day] = viernesParam.split('-');
                const jDay = parseInt(day) + 6;
                datosRecibo = datosRecibo.filter(r => {
                    const [d, m, y] = r.Fecha.split('/');
                    return y === year && m === month && parseInt(d) >= parseInt(day) && parseInt(d) <= jDay;
                });
            }
            
            const detalles = {};
            datosRecibo.forEach(r => {
                if (!detalles[r.Fecha]) detalles[r.Fecha] = { carg: 0, dia: r.día };
                detalles[r.Fecha].carg = Math.max(detalles[r.Fecha].carg, parseInt(r['M Cargados']) || 0);
            });
            
            const diasTrabajados = Object.keys(detalles).length;
            const movimientos = Object.values(detalles).reduce((a, b) => a + b.carg, 0);
            const pagoPorMovimientos = movimientos * 200;
            const sueldoFijo = diasTrabajados * 362.50;
            
            // Opciones para completar viajes
            const opcionesCompletar = Object.keys(detalles)
                .filter(f => detalles[f].carg < 5)
                .map(f => `<option value="${f}">${f} (${detalles[f].carg} viajes)</option>`)
                .join('');
            
            let recibo = `
                <div class="recibo-header">
                    <div style="font-size: 28px;">🚛</div>
                    <div style="font-size: 16px; font-weight: 600; color: #2d5a3d; margin: 10px 0;">RECIBO DE NÓMINA</div>
                    <div style="font-size: 12px; color: #666;">${operador}</div>
                </div>
                
                <div style="margin-bottom: 15px; padding: 10px; background: #f5f5f5; border-radius: 4px;">
                    <table style="width: 100%; font-size: 11px;">
                        <tr style="background: #e8e8e8;"><th style="padding: 5px; text-align: left;">Fecha</th><th style="padding: 5px;">Viajes</th></tr>
                        ${Object.keys(detalles).sort().map(f => `<tr><td style="padding: 5px;">${f}</td><td style="padding: 5px; text-align: center; font-weight: 600;">${detalles[f].carg}</td></tr>`).join('')}
                    </table>
                </div>
                
                <div style="border: 1px solid #ddd; border-radius: 4px; padding: 12px; margin-bottom: 15px;">
                    <div style="font-weight: 600; margin-bottom: 10px; color: #2d5a3d;">💰 BASE</div>
                    <div class="recibo-row"><span>Movimientos:</span><span><strong>${movimientos}</strong> × $200</span></div>
                    <div class="recibo-row"><span style="text-align: right;">$${pagoPorMovimientos.toLocaleString('es-MX')}</span></div>
                    <div class="recibo-row" style="margin-top: 8px;"><span>Sueldo fijo:</span><span><strong>${diasTrabajados}</strong> × $362.50</span></div>
                    <div class="recibo-row"><span style="text-align: right;">$${sueldoFijo.toLocaleString('es-MX')}</span></div>
                </div>
                
                <div style="border: 1px solid #ddd; border-radius: 4px; padding: 12px; margin-bottom: 15px;">
                    <div style="font-weight: 600; margin-bottom: 10px; color: #2d5a3d;">🎁 BONOS</div>
                    
                    <div style="margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="chk_puntualidad" onchange="calcularTotal('${operador}', '${viernesParam || ''}')" style="margin-right: 8px;">
                            <span>✓ Puntualidad</span>
                            <span style="margin-left: auto; color: #2d5a3d; font-weight: 600;">$250</span>
                        </label>
                    </div>
                    
                    <div style="margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="chk_asistencia" onchange="calcularTotal('${operador}', '${viernesParam || ''}')" style="margin-right: 8px;">
                            <span>✓ Asistencia</span>
                            <span style="margin-left: auto; color: #2d5a3d; font-weight: 600;">$250</span>
                        </label>
                    </div>
                    
                    <div style="margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; cursor: pointer;">
                            <input type="checkbox" id="chk_descanso" onchange="calcularTotal('${operador}', '${viernesParam || ''}')" style="margin-right: 8px;">
                            <span>No descansó 7 días</span>
                            <span style="margin-left: auto; color: #2d5a3d; font-weight: 600;">$500</span>
                        </label>
                    </div>
                    
                    ${opcionesCompletar ? `
                    <div style="margin-bottom: 10px;">
                        <label style="display: block; margin-bottom: 5px;">Completar viajes:</label>
                        <select id="sel_completar" onchange="calcularTotal('${operador}', '${viernesParam || ''}')" style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="">-- Seleccionar día --</option>
                            ${opcionesCompletar}
                        </select>
                    </div>
                    ` : ''}
                    
                    <div style="margin-bottom: 10px;">
                        <label style="display: block; margin-bottom: 5px;">Otros bonos/Apoyo coordinación:</label>
                        <input type="number" id="txt_otros" onchange="calcularTotal('${operador}', '${viernesParam || ''}')" placeholder="$0" style="width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px;" min="0" step="50">
                    </div>
                </div>
                
                <div id="resumen_total" style="padding: 12px; background: #e8f5e9; border-radius: 4px;">
                    <div class="recibo-row total">
                        <span>💰 TOTAL A PAGAR</span>
                        <span>$${(pagoPorMovimientos + sueldoFijo).toLocaleString('es-MX')}</span>
                    </div>
                </div>
                
                <div style="margin-top: 15px; text-align: center;">
                    <button onclick="imprimirRecibo()" style="padding: 8px 16px; background: #2d5a3d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">🖨️ Imprimir</button>
                </div>
            `;
            
            document.getElementById('recibo_html').innerHTML = recibo;
            document.getElementById('modal').classList.add('active');
        }
        
        function calcularTotal(operador, viernesParam) {
            let datosRecibo = datos.filter(r => (r.OP || r.Operador) === operador);
            
            if (viernesParam) {
                const [year, month, day] = viernesParam.split('-');
                const jDay = parseInt(day) + 6;
                datosRecibo = datosRecibo.filter(r => {
                    const [d, m, y] = r.Fecha.split('/');
                    return y === year && m === month && parseInt(d) >= parseInt(day) && parseInt(d) <= jDay;
                });
            }
            
            const detalles = {};
            datosRecibo.forEach(r => {
                if (!detalles[r.Fecha]) detalles[r.Fecha] = { carg: 0 };
                detalles[r.Fecha].carg = Math.max(detalles[r.Fecha].carg, parseInt(r['M Cargados']) || 0);
            });
            
            const diasTrabajados = Object.keys(detalles).length;
            const movimientos = Object.values(detalles).reduce((a, b) => a + b.carg, 0);
            const pagoPorMovimientos = movimientos * 200;
            const sueldoFijo = diasTrabajados * 362.50;
            
            let total = pagoPorMovimientos + sueldoFijo;
            
            if (document.getElementById('chk_puntualidad').checked) total += 250;
            if (document.getElementById('chk_asistencia').checked) total += 250;
            if (document.getElementById('chk_descanso').checked) total += 500;
            
            const diaCompletar = document.getElementById('sel_completar').value;
            if (diaCompletar && detalles[diaCompletar]) {
                const faltantes = 5 - detalles[diaCompletar].carg;
                total += faltantes * 200;
            }
            
            const otros = parseInt(document.getElementById('txt_otros').value) || 0;
            total += otros;
            
            document.getElementById('resumen_total').innerHTML = `
                <div class="recibo-row total">
                    <span>💰 TOTAL A PAGAR</span>
                    <span>$${total.toLocaleString('es-MX')}</span>
                </div>
            `;
        }
        
        function imprimirRecibo() {
            window.print();
        }
        
        function cerrarModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function cambiarTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }
        
        function limpiarFiltros() {
            document.getElementById('filtroAno').value = '';
            document.getElementById('filtroMes').value = '';
            document.getElementById('filtroDia').value = '';
            document.getElementById('filtroTurno').value = '';
            document.getElementById('filtroCoordinador').value = '';
            document.getElementById('filtroOperador').value = '';
            aplicarFiltros();
        }
    </script>
</body>
</html>
